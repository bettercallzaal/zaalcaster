<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>zaalcaster</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0c0c12" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<meta name="fc:frame" content='{"version":"1","imageUrl":"https://z.thezao.xyz/og.svg","button":{"title":"Open zaalcaster","action":{"type":"launch_frame","name":"zaalcaster","url":"https://z.thezao.xyz","splashImageUrl":"https://z.thezao.xyz/icon.svg","splashBackgroundColor":"#0c0c12"}}}' />
<style>
  :root {
    color-scheme: dark;
    --bg: #0c0c12; --surface: #14141d; --surface2: #1a1a26; --border: #24242f;
    --text: #e9e9ee; --dim: #8a8a99; --accent: #855DCD; --accent2: #6d4aff;
    --live: #D85A30; --good: #7ee0a0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  main { flex: 1 0 auto; }
  header { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 16px; background: rgba(12,12,18,.86); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  header .meta { font-size: 12px; color: var(--dim); }
  header .right { display: flex; gap: 8px; align-items: center; }
  button { font: inherit; cursor: pointer; }
  .ibtn { font-size: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; }
  .ibtn:hover { border-color: var(--accent); }
  .ibtn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 600; }
  .tabs { position: sticky; top: 49px; z-index: 15; display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tabs button { flex: 1; background: none; border: none; color: var(--dim); padding: 11px 4px; font-size: 14px; font-weight: 600;
    border-bottom: 2px solid transparent; }
  .tabs button.on { color: var(--text); border-bottom-color: var(--accent); }
  .tabs button .k { font-size: 10px; color: var(--dim); font-weight: 400; }
  main { max-width: 640px; margin: 0 auto; padding: 10px 12px 90px; }
  .subbar { display: flex; gap: 8px; padding: 6px 2px 10px; flex-wrap: wrap; }
  .chip { font-size: 13px; background: var(--surface2); color: var(--dim); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 13px; cursor: pointer; transition: border-color .12s, background .12s, color .12s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ibtn { transition: border-color .12s, background .12s; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; transition: border-color .12s; }
  .launchgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .launch { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; cursor: pointer; transition: border-color .12s, background .12s; }
  .launch:hover { border-color: var(--accent); }
  .launch .ll { font-weight: 600; font-size: 15px; }
  .launch .ls { color: #8a8a99; font-size: 12px; margin-top: 2px; }
  @media (max-width: 380px) { .launchgrid { grid-template-columns: repeat(2, 1fr); } }
  .statbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0 8px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; }
  .stat .sv { font-weight: 700; font-size: 20px; color: var(--accent); }
  .stat .sl { color: #8a8a99; font-size: 11px; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
  .boost { font-size: 11px; font-weight: 700; color: #fff; background: linear-gradient(90deg, #855DCD, #6d4aff); padding: 1px 5px; border-radius: 6px; vertical-align: middle; }
  .weekgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 6px 0 8px; }
  .spark { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; height: 48px; margin: 8px 2px 6px; }
  .sparkcol { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .sparkbar { width: 100%; max-width: 26px; background: #2b2b3a; border-radius: 4px 4px 2px 2px; }
  .sparkbar.today { background: linear-gradient(180deg, #855DCD, #6d4aff); }
  .sparkd { font-size: 10px; color: #6f6f7a; }
  .pwr { font-size: 10px; font-weight: 700; color: #6d4aff; border: 1px solid #6d4aff; border-radius: 5px; padding: 0 4px; vertical-align: middle; }
  .qs { font-size: 10px; font-weight: 600; color: #3fbf7f; vertical-align: middle; }
  .lbrow.ownrow { background: linear-gradient(90deg, rgba(133,93,205,.16), transparent); border-radius: 8px; }
  .xpbar { height: 8px; background: #1c1c28; border-radius: 6px; overflow: hidden; }
  .xpfill { height: 100%; background: linear-gradient(90deg, #855DCD, #6d4aff); transition: width .3s; }
  .xphint { color: #8a8a99; font-size: 12px; margin: 4px 0 2px; text-align: right; }
  .badges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .badge { border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; background: var(--surface); opacity: .5; }
  .badge.on { opacity: 1; border-color: var(--accent); background: linear-gradient(180deg, rgba(133,93,205,.14), transparent); }
  .badge .bn { font-weight: 600; font-size: 14px; }
  .badge .bd { color: #8a8a99; font-size: 12px; margin-top: 2px; }
  .badge.on .bd { color: var(--accent); }
  .toast { position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(12px); background: var(--accent); color: #fff; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9999; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #welcome { position: fixed; inset: 0; z-index: 10000; background: rgba(8,8,14,.72); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; }
  #welcome .wcard { background: linear-gradient(180deg, #17122b, #0e0e15); border: 1px solid var(--accent); border-radius: 18px; padding: 22px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  #welcome .wtitle { font-size: 22px; font-weight: 800; }
  #welcome .wsub { color: #b9b9c6; font-size: 14px; margin-top: 6px; }
  .snapgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; }
  @media (max-width: 560px) { .snapgrid { grid-template-columns: 1fr; } }
  .sfin { width: 100%; margin-top: 5px; background: #0e0e15; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 14px; }
  textarea.sfin { min-height: 60px; resize: vertical; }
  .snapprev { position: sticky; top: 0; align-self: start; }
  .spv { border: 1px solid var(--accent); border-radius: 16px; padding: 16px; background: linear-gradient(180deg, #14101f, #0e0e15); }
  .spvtitle { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .spvh { font-size: 19px; font-weight: 800; }
  .spvs { color: #b9b9c6; font-size: 14px; margin-top: 3px; }
  .spvt { font-size: 14px; margin-top: 8px; color: #d6d6de; }
  .spvq { font-weight: 600; margin-top: 12px; }
  .spvopt { border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; margin-top: 6px; font-size: 14px; }
  .spvbtn { color: #fff; font-weight: 600; text-align: center; border-radius: 10px; padding: 10px; margin-top: 12px; }
  .spvfoot { text-align: center; color: #6f6f7a; font-size: 11px; margin-top: 12px; }
  .snapembed { border: 1px solid var(--accent); border-radius: 14px; padding: 12px 14px; background: linear-gradient(180deg, rgba(133,93,205,.12), transparent); cursor: pointer; }
  .snapembed:hover { border-color: #a99cff; }
  .scaptag { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--accent); }
  .snapembed .sctitle { font-size: 16px; font-weight: 700; margin-top: 3px; }
  .snapembed .scsub { color: #b9b9c6; font-size: 13px; margin-top: 2px; }
  .snapembed .scq { font-weight: 600; font-size: 14px; margin-top: 8px; }
  .snapembed .scopt { border: 1px solid var(--border); border-radius: 9px; padding: 7px 10px; margin-top: 5px; font-size: 13px; }
  .snapembed .scopen { color: var(--accent); font-weight: 600; font-size: 13px; margin-top: 10px; }
  .lbrow { display: flex; align-items: center; gap: 8px; padding: 7px 4px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .lbrow:hover { background: rgba(133,93,205,.06); }
  .lbrank { width: 22px; text-align: center; font-weight: 700; color: #6f6f7a; font-size: 13px; }
  .lbrank.top { color: var(--accent); }
  .lbpfp { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; background: #24242f; flex: none; }
  .lbname { font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .lbbar { width: 84px; height: 6px; background: #1c1c28; border-radius: 4px; overflow: hidden; flex: none; }
  .lbfill { display: block; height: 100%; background: linear-gradient(90deg, #855DCD, #6d4aff); }
  .lbn { width: 26px; text-align: right; font-weight: 600; font-size: 13px; color: var(--accent); }
  .card:hover { border-color: #2f2f3d; }
  .card .top { display: flex; gap: 10px; align-items: flex-start; }
  .pfp { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); object-fit: cover; flex: none; }
  .card .who { flex: 1; min-width: 0; }
  .card .who .name { font-weight: 600; }
  .card .who .name a { color: var(--text); text-decoration: none; }
  .card .who .sub { font-size: 12px; color: var(--dim); }
  .card .who .sub .ch { color: var(--accent); }
  .card .body { margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; }
  .card .embed { margin-top: 7px; font-size: 13px; }
  .cimg { max-width: 100%; max-height: 420px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; display: block; }
  .card .embed a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .card .stats { display: flex; gap: 16px; margin-top: 10px; font-size: 13px; color: var(--dim); }
  .card .stats button { background: none; border: none; color: var(--dim); padding: 0; display: inline-flex; gap: 5px; align-items: center; }
  .card .stats button.act.on { color: var(--live); }
  .card .stats button.act.recast.on { color: var(--good); }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 6px; }
  .thread { border-left: 2px solid var(--border); padding-left: 10px; margin: 7px 0 0; }
  .thread div { color: var(--dim); font-size: 13px; margin: 2px 0; }
  .thread .u { color: #b8b8c6; }
  .draft { margin-top: 10px; padding: 9px 11px; background: #17141f; border: 1px solid #34294d; border-radius: 9px; }
  .draft .lab { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #a99bff; margin-bottom: 3px; }
  .draft .t { white-space: pre-wrap; word-break: break-word; color: #ddd6ff; }
  .draft.skip { border-color: var(--border); background: #16161c; }
  .draft.skip .lab, .draft.skip .t { color: #6f6f7a; }
  .reply { margin-top: 10px; }
  .reply textarea, .compose textarea { width: 100%; resize: vertical; font: inherit; font-size: 15px; background: #0e0e15;
    color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; }
  .reply textarea { min-height: 52px; } .compose textarea { min-height: 130px; }
  .reply textarea:focus, .compose textarea:focus { outline: none; border-color: var(--accent); }
  .reply textarea[readonly] { background: #12101a; border-color: #34294d; color: #ddd6ff; }
  .reply .btns, .compose .btns { display: flex; gap: 8px; align-items: center; margin-top: 7px; flex-wrap: wrap; }
  .reply .cc, .compose .cc { font-size: 12px; color: var(--dim); }
  .reply .note, .compose .note { font-size: 12px; color: #ffcf9a; }
  .sent { margin-top: 10px; font-size: 13px; color: var(--good); }
  .sentcard { border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px; text-align: center; background: linear-gradient(180deg, #12160f, #0e0e15); max-width: 420px; margin: 24px auto 0; }
  .sentcard .senttitle { font-size: 20px; font-weight: 800; color: var(--good); margin-bottom: 8px; }
  .sent a { color: var(--good); }
  .empty, .err { text-align: center; color: var(--dim); padding: 44px 16px; }
  .err { color: #ff8a8a; }
  .loading { text-align: center; color: var(--dim); padding: 30px; }
  .compose select { font: inherit; background: #0e0e15; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; }
  a.open { font-size: 12px; color: var(--dim); text-decoration: none; }
  a.open:hover { color: var(--accent); }
  .uname { cursor: pointer; } .uname:hover { color: var(--accent); }
  .tappable { cursor: pointer; }
  .searchbar { display: flex; gap: 8px; margin-bottom: 10px; }
  .searchbar input { flex: 1; font: inherit; font-size: 15px; background: #0e0e15; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; }
  .searchbar input:focus { outline: none; border-color: var(--accent); }
  .digest { background: #16131f; border: 1px solid #34294d; border-radius: 12px; padding: 13px 15px; margin-bottom: 12px; }
  .digest .lab { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #a99bff; margin-bottom: 6px; }
  .digest .t { white-space: pre-wrap; word-break: break-word; color: #ddd6ff; font-size: 14px; }
  .urow { display: flex; gap: 10px; align-items: center; padding: 8px 2px; cursor: pointer; }
  .urow:hover { background: var(--surface2); border-radius: 10px; }
  .urow .un { font-weight: 600; } .urow .ub { font-size: 12px; color: var(--dim); }
  #overlay { position: fixed; inset: 0; z-index: 50; background: rgba(6,6,10,.72); backdrop-filter: blur(3px); display: none; }
  #overlay.on { display: block; }
  #overlay .sheet { max-width: 640px; margin: 0 auto; height: 100%; overflow-y: auto; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  #overlay .ohd { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
    background: rgba(12,12,18,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  #overlay .ohd b { font-size: 15px; } #overlay .ohd .x { cursor: pointer; color: var(--dim); font-size: 20px; }
  #overlay .obody { padding: 12px; }
  .prof { display: flex; gap: 12px; align-items: center; padding: 4px 2px 12px; }
  .prof .pfp { width: 56px; height: 56px; } .prof .pn { font-size: 18px; font-weight: 700; }
  .prof .ps { font-size: 13px; color: var(--dim); }
  .prof .badge { font-size: 11px; color: var(--good); }
  .focuscast { border-color: var(--accent); }
  body.deck main { max-width: 100%; }
  #ptr { position: fixed; top: 0; left: 0; right: 0; text-align: center; color: var(--accent); font-size: 13px;
    padding: 8px; transform: translateY(-40px); transition: transform .15s; z-index: 25; pointer-events: none; }
  #ptr.show { transform: translateY(50px); }
  /* mobile: tabs to the bottom (thumb zone), bigger touch targets, safe areas */
  @media (max-width: 640px) {
    .tabs { position: fixed; top: auto; bottom: 0; left: 0; right: 0; border-top: 1px solid var(--border);
      border-bottom: none; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 30;
      box-shadow: 0 -4px 16px rgba(0,0,0,.3); }
    .tabs button { font-size: 12px; padding: 10px 2px 9px; }
    .tabs button .k { display: none; }
    .tabs button.on { border-bottom-color: transparent; box-shadow: inset 0 2px 0 var(--accent); }
    main { padding-bottom: calc(84px + env(safe-area-inset-bottom, 0)); }
    .card .stats { gap: 18px; }
    .card .stats button, .reply button, .ibtn, .chip { min-height: 34px; }
    header { padding: 12px 14px; }
  }
  .deck { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory; }
  .deckcol { flex: 0 0 340px; max-width: 92vw; scroll-snap-align: start; }
  .deckcol .dh { position: sticky; top: 0; background: var(--bg); padding: 6px 2px 8px; font-weight: 700; font-size: 14px; z-index: 2; border-bottom: 1px solid var(--border); }
  .deckcol .dc { max-height: calc(100vh - 180px); overflow-y: auto; padding-top: 8px; }
  @media (min-width: 760px) { .deckcol { flex: 1 1 0; max-width: none; } }
  footer { text-align: center; color: #4a4a58; font-size: 11px; padding: 6px 0 30px; }
  #fab { position: fixed; right: 16px; bottom: 22px; z-index: 40; background: var(--accent2); color: #fff; border: none; border-radius: 22px; padding: 10px 16px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 6px 20px rgba(109,74,255,.4); }
  @media (max-width: 720px) { #fab { bottom: calc(76px + env(safe-area-inset-bottom, 0)); right: 12px; padding: 9px 14px; } }
  #fbmodal { position: fixed; inset: 0; z-index: 10001; background: rgba(8,8,14,.72); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; }
  #fbmodal .fbcard { background: linear-gradient(180deg, #17122b, #0e0e15); border: 1px solid var(--accent); border-radius: 18px; padding: 20px; max-width: 440px; width: 100%; max-height: 86vh; overflow-y: auto; }
  #fbmodal textarea { width: 100%; min-height: 84px; margin-top: 10px; background: #0e0e15; color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 10px; font: inherit; font-size: 15px; resize: vertical; }
  #fbmodal .ibtn.on { background: #c0392b; border-color: #c0392b; color: #fff; }
  .fblist { display: flex; flex-direction: column; }
  .fbitem { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .fbitem:last-child { border-bottom: none; }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="wordmark">zaal<span>caster</span></h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="right">
    <button class="ibtn" id="deckBtn" title="column deck view">deck</button>
    <button class="ibtn" id="refresh" title="refresh (r)">refresh</button>
    <a href="/dj.html" style="text-decoration:none"><button class="ibtn" type="button" title="space dj">dj</button></a>
  </div>
</header>

<div class="tabs" id="tabs">
  <button data-tab="daily" class="on">Daily <span class="k">1</span></button>
  <button data-tab="feed">Feed <span class="k">2</span></button>
  <button data-tab="inbox">Inbox <span class="k">3</span></button>
  <button data-tab="channels">Chan <span class="k">4</span></button>
  <button data-tab="search">Search <span class="k">5</span></button>
  <button data-tab="compose">Post <span class="k">6</span></button>
  <button data-tab="grow">Grow <span class="k">7</span></button>
</div>

<div id="ptr">pull to refresh</div>
<main id="main"></main>
<div id="overlay"><div class="sheet"><div class="ohd"><b id="ohdTitle"></b><span class="x" id="overlayClose">&times;</span></div><div class="obody" id="obody"></div></div></div>
<div id="palette" style="position:fixed;inset:0;z-index:70;background:rgba(6,6,10,.6);display:none;padding-top:12vh">
  <div style="max-width:440px;margin:0 auto;background:#14141d;border:1px solid #33334d;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <input id="palInput" placeholder="jump to... (tab name, @user, or search)" autocomplete="off"
      style="width:100%;font:inherit;font-size:16px;background:none;color:#e9e9ee;border:none;border-bottom:1px solid #24242f;padding:14px 16px;box-sizing:border-box;outline:none">
    <div id="palList" style="max-height:50vh;overflow-y:auto"></div>
  </div>
</div>
<div id="gate" style="position:fixed;inset:0;z-index:100;background:#0c0c12;display:none;align-items:center;justify-content:center">
  <div style="width:280px;max-width:86vw;text-align:center">
    <h1 style="font-size:20px;margin:0 0 4px">zaal<span style="color:#855DCD">caster</span></h1>
    <div style="color:#8a8a99;font-size:13px;margin-bottom:16px">enter password</div>
    <input id="gatePw" type="password" autocomplete="current-password" placeholder="password"
      style="width:100%;font:inherit;font-size:16px;background:#14141d;color:#e9e9ee;border:1px solid #24242f;border-radius:10px;padding:11px 13px;box-sizing:border-box">
    <button id="gateBtn" style="width:100%;margin-top:10px;font:inherit;font-size:15px;font-weight:600;background:#6d4aff;color:#fff;border:none;border-radius:10px;padding:11px;cursor:pointer">enter</button>
    <div id="gateErr" style="color:#ff8a6a;font-size:13px;margin-top:8px;min-height:16px"></div>
  </div>
</div>
<footer>your farcaster - reads are free, nothing is sent without your confirm</footer>
<button id="fab" title="leave feedback">feedback</button>

<script>
  const main = document.getElementById('main')
  const meta = document.getElementById('meta')
  const ANSWERABLE = new Set(['reply', 'mention', 'quote'])
  let HOME_CHANNELS = ['zao', 'wavewarz', 'zabal'] // overridden from config on boot
  let ME = 'zaal' // your username, set from config on boot
  let QUICK = ['GM', 'Lfg', 'love this', 'so cool', 'congrats', 'based', 'ZM'] // quick replies, from config
  let BRANDS = [] // your brands, set from config on boot
  let OWNER_FID = null // the app owner's fid (from config) - guests get the welcome
  let APPNAME = 'zaalcaster' // set from config on boot
  // a row of one-tap quick-reply chips that fill the reply box for a given cast
  const quickRow = (hash) => `<div class="subbar" style="padding:2px 0 6px;gap:6px">${QUICK.map((q) => `<span class="chip" data-act="quick" data-hash="${esc(hash)}" data-q="${esc(q)}">${esc(q)}</span>`).join('')}</div>`

  let tab = 'feed'
  const st = {
    feed: { type: 'following', casts: [], loaded: false, digest: null, digesting: false },
    inbox: { items: [], loaded: false, showAll: false, priority: false, view: 'reply', notifs: [], notifChannel: '' },
    channels: { id: 'zao', casts: [], loaded: false, trending: [] },
    search: { q: '', channel: '', users: [], casts: [], loaded: true, searching: false },
    grow: { loaded: false, data: null, empires: [] },
  }

  const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
  const when = (ts) => { if (!ts) return ''; const d = new Date(ts); return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) }
  const pfp = (u) => u.pfp ? `<img class="pfp" src="${esc(u.pfp)}" alt="">` : `<div class="pfp"></div>`

  // ---- local (per-browser) state: bookmarks + muted keywords ----
  const lsGet = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d } catch { return d } }
  const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
  let bookmarks = lsGet('zc_bookmarks', [])           // array of compact casts
  let muted = lsGet('zc_muted', [])                   // array of lowercased words
  let scheduled = lsGet('zc_scheduled', [])           // [{id,text,channelId,quoteHash,quoteFid,at}]
  let lists = lsGet('zc_lists', [])                    // [{id,name,fids:[],members:[{fid,username}]}]
  let savedSearches = lsGet('zc_searches', [])         // [{q, channel}]
  let statsHistory = lsGet('zc_statshist', {})         // day -> {followers, score}
  let savedSnaps = lsGet('zc_snaps', [])               // [{name, doc}] custom snap templates
  let feedback = lsGet('zc_feedback', [])              // [{text, tab, at}] in-app notes for review
  let syncEnabled = false                             // server store on? (set at boot)

  // one persist path: write localStorage (offline cache) + push to the server
  // store (debounced) so daily/bookmarks/muted/scheduled sync across devices.
  let pushT = null
  function persist() {
    lsSet('zc_bookmarks', bookmarks); lsSet('zc_muted', muted); lsSet('zc_scheduled', scheduled); lsSet('zc_lists', lists); lsSet('zc_searches', savedSearches); lsSet('zc_statshist', statsHistory); lsSet('zc_snaps', savedSnaps); lsSet('zc_feedback', feedback)
    if (typeof daily !== 'undefined') lsSet('zc_daily', daily)
    if (typeof game !== 'undefined') lsSet('zc_game', game)
    if (!syncEnabled) return
    clearTimeout(pushT)
    pushT = setTimeout(() => {
      fetch('/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: { daily: (typeof daily !== 'undefined' ? daily : null), bookmarks, muted, scheduled, lists, savedSearches, statsHistory, savedSnaps, feedback, game: (typeof game !== 'undefined' ? game : null) } }) }).catch(() => {})
    }, 800)
  }
  const isBookmarked = (h) => bookmarks.some((b) => b.hash === h)
  function toggleBookmark(cast) {
    if (isBookmarked(cast.hash)) bookmarks = bookmarks.filter((b) => b.hash !== cast.hash)
    else bookmarks = [cast, ...bookmarks].slice(0, 500)
    persist()
  }
  const isMuted = (text) => { const t = (text || '').toLowerCase(); return muted.some((w) => w && t.includes(w)) }
  const dropMuted = (casts) => casts.filter((c) => !isMuted(c.text))
  function findCast(hash) {
    return st.feed.casts.find((c) => c.hash === hash) || st.channels.casts.find((c) => c.hash === hash)
      || st.search.casts.find((c) => c.hash === hash) || bookmarks.find((c) => c.hash === hash) || null
  }

  // ---- shared cast card (feed + channels) ----
  function castCard(c) {
    const embeds = (c.embeds || []).map((e) => {
      const url = typeof e === 'string' ? e : (e && e.url)
      if (!url) return ''
      const snap = url.includes('zlank.online/s/') ? decodeSnapUrl(url) : null
      if (snap) return snapEmbedCard(snap, url)
      const img = typeof e === 'object' && e.img
      return img
        ? `<div class="embed"><img class="cimg" src="${esc(url)}" alt="" loading="lazy" data-openurl="${esc(url)}"></div>`
        : `<div class="embed"><a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a></div>`
    }).join('')
    return `<div class="card" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">
      <div class="top">
        <span data-act="profile" data-user="${esc(c.author)}" style="cursor:pointer">${pfp(c)}</span>
        <div class="who">
          <div class="name"><span class="uname" data-act="profile" data-user="${esc(c.author)}">${esc(c.display)}</span>
            <span class="sub">@${esc(c.author)}${c.power ? ' <span class="pwr" title="power badge">pwr</span>' : ''}${c.score != null && c.score >= 0.9 ? ` <span class="qs" title="high neynar quality score">${c.score}</span>` : ''} - ${when(c.timestamp)}${c.channel ? ` - <span class="ch">/${esc(c.channel)}</span>` : ''}</span></div>
          <div class="body tappable" data-act="thread" data-hash="${esc(c.hash)}">${esc(c.text)}</div>
          ${embeds}
          <div class="stats">
            <button class="act like" data-act="like" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">&#9829; <span>${c.likes}</span></button>
            <button class="act recast" data-act="recast" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">&#8635; <span>${c.recasts}</span></button>
            <button data-act="thread" data-hash="${esc(c.hash)}">&#128172; ${c.replies}</button>
            <button data-act="replytoggle" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">reply</button>
            <button data-act="quote" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">quote</button>
            <button class="act bm ${isBookmarked(c.hash) ? 'on' : ''}" data-act="bookmark" data-hash="${esc(c.hash)}">${isBookmarked(c.hash) ? 'saved' : 'save'}</button>
            <a class="open" href="${esc(c.link)}" target="_blank" rel="noopener">open</a>
          </div>
          <div class="replyslot" data-slot="${esc(c.hash)}"></div>
        </div>
      </div>
    </div>`
  }

  // inline reply composer used by feed/channel cards
  function replyBox(hash, fid, draft) {
    return `<div class="reply">
      ${quickRow(hash)}
      <textarea data-rhash="${esc(hash)}" data-rfid="${fid || ''}" placeholder="reply as @${esc(ME)}...">${esc(draft || '')}</textarea>
      <div class="btns"><button class="ibtn" data-act="replyarm" data-hash="${esc(hash)}">send reply</button>
        <button class="ibtn" data-act="replycancel" data-hash="${esc(hash)}">cancel</button></div>
    </div>`
  }
  function replyConfirm(hash, fid, text, sending) {
    return `<div class="reply">
      <textarea readonly>${esc(text)}</textarea>
      <div class="btns"><span class="note">send exactly this as @zaal?</span>
        <button class="ibtn primary" data-act="replyconfirm" data-hash="${esc(hash)}" data-fid="${fid || ''}">${sending ? 'sending...' : 'yes, send'}</button>
        <button class="ibtn" data-act="replycancel" data-hash="${esc(hash)}">cancel</button></div>
    </div>`
  }

  // ================= FEED =================
  const moreBtn = (cursor, act) => cursor ? `<div class="subbar" style="justify-content:center"><button class="ibtn" data-act="${act}">load more</button></div>` : ''
  async function loadFeed(append) {
    if (!append) { st.feed.loaded = false; st.feed.cursor = null; render() }
    try {
      let url = `/api/feed?type=${st.feed.type}&limit=30${append && st.feed.cursor ? '&cursor=' + encodeURIComponent(st.feed.cursor) : ''}`
      // ZAO filter: a combined feed of the home ZAO channels vs "everyone" (following/for-you)
      if (st.feed.type === 'zao') url = `/api/feed?type=channel&id=${encodeURIComponent(HOME_CHANNELS.join(','))}&limit=30${append && st.feed.cursor ? '&cursor=' + encodeURIComponent(st.feed.cursor) : ''}`
      if (st.feed.type === 'list') {
        const lst = lists.find((l) => l.id === st.feed.listId)
        const fids = (lst?.fids || []).join(',')
        if (!fids) { st.feed.casts = []; st.feed.loaded = true; render(); return }
        url += '&fids=' + encodeURIComponent(fids)
      }
      const r = await fetch(url)
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'feed failed')
      st.feed.casts = append ? st.feed.casts.concat(d.casts) : d.casts
      st.feed.cursor = d.cursor; st.feed.loaded = true
    } catch (e) { st.feed.err = e.message; st.feed.loaded = true }
    render()
  }
  async function loadDigest() {
    st.feed.digesting = true; render()
    try {
      const r = await fetch('/api/digest'); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'digest failed')
      st.feed.digest = d.available ? d.digest : 'digest needs OPENROUTER_API_KEY'
    } catch (e) { st.feed.digest = 'digest error: ' + e.message }
    st.feed.digesting = false; render()
  }
  function renderFeed() {
    const sub = `<div class="subbar">
      <span class="chip ${st.feed.type === 'zao' ? 'on' : ''}" data-feed="zao" style="border-color:var(--accent)">ZAO</span>
      <span class="chip ${st.feed.type === 'following' ? 'on' : ''}" data-feed="following">everyone</span>
      <span class="chip ${st.feed.type === 'foryou' ? 'on' : ''}" data-feed="foryou">for you</span>
      <span class="chip ${st.feed.type === 'trending' ? 'on' : ''}" data-feed="trending">trending</span>
      <span class="chip ${st.feed.type === 'saved' ? 'on' : ''}" data-feed="saved">saved ${bookmarks.length}</span>
      ${lists.map((l) => `<span class="chip ${st.feed.type === 'list' && st.feed.listId === l.id ? 'on' : ''}" data-list="${esc(l.id)}">${esc(l.name)} ${(l.fids || []).length}</span>`).join('')}
      <span class="chip" data-act="newlist">+ list</span>
      <button class="ibtn" data-act="digest">${st.feed.digesting ? 'summarizing...' : 'what I missed'}</button>
      <button class="ibtn" data-act="filters">filters</button></div>`
    if (st.feed.type === 'saved') {
      if (!bookmarks.length) return sub + '<div class="empty">no saved casts. tap "save" on any cast.</div>'
      return sub + dropMuted(bookmarks).map(castCard).join('')
    }
    if (st.feed.type === 'list') {
      const lst = lists.find((l) => l.id === st.feed.listId)
      if (lst && !(lst.fids || []).length) return sub + `<div class="empty">"${esc(lst.name)}" is empty. Tap a profile and "add to list", or <span class="chip" data-act="seedfriends" data-list="${esc(lst.id)}">seed close friends</span></div>`
    }
    const dig = st.feed.digest ? `<div class="digest"><div class="lab">what you missed</div><div class="t">${esc(st.feed.digest)}</div></div>` : ''
    if (!st.feed.loaded) return sub + dig + '<div class="loading">loading feed...</div>'
    if (st.feed.err) return sub + `<div class="err">${esc(st.feed.err)}</div>`
    const casts = dropMuted(st.feed.casts)
    if (!casts.length) return sub + dig + '<div class="empty">no casts.</div>'
    return sub + dig + casts.map(castCard).join('') + moreBtn(st.feed.cursor, 'morefeed')
  }

  // ================= SEARCH =================
  async function runSearch() {
    const q = st.search.q.trim(); if (!q) return
    st.search.searching = true; render()
    try {
      const cq = st.search.channel ? '&channel=' + encodeURIComponent(st.search.channel) : ''
      const r = await fetch(`/api/search?q=${encodeURIComponent(q)}${cq}`); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'search failed')
      st.search.users = d.users; st.search.casts = d.casts; st.search.err = null
    } catch (e) { st.search.err = e.message }
    st.search.searching = false; render()
  }
  function renderSearch() {
    const chips = ['', ...HOME_CHANNELS].map((c) => `<span class="chip ${st.search.channel === c ? 'on' : ''}" data-searchchan="${esc(c)}">${c ? '/' + esc(c) : 'all'}</span>`).join(' ')
    const isSaved = savedSearches.some((s) => s.q === st.search.q.trim() && (s.channel || '') === st.search.channel)
    const saveBtn = st.search.q.trim() ? `<span class="chip" data-act="savesearch">${isSaved ? 'saved' : '+ save search'}</span>` : ''
    const saved = savedSearches.length ? `<div class="subbar" style="padding-top:0"><span class="ub" style="align-self:center">saved:</span> ${savedSearches.map((s, i) => `<span class="chip" data-savedsearch="${i}">${esc(s.q)}${s.channel ? ' /' + esc(s.channel) : ''} <span data-act="rmsearch" data-i="${i}" style="cursor:pointer;color:#ff8a6a">x</span></span>`).join(' ')}</div>` : ''
    const bar = `<div class="searchbar"><input id="searchInput" placeholder="search people + casts..." value="${esc(st.search.q)}">
      <button class="ibtn primary" data-act="dosearch">go</button></div>
      <div class="subbar" style="padding-top:0"><span class="ub" style="align-self:center">in:</span> ${chips} ${saveBtn}</div>${saved}`
    let body = ''
    if (st.search.searching) body = '<div class="loading">searching...</div>'
    else if (st.search.err) body = `<div class="err">${esc(st.search.err)}</div>`
    else {
      if (st.search.users.length) body += st.search.users.map((u) => `<div class="urow" data-act="profile" data-user="${esc(u.username)}">
        ${pfp(u)}<div><div class="un">${esc(u.display)} <span class="ub">@${esc(u.username)} - ${u.followers} followers</span></div>
        <div class="ub">${esc(u.bio)}</div></div></div>`).join('')
      if (st.search.casts.length) body += st.search.casts.map(castCard).join('')
      if (!st.search.users.length && !st.search.casts.length && st.search.q) body = '<div class="empty">no results.</div>'
    }
    return bar + body
  }

  // ================= INBOX =================
  async function loadInbox() {
    st.inbox.loaded = false; st.inbox.err = null; render()
    try {
      if (st.inbox.view === 'activity') {
        const cq = st.inbox.notifChannel ? '&channel=' + encodeURIComponent(st.inbox.notifChannel) : ''
        const r = await fetch(`/api/feed?notifs=1${cq}`)
        const d = await r.json(); if (!r.ok) throw new Error(d.error || 'activity failed')
        st.inbox.notifs = d.notifs || []; st.inbox.loaded = true
      } else {
        const r = await fetch(`/api/inbox?limit=25${st.inbox.showAll ? '&all=1' : ''}${st.inbox.priority ? '&priority=1' : ''}`)
        const d = await r.json(); if (!r.ok) throw new Error(d.error || 'inbox failed')
        st.inbox.items = d.items; st.inbox.loaded = true
      }
    } catch (e) { st.inbox.err = e.message; st.inbox.loaded = true }
    render()
  }
  const NOTIF_VERB = { likes: 'liked', recasts: 'recast', reply: 'replied', mention: 'mentioned you', quote: 'quoted', follows: 'followed you' }
  function notifRow(n) {
    const verb = NOTIF_VERB[n.type] || n.type
    const who = n.others > 0 ? `@${esc(n.actor)} +${n.others}` : `@${esc(n.actor || '?')}`
    const body = n.text ? `<div class="body" ${n.hash ? `data-act="thread" data-hash="${esc(n.hash)}" style="cursor:pointer"` : ''}>${esc(n.text)}</div>` : ''
    return `<div class="card" style="padding:11px 14px">
      <div class="top"><span data-act="profile" data-user="${esc(n.actor || '')}" style="cursor:pointer">${n.actorPfp ? `<img class="lbpfp" src="${esc(n.actorPfp)}" alt="">` : '<span class="lbpfp"></span>'}</span>
        <div class="who"><div class="name"><span data-act="profile" data-user="${esc(n.actor || '')}" style="cursor:pointer">${who}</span> <span class="ub">${esc(verb)}${n.channel ? ' - /' + esc(n.channel) : ''} - ${when(n.timestamp)}</span></div>
        ${body}${n.link ? `<a class="open" href="${esc(n.link)}" target="_blank" rel="noopener">open</a>` : ''}</div></div></div>`
  }
  async function draftAll() {
    const items = st.inbox.items.filter((it) => ANSWERABLE.has(it.type))
    if (!items.length) return
    meta.textContent = 'drafting...'
    try {
      const r = await fetch('/api/draft', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) })
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'draft failed')
      if (!d.available) { meta.textContent = 'drafts need OPENROUTER_API_KEY'; return }
      for (const it of st.inbox.items) if (d.drafts[it.hash]) it.draft = d.drafts[it.hash]
      meta.textContent = `${st.inbox.items.length} unanswered`; render()
    } catch (e) { meta.textContent = 'draft error: ' + e.message }
  }
  function inboxItem(item) {
    const chain = (item.thread && item.thread.length) ? item.thread : (item.parent ? [item.parent] : [])
    const thread = chain.length ? `<div class="thread">${chain.slice(-2).map((c) => `<div><span class="u">@${esc(c.user)}</span>: ${esc((c.text || '').slice(0, 160))}</div>`).join('')}</div>` : ''
    let draft = ''
    if (item.draft === 'SKIP') draft = `<div class="draft skip"><div class="lab">draft</div><div class="t">no reply needed</div></div>`
    else if (item.draft) draft = `<div class="draft"><div class="lab">draft in your voice</div><div class="t">${esc(item.draft)}</div></div>`
    let reply = ''
    if (item.sent) reply = `<div class="sent">sent - <a href="${esc(item.sentLink)}" target="_blank" rel="noopener">${esc(item.sentLink)}</a></div>`
    else if (ANSWERABLE.has(item.type)) {
      const val = item.replyText != null ? item.replyText : (item.draft && item.draft !== 'SKIP' ? item.draft : '')
      reply = item.armed
        ? `<div class="reply"><textarea readonly>${esc(val)}</textarea><div class="btns"><span class="note">send exactly this as @${esc(ME)}?</span>
             <button class="ibtn primary" data-act="iconfirm" data-hash="${esc(item.hash)}">${item.sending ? 'sending...' : 'yes, send'}</button>
             <button class="ibtn" data-act="icancel" data-hash="${esc(item.hash)}">cancel</button></div></div>`
        : `<div class="reply">${quickRow(item.hash)}<textarea data-ihash="${esc(item.hash)}" placeholder="reply, or draft above...">${esc(val)}</textarea>
             <div class="btns"><button class="ibtn" data-act="iarm" data-hash="${esc(item.hash)}">send reply</button></div></div>`
    }
    return `<div class="card" data-hash="${esc(item.hash)}">
      <div class="top"><div class="who">
        <div class="name"><span class="tag">${esc(item.type)}</span> <a href="${esc(item.link)}" target="_blank" rel="noopener">@${esc(item.user)}</a>
          <a class="open" href="${esc(item.link)}" target="_blank" rel="noopener">open</a></div>
        ${thread}
        <div class="body">${esc(item.text) || '<i>(no text)</i>'}</div>
        ${draft}${reply}
      </div></div>
    </div>`
  }
  function renderInbox() {
    const viewTabs = `<div class="subbar" style="padding-bottom:4px">
      <span class="chip ${st.inbox.view === 'reply' ? 'on' : ''}" data-act="inboxview" data-view="reply">to reply</span>
      <span class="chip ${st.inbox.view === 'activity' ? 'on' : ''}" data-act="inboxview" data-view="activity">all activity</span></div>`
    if (st.inbox.view === 'activity') {
      const chips = ['', ...HOME_CHANNELS].map((c) => `<span class="chip ${st.inbox.notifChannel === c ? 'on' : ''}" data-notifchan="${esc(c)}">${c ? '/' + esc(c) : 'everything'}</span>`).join(' ')
      const sub = viewTabs + `<div class="subbar" style="padding-top:0"><span class="ub" style="align-self:center">in:</span> ${chips}</div>`
      if (!st.inbox.loaded) return sub + '<div class="loading">loading activity...</div>'
      if (st.inbox.err) return sub + `<div class="err">${esc(st.inbox.err)}</div>`
      if (!st.inbox.notifs.length) return sub + `<div class="empty">no recent activity${st.inbox.notifChannel ? ' in /' + esc(st.inbox.notifChannel) : ''}.</div>`
      return sub + st.inbox.notifs.map(notifRow).join('')
    }
    const sub = viewTabs + `<div class="subbar">
      <button class="ibtn primary" data-act="draftall">draft all</button>
      <span class="chip ${st.inbox.showAll ? 'on' : ''}" data-act="toggleall">${st.inbox.showAll ? 'all types' : 'answerable only'}</span>
      <span class="chip ${st.inbox.priority ? 'on' : ''}" data-act="togglepriority">${st.inbox.priority ? 'priority sorted' : 'newest first'}</span></div>`
    if (!st.inbox.loaded) return sub + '<div class="loading">loading inbox...</div>'
    if (st.inbox.err) return sub + `<div class="err">${esc(st.inbox.err)}</div>`
    if (!st.inbox.items.length) return sub + '<div class="empty">inbox zero - everything answered.</div>'
    return sub + st.inbox.items.map(inboxItem).join('')
  }

  // ================= CHANNELS =================
  async function loadChannels(append) {
    if (!append) { st.channels.loaded = false; st.channels.cursor = null; render() }
    try {
      const url = `/api/feed?type=channel&id=${encodeURIComponent(st.channels.id)}&limit=30${append && st.channels.cursor ? '&cursor=' + encodeURIComponent(st.channels.cursor) : ''}`
      const r = await fetch(url)
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'channel failed')
      st.channels.casts = append ? st.channels.casts.concat(d.casts) : d.casts

  function encodeSnap(doc) {
    const bytes = new TextEncoder().encode(JSON.stringify(doc))
    let bin = ''; for (const b of bytes) bin += String.fromCharCode(b)
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
  }
  const snapUrl = (doc) => `https://zlank.online/s/${encodeSnap(doc)}`
  // decode a zlank snap URL back to its doc, so we can render it inline in-feed
  function decodeSnapUrl(url) {
    const m = /zlank\.online\/s\/([A-Za-z0-9_-]+)/.exec(url || ''); if (!m) return null
    try {
      let b64 = m[1].replace(/-/g, '+').replace(/_/g, '/'); b64 += b64.length % 4 ? '='.repeat(4 - b64.length % 4) : ''
      const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0))
      const d = JSON.parse(new TextDecoder().decode(bytes))
      return (d && (d.version === 1 || d.version === 2)) ? d : null

  }

      if (b.type === 'link') { const l = g('label'); if (l != null) b.label = l; const u = g('url'); if (u != null) b.url = u }

      try { const ed = er && (await er.json()); st.grow.empires = (ed && ed.empires) || [] } catch { st.grow.empires = [] }
    } catch (e) { st.grow.err = e.message; st.grow.loaded = true }

        <span class="lbn">${e.rank != null ? e.rank : '-'}</span></div>`
    }).join('')
    const empireSec = empires ? '<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">Empire Builder - top empires (read-only)</b></div>' + empires : ''
    return hdr
      + '<div class="subbar" style="padding-top:4px"><b style="color:#8a8a99;font-size:13px">your top fans - who engages you most (reply back, it compounds)</b></div>'
      + (eng || '<div class="subbar"><span class="ub">no recent engagers</span></div>')
      + '<div class="subbar"><b style="color:#8a8a99;font-size:13px">people to engage next</b></div>'
      + (suggest || '<div class="subbar"><span class="ub">no suggestions right now</span></div>')
      + empireSec
      + '<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">your top casts (by engagement)</b></div>'
      + (casts || '<div class="empty">no casts yet.</div>')

  // ================= DAILY (start-here dashboard) =================
  const todayStr = () => new Date().toISOString().slice(0, 10)
  const DAILY_DEFAULT = {
    date: todayStr(),
    tasks: [
      { t: 'post a GM', done: false },
      { t: 'clear inbox - reply or skip', done: false },
      { t: 'catch GM Farcaster', done: false },
      { t: 'engage 3 new people (Grow tab)', done: false },
      { t: 'check /zao + /wavewarz', done: false },
      { t: 'quote or boost 1 good cast', done: false },
    ],
    apps: [
      { label: 'GM Farcaster', url: 'https://gmfarcaster.com' },
      { label: 'Bountycaster', url: 'https://www.bountycaster.xyz' },
      { label: 'Paragraph', url: 'https://paragraph.xyz' },

    ],

  let daily = lsGet('zc_daily', null)
  if (!daily) { daily = DAILY_DEFAULT; lsSet('zc_daily', daily) }

  if (daily.date !== todayStr()) { daily.date = todayStr(); daily.tasks.forEach((x) => (x.done = false)); lsSet('zc_daily', daily) }
  const saveDaily = () => persist()

  // ================= GAME (streaks, XP, levels) =================
  const XP_PER_QUEST = 10
  let game = lsGet('zc_game', null)
  if (!game || typeof game !== 'object') game = { xp: 0, streak: 0, best: 0, lastDay: null, awarded: {}, badges: [] }
  if (!game.awarded || typeof game.awarded !== 'object') game.awarded = {}
  if (!Array.isArray(game.badges)) game.badges = []
  if (!game.history || typeof game.history !== 'object') game.history = {} // day -> {quests, xp}
  if (!game.weekGoal) game.weekGoal = 21 // quests per week target (3/day)
  // prune the award ledger to today only (per-day, so quests re-award tomorrow)
  for (const k of Object.keys(game.awarded)) if (k !== todayStr()) delete game.awarded[k]
  // prune the activity history to the last 14 days
  const keepFrom = (() => { const d = new Date(); d.setUTCDate(d.getUTCDate() - 14); return d.toISOString().slice(0, 10) })()
  for (const k of Object.keys(game.history)) if (k < keepFrom) delete game.history[k]
  const yesterdayStr = () => { const d = new Date(); d.setUTCDate(d.getUTCDate() - 1); return d.toISOString().slice(0, 10) }
  const levelFor = (xp) => Math.floor((xp || 0) / 100) + 1
  const xpInLevel = (xp) => (xp || 0) % 100
  // streak boosters (borrowed from Empire Builder) - longer streak = XP multiplier
  const boosterFor = (streak) => streak >= 30 ? 3 : streak >= 14 ? 2.5 : streak >= 7 ? 2 : streak >= 3 ? 1.5 : 1
  function nextBoostHint(streak) {
    const tiers = [[3, 1.5], [7, 2], [14, 2.5], [30, 3]]
    for (const [days, mult] of tiers) if (streak < days) return ` - ${days - streak}d to ${mult}x xp`
    return ' - max 3x boost'
  }
  // roll up the last `days` days of the activity ledger (default 7 = this week)
  function weeklyStats(days = 7) {
    let quests = 0, xp = 0, active = 0
    for (let i = 0; i < days; i++) {
      const d = new Date(); d.setUTCDate(d.getUTCDate() - i)
      const key = d.toISOString().slice(0, 10)
      const h = game.history[key]
      if (h) { quests += h.quests || 0; xp += h.xp || 0; if (h.quests > 0) active++ }
    }
    return { quests, xp, active }
  }
  const saveGame = () => { lsSet('zc_game', game); persist() }
  function toast(msg) {
    const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg
    document.body.appendChild(el)
    requestAnimationFrame(() => el.classList.add('show'))
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300) }, 2200)
  }
  const BADGES = [
    { id: 'first', name: 'First Quest', desc: 'complete a quest' },
    { id: 'streak3', name: 'On Fire', desc: '3-day streak' },
    { id: 'streak7', name: 'Week Strong', desc: '7-day streak' },
    { id: 'streak30', name: 'Unstoppable', desc: '30-day streak' },
    { id: 'perfect', name: 'Perfect Day', desc: 'all quests in one day' },
    { id: 'lv5', name: 'Level 5', desc: 'reach level 5' },
    { id: 'lv10', name: 'Level 10', desc: 'reach level 10' },
    { id: 'xp1k', name: 'Grinder', desc: '1000 total XP' },
  ]
  const badgeMet = (id, perfect) => {
    const g = game
    if (id === 'first') return (g.xp || 0) >= XP_PER_QUEST
    if (id === 'streak3') return (g.best || 0) >= 3
    if (id === 'streak7') return (g.best || 0) >= 7
    if (id === 'streak30') return (g.best || 0) >= 30
    if (id === 'perfect') return !!perfect
    if (id === 'lv5') return levelFor(g.xp) >= 5
    if (id === 'lv10') return levelFor(g.xp) >= 10
    if (id === 'xp1k') return (g.xp || 0) >= 1000
    return false
  }
  // returns newly-unlocked badge objects (for a toast)
  function unlockBadges(perfect) {
    const fresh = []
    for (const b of BADGES) if (!game.badges.includes(b.id) && badgeMet(b.id, perfect)) { game.badges.push(b.id); fresh.push(b) }
    return fresh
  }
  function awardQuest(i) {
    const day = todayStr()
    const done = new Set(game.awarded[day] || [])
    if (done.has(i)) return                 // already counted today
    done.add(i); game.awarded[day] = [...done]
    if (game.lastDay !== day) {              // first quest of the day moves the streak
      game.streak = (game.lastDay === yesterdayStr()) ? (game.streak || 0) + 1 : 1
      game.lastDay = day
      if (game.streak > (game.best || 0)) game.best = game.streak
    }
    // streak booster: a longer streak multiplies the XP each quest is worth
    const mult = boosterFor(game.streak || 0)
    const gain = Math.round(XP_PER_QUEST * mult)
    game.xp = (game.xp || 0) + gain
    const h = game.history[day] || { quests: 0, xp: 0 }   // per-day ledger for weekly recap
    h.quests += 1; h.xp += gain; game.history[day] = h
    const perfect = (daily.tasks || []).length > 0 && (daily.tasks || []).every((t) => t.done)
    const fresh = unlockBadges(perfect)
    saveGame()
    if (mult > 1) toast(`+${gain} xp (${mult}x streak boost)`)
    fresh.forEach((b, k) => setTimeout(() => toast(`Badge unlocked: ${b.name}`), 200 + k * 900))
  }

  let editDaily = false

    const pending = (scheduled || []).filter((s) => !s.sent).sort((a, b) => Date.parse(a.at) - Date.parse(b.at))
    const sched = pending.length ? `<div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">scheduled posts (${pending.length})</b></div>`
      + pending.map((s) => `<div class="urow" style="cursor:default"><div style="flex:1"><div>${esc((s.text || '').slice(0, 70))}</div>
        <div class="ub">${new Date(s.at).toLocaleString()}${s.channelId ? ' - /' + esc(s.channelId) : ''}</div></div>
        <span data-act="schedrm" data-id="${esc(s.id)}" class="ub" style="cursor:pointer;color:#ff8a6a">x</span></div>`).join('') : ''
    const nav = [
      ['feed', 'Feed', "who i follow"],
      ['inbox', 'Inbox', 'replies to me'],
      ['channels', 'Channels', 'zao / ww / zabal'],
      ['search', 'Search', 'ppl + casts'],
      ['compose', 'Post', 'new cast'],
      ['grow', 'Grow', 'new ppl'],
    ].map(([t, label, sub]) => `<div class="launch" data-act="goto" data-tab="${t}">
      <div class="ll">${label}</div><div class="ls">${sub}</div></div>`).join('')
    const statbar = `<div class="statbar">
      <div class="stat"><div class="sv">Lv ${levelFor(game.xp)}</div><div class="sl">level</div></div>
      <div class="stat"><div class="sv">${game.streak || 0}${boosterFor(game.streak || 0) > 1 ? ` <span class="boost">${boosterFor(game.streak || 0)}x</span>` : ''}</div><div class="sl">day streak</div></div>
      <div class="stat"><div class="sv">${game.best || 0}</div><div class="sl">best</div></div>
      <div class="stat"><div class="sv">${game.xp || 0}</div><div class="sl">total xp</div></div>
    </div>

    <div class="xphint">${100 - xpInLevel(game.xp)} xp to Lv ${levelFor(game.xp) + 1}${nextBoostHint(game.streak || 0)}${(game.streak || 0) >= 1 ? ` <span class="chip" data-act="share" data-kind="streak">share streak</span>` : ''}</div>`
    return `<div class="digest" style="background:#151529;border-color:#24242f"><div class="t" style="font-size:16px;display:flex;align-items:center;justify-content:space-between;gap:10px"><span>GM @${esc(ME)} - <b>${done}/${daily.tasks.length}</b> quests done today</span><span class="chip" data-act="editdaily" style="flex:none">${editDaily ? 'done' : 'edit'}</span></div></div>
      ${statbar}

      ${BRANDS.length ? `<div class="subbar" style="padding-bottom:4px"><b style="color:#8a8a99;font-size:13px">your projects</b> <span class="chip" data-act="allprojects">view all</span></div><div class="subbar" style="padding-top:0">${BRANDS.map((b, i) => `<span class="chip" data-act="brand" data-i="${i}">${esc(b.name)}</span>`).join(' ')}</div>` : ''}
      <div class="subbar"><b style="color:#8a8a99;font-size:13px">today's checklist</b></div>
      ${tasks}
      ${editDaily ? '<div class="searchbar" style="margin-top:6px"><input id="dTaskInput" placeholder="add a daily task..."><button class="ibtn" data-act="dtaskadd">add</button></div>' : ''}
      <div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">badges (${game.badges.length}/${BADGES.length})</b></div>
      <div class="badges">${BADGES.map((b) => { const on = game.badges.includes(b.id); return `<div class="badge ${on ? 'on' : ''}" title="${esc(b.desc)}"><div class="bn">${esc(b.name)}</div><div class="bd">${on ? `unlocked <span class="chip" data-act="share" data-kind="badge" data-val="${esc(b.name)}" style="padding:1px 7px;font-size:11px">share</span>` : esc(b.desc)}</div></div>` }).join('')}</div>
      ${(() => {
        const w = weeklyStats(7); const goal = game.weekGoal || 21; const pct = Math.min(100, Math.round((w.quests / goal) * 100))
        const days = []
        for (let i = 6; i >= 0; i--) { const d = new Date(); d.setUTCDate(d.getUTCDate() - i); const key = d.toISOString().slice(0, 10); days.push({ q: (game.history[key]?.quests) || 0, dow: ['S', 'M', 'T', 'W', 'T', 'F', 'S'][d.getUTCDay()], today: i === 0 }) }
        const maxQ = Math.max(1, ...days.map((x) => x.q))
        const spark = `<div class="spark">${days.map((x) => `<div class="sparkcol"><div class="sparkbar ${x.today ? 'today' : ''}" style="height:${Math.max(6, Math.round((x.q / maxQ) * 34))}px" title="${x.q} quests"></div><div class="sparkd">${x.dow}</div></div>`).join('')}</div>`
        return `<div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">this week</b> <span class="chip" data-act="weekgoal">goal ${goal}</span> <span class="chip" data-act="share" data-kind="week">share recap</span></div>

        ${spark}
        <div class="xpbar"><div class="xpfill" style="width:${pct}%"></div></div>
        <div class="xphint">${w.quests}/${goal} quests this week (${pct}%)</div>`
      })()}
      ${sched}
      <div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">mini apps</b></div>
      <div class="subbar">${apps || '<span class="ub">none</span>'}</div>

      <div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">communities to check</b></div>
      <div class="subbar">${comms || '<span class="ub">none</span>'}</div>
      ${editDaily ? '<div class="searchbar"><input id="dCommInput" placeholder="channel id (e.g. gmfarcaster)"><button class="ibtn" data-act="dcommadd">add</button></div>' : ''}
      <div class="subbar" style="margin-top:12px"><b style="color:#8a8a99;font-size:13px">group chats</b></div>
      <div class="subbar">${groups || '<span class="ub">none</span>'}</div>
      ${editDaily ? '<div class="searchbar"><input id="dGroupLabel" placeholder="group name" style="flex:1"><input id="dGroupUrl" placeholder="farcaster.xyz/~/group/..." style="flex:2"><button class="ibtn" data-act="dgroupadd">add</button></div>' : ''}`
  }

  // ================= DECK (columns) =================
  let deckMode = false
  function renderDeck() {

      : dropMuted(st.feed.casts).map(castCard).join('') || '<div class="empty">no casts.</div>'
    const inboxCol = !st.inbox.loaded ? '<div class="loading">loading...</div>'
      : (st.inbox.items.length ? st.inbox.items.map(inboxItem).join('') : '<div class="empty">inbox zero.</div>')
    const chanCol = !st.channels.loaded ? '<div class="loading">loading...</div>'

  function toggleDeck() {

    document.body.classList.toggle('deck', deckMode)
    document.getElementById('deckBtn').classList.toggle('on', deckMode)
    if (deckMode) { if (!st.feed.loaded) loadFeed(); if (!st.inbox.loaded) loadInbox(); if (!st.channels.loaded) loadChannels() }

  }

  // ================= RENDER + EVENTS =================
  function render() {
    document.querySelectorAll('.tabs button').forEach((b) => b.classList.toggle('on', b.dataset.tab === tab))
    if (deckMode) { meta.textContent = 'deck'; main.innerHTML = renderDeck(); return }
    if (tab === 'daily') { meta.textContent = ''; main.innerHTML = renderDaily() }
    else if (tab === 'feed') { meta.textContent = st.feed.loaded ? `${st.feed.casts.length} casts` : ''; main.innerHTML = renderFeed() }
    else if (tab === 'inbox') { meta.textContent = st.inbox.loaded ? `${st.inbox.items.length} unanswered` : ''; main.innerHTML = renderInbox() }
    else if (tab === 'channels') { meta.textContent = ''; main.innerHTML = renderChannels() }
    else if (tab === 'search') { meta.textContent = ''; main.innerHTML = renderSearch() }
    else if (tab === 'compose') { meta.textContent = ''; main.innerHTML = renderCompose() }
    else if (tab === 'grow') { meta.textContent = ''; main.innerHTML = renderGrow() }
  }

  function switchTab(t) {
    if (deckMode) { deckMode = false; document.body.classList.remove('deck'); document.getElementById('deckBtn').classList.remove('on') }
    tab = t; render()
    if (t === 'feed' && !st.feed.loaded) loadFeed()
    if (t === 'inbox' && !st.inbox.loaded) loadInbox()
    if (t === 'channels' && !st.channels.loaded) loadChannels()
    if (t === 'grow' && !st.grow.loaded) loadGrow()
    if (t === 'daily') checkAutoQuests()
    if (t === 'search') { const i = document.getElementById('searchInput'); if (i) i.focus() }
  }
  // auto-quests: tick quests Zaal actually completed today (gm posted, cast, replied)
  let autoQuestDay = null
  async function checkAutoQuests() {
    if (autoQuestDay === todayStr()) return
    autoQuestDay = todayStr()
    try {
      const d = await fetch('/api/feed?myactivity=1').then((r) => r.json())
      if (!d.activity) return
      const a = d.activity
      let changed = false
      daily.tasks.forEach((t, i) => {
        if (t.done) return
        const tx = (t.t || '').toLowerCase()
        let hit = false
        if (/\bgm\b/.test(tx) && a.gm) hit = true
        else if (/\bpost\b|\bcast\b/.test(tx) && a.posts >= 1) hit = true
        else if (/repl|inbox|engage/.test(tx)) { const m = tx.match(/(\d+)/); const need = m ? +m[1] : 1; if (a.replies >= need) hit = true }
        if (hit) { t.done = true; awardQuest(i); changed = true }
      })
      if (changed) { saveDaily(); render(); toast('quests auto-completed from your activity') }
    } catch { /* activity unreachable - manual ticking still works */ }
  }

  async function openThread(hash) {
    openOverlay('thread', '<div class="loading">loading thread...</div>')
    try {
      const r = await fetch(`/api/view?kind=thread&hash=${encodeURIComponent(hash)}`); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'thread failed')
      let html = ''
      for (const a of d.ancestors) html += castCard(a)
      if (d.cast) html += `<div class="focuscast">${castCard(d.cast)}</div>`
      for (const rep of d.replies) { html += castCard(rep); for (const s of (rep.sub || [])) html += `<div style="margin-left:14px">${castCard(s)}</div>` }
      document.getElementById('obody').innerHTML = html || '<div class="empty">no thread.</div>'
    } catch (e) { document.getElementById('obody').innerHTML = `<div class="err">${esc(e.message)}</div>` }
  }

  async function openBrand(i) {
    const b = BRANDS[i]; if (!b) return

  function openFilters() {
    openOverlay('filters', `<div class="obody">
      <div class="digest" style="background:#151529;border-color:#24242f"><div class="lab">muted words</div>
      <div class="ps" style="color:#8a8a99;margin-bottom:6px">casts containing any of these are hidden from feed, channels + search (this browser only)</div>
      <textarea id="mutedInput" style="width:100%;min-height:80px;background:#0e0e15;color:#e9e9ee;border:1px solid #24242f;border-radius:10px;padding:9px;font:inherit">${esc(muted.join(', '))}</textarea>
      <div class="btns" style="margin-top:8px"><button class="ibtn primary" data-act="savemuted">save</button>
      <span class="ps" style="color:#8a8a99">comma-separated</span></div></div></div>`)
  }
  document.getElementById('obody').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-act="savemuted"]'); if (!b) return
    const val = document.getElementById('mutedInput').value
    muted = val.split(',').map((w) => w.trim().toLowerCase()).filter(Boolean)
    persist(); closeOverlay(); render()
  })

  // ---- password gate ----
  const gate = document.getElementById('gate')
  async function pullState() {
    try {
      const r = await fetch('/api/state'); const d = await r.json()
      syncEnabled = !!d.enabled
      if (d.enabled && d.state) {
        const s = d.state
        if (Array.isArray(s.bookmarks)) { bookmarks = s.bookmarks; lsSet('zc_bookmarks', bookmarks) }
        if (Array.isArray(s.muted)) { muted = s.muted; lsSet('zc_muted', muted) }
        if (Array.isArray(s.scheduled)) { scheduled = s.scheduled; lsSet('zc_scheduled', scheduled) }
        if (Array.isArray(s.lists)) { lists = s.lists; lsSet('zc_lists', lists) }
        if (Array.isArray(s.savedSearches)) { savedSearches = s.savedSearches; lsSet('zc_searches', savedSearches) }
        if (s.statsHistory && typeof s.statsHistory === 'object') { statsHistory = s.statsHistory; lsSet('zc_statshist', statsHistory) }
        if (Array.isArray(s.savedSnaps)) { savedSnaps = s.savedSnaps; lsSet('zc_snaps', savedSnaps) }
        if (Array.isArray(s.feedback)) { feedback = s.feedback; lsSet('zc_feedback', feedback) }
        if (s.daily && typeof s.daily === 'object') {
          daily = s.daily
          daily.tasks = daily.tasks || []; daily.apps = daily.apps || []
          daily.communities = daily.communities || []; daily.groups = daily.groups || []
          if (daily.date !== todayStr()) { daily.date = todayStr(); daily.tasks.forEach((x) => (x.done = false)) }
          lsSet('zc_daily', daily)
        }
        if (s.game && typeof s.game === 'object') {
          game = s.game
          if (!game.awarded || typeof game.awarded !== 'object') game.awarded = {}
          if (!Array.isArray(game.badges)) game.badges = []
          if (!game.history || typeof game.history !== 'object') game.history = {}
          if (!game.weekGoal) game.weekGoal = 21
          for (const k of Object.keys(game.awarded)) if (k !== todayStr()) delete game.awarded[k]
          lsSet('zc_game', game)
        }
      }
    } catch { /* store unreachable - stay on localStorage */ }
  }
  let postingHealth = null
  async function checkPosting() {
    try { postingHealth = await fetch('/api/send').then((r) => r.json()); if (tab === 'compose') render() } catch {}
  }
  async function startApp() { gate.style.display = 'none'; await pullState(); switchTab('daily'); checkPosting() }
  async function submitPw() {
    const pw = document.getElementById('gatePw').value
    document.getElementById('gateErr').textContent = ''
    try {
      const r = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) })
      if (!r.ok) { document.getElementById('gateErr').textContent = 'wrong password'; return }
      startApp()
    } catch { document.getElementById('gateErr').textContent = 'error - try again' }
  }
  document.getElementById('gateBtn').addEventListener('click', submitPw)
  document.getElementById('gatePw').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPw() })
  function showGate() { gate.style.display = 'flex'; document.getElementById('gatePw').focus() }

  // ---- cmd+k command palette ----
  const palette = document.getElementById('palette')
  const palInput = document.getElementById('palInput')
  const palList = document.getElementById('palList')
  let palItems = [], palSel = 0
  const TABS = [['daily','Daily'],['feed','Feed'],['inbox','Inbox'],['channels','Channels'],['search','Search'],['compose','Compose'],['grow','Grow']]
  function palCommands(q) {
    const s = q.trim().toLowerCase()
    const cmds = []
    for (const [t, label] of TABS) if (!s || label.toLowerCase().includes(s)) cmds.push({ label: 'Go to ' + label, run: () => switchTab(t) })
    if (!s || 'draft all'.includes(s)) cmds.push({ label: 'Draft all (inbox)', run: () => { switchTab('inbox'); setTimeout(draftAll, 300) } })
    if (!s || 'what i missed digest'.includes(s)) cmds.push({ label: 'What I missed (digest)', run: () => { switchTab('feed'); setTimeout(loadDigest, 100) } })
    if (s.startsWith('@') && s.length > 1) cmds.unshift({ label: 'Open profile ' + q.trim(), run: () => openProfile(q.trim().slice(1)) })
    else if (s.length > 1) cmds.push({ label: 'Search for "' + q.trim() + '"', run: () => { st.search.q = q.trim(); switchTab('search'); runSearch() } })
    return cmds
  }
  function renderPal() {
    palItems = palCommands(palInput.value); palSel = 0
    palList.innerHTML = palItems.map((c, i) => `<div class="palrow" data-i="${i}" style="padding:11px 16px;cursor:pointer;${i === 0 ? 'background:#1e1e38' : ''}">${esc(c.label)}</div>`).join('') || '<div style="padding:14px 16px;color:#8a8a99">no match</div>'
  }
  function openPalette() { palette.style.display = 'block'; palInput.value = ''; renderPal(); palInput.focus() }
  function closePalette() { palette.style.display = 'none' }
  function runPal(i) { const c = palItems[i]; if (c) { closePalette(); c.run() } }
  palInput.addEventListener('input', renderPal)
  palInput.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { palSel = Math.min(palSel + 1, palItems.length - 1); highlightPal(); e.preventDefault() }
    else if (e.key === 'ArrowUp') { palSel = Math.max(palSel - 1, 0); highlightPal(); e.preventDefault() }
    else if (e.key === 'Enter') { runPal(palSel); e.preventDefault() }
    else if (e.key === 'Escape') closePalette()
  })
  function highlightPal() { palList.querySelectorAll('.palrow').forEach((r, i) => r.style.background = i === palSel ? '#1e1e38' : '') }
  palList.addEventListener('click', (e) => { const r = e.target.closest('.palrow'); if (r) runPal(Number(r.dataset.i)) })
  palette.addEventListener('click', (e) => { if (e.target === palette) closePalette() })
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); palette.style.display === 'block' ? closePalette() : openPalette() }
  })

  // brand the UI from config.js (name, channels, Daily seed) so a fork adapts
  function applyConfig(cfg) {
    if (!cfg) return
    if (cfg.username) ME = cfg.username
    if (Array.isArray(cfg.quickReplies) && cfg.quickReplies.length) QUICK = cfg.quickReplies
    if (Array.isArray(cfg.brands)) BRANDS = cfg.brands
    if (cfg.fid) OWNER_FID = String(cfg.fid)
    if (cfg.appName) {
      APPNAME = cfg.appName
      document.title = cfg.appName
      const m = cfg.appName.match(/^(.*?)(caster)$/i)
      document.getElementById('wordmark').innerHTML = m ? `${esc(m[1])}<span>${esc(m[2])}</span>` : esc(cfg.appName)
    }
    if (Array.isArray(cfg.homeChannels) && cfg.homeChannels.length) {
      HOME_CHANNELS = cfg.homeChannels
      if (!st.channels.id || st.channels.id === 'zao') st.channels.id = HOME_CHANNELS[0]
    }
    // seed Daily from config only when the user has nothing yet (fresh fork)
    if (cfg.daily && !localStorage.getItem('zc_daily')) { daily = { date: todayStr(), ...cfg.daily }; lsSet('zc_daily', daily) }
  }

  // Mini App welcome: when a NON-owner opens zaalcaster inside Farcaster, greet
  // them and nudge their first post to ask @zaal about it (composed as THEM via
  // the SDK - native composer, they hit send). A word-of-mouth growth loop.
  let welcomeShown = false
  function maybeWelcome() {
    if (welcomeShown) return
    if (!OWNER_FID) return                            // config not loaded yet - retry later
    const u = window.__fcuser
    if (!u || !u.fid) return                         // not in a mini-app host
    if (OWNER_FID && String(u.fid) === OWNER_FID) return // the owner - no nudge
    if (localStorage.getItem('zc_welcomed')) return  // already greeted this device
    welcomeShown = true
    const owner = ME || 'zaal'
    const el = document.createElement('div'); el.id = 'welcome'
    el.innerHTML = `<div class="wcard">
      <div class="wtitle">gm${u.username ? ' @' + esc(u.username) : ''}</div>
      <div class="wsub">you found <b>${esc(APPNAME || 'zaalcaster')}</b> - @${esc(owner)}'s gamified farcaster client.</div>
      <div class="wsub" style="margin-top:6px">say hi - make your first post asking what it is. it posts as you.</div>
      <button class="ibtn primary" id="wpost" style="margin-top:14px;width:100%">gm @${esc(owner)} what is ${esc(APPNAME || 'zaalcaster')}?</button>
      <div style="margin-top:10px"><a class="chip" href="https://github.com/bettercallzaal/zaalcaster" target="_blank" rel="noopener" style="text-decoration:none">make your own</a> <span class="chip" id="wskip">skip</span></div>
    </div>`
    document.body.appendChild(el)
    document.getElementById('wpost').addEventListener('click', async () => {
      try { await window.__fcsdk.actions.composeCast({ text: `gm @${owner} what is ${APPNAME || 'zaalcaster'}?` }) } catch {}
      localStorage.setItem('zc_welcomed', '1'); el.remove()
    })
    document.getElementById('wskip').addEventListener('click', () => { localStorage.setItem('zc_welcomed', '1'); el.remove() })
  }
  window.addEventListener('fc-ready', maybeWelcome)

  // In-app feedback: jot a note from any tab; it syncs and I read it from the
  // terminal (node bin/feedback.js). Captures the current tab + time.
  let fbRec = null
  function openFeedback() {
    const el = document.createElement('div'); el.id = 'fbmodal'
    document.body.appendChild(el)
    fbRender(el)
    el.addEventListener('click', (e) => { if (e.target === el) { if (fbRec) { try { fbRec.stop() } catch {} } el.remove() } })
  }
  function fbRender(el) {
    const list = feedback.length
      ? feedback.slice(0, 20).map((f, i) => `<div class="fbitem"><div style="flex:1;min-width:0"><div class="ub">[${esc(f.tab || '?')}] ${f.at ? new Date(f.at).toLocaleString() : ''}</div><div>${esc(f.text)}</div></div><span data-fbrm="${i}" style="cursor:pointer;color:#ff8a6a;padding:0 4px">x</span></div>`).join('')
      : '<div class="ub">no notes yet - type or speak one above</div>'
    el.innerHTML = `<div class="fbcard">
      <div style="font-weight:700;font-size:16px">feedback / notes</div>
      <div class="ub">on the "${esc(tab)}" tab. type it, or tap mic and speak. i read these on the dev side.</div>
      <textarea id="fbtext" placeholder="bug, idea, anything..."></textarea>
      <div class="btns" style="margin-top:10px"><button class="ibtn primary" data-fbact="send">log it</button><button class="ibtn" data-fbact="mic" id="fbmic">${fbRec ? 'stop' : 'mic'}</button><button class="ibtn" data-fbact="close">close</button></div>
      <div class="subbar" style="margin-top:14px;padding-bottom:4px"><b style="color:#8a8a99;font-size:13px">logged (${feedback.length})</b>${feedback.length ? '<span class="chip" data-fbact="clearall">clear all</span>' : ''}</div>
      <div class="fblist">${list}</div>
    </div>`
    const ta = document.getElementById('fbtext'); if (ta && !fbRec) ta.focus()
    el.querySelector('.fbcard').onclick = (e) => {
      const rm = e.target.closest('[data-fbrm]'); if (rm) { feedback.splice(+rm.dataset.fbrm, 1); persist(); fbRender(el); return }
      const b = e.target.closest('[data-fbact]'); if (!b) return
      const act = b.dataset.fbact
      if (act === 'close') { if (fbRec) { try { fbRec.stop() } catch {} } el.remove(); return }
      if (act === 'send') { const t = (document.getElementById('fbtext').value || '').trim(); if (!t) return; feedback.unshift({ text: t, tab, at: new Date().toISOString() }); feedback = feedback.slice(0, 200); persist(); toast('logged'); fbRender(el); return }
      if (act === 'clearall') { if (window.confirm('clear all your logged feedback?')) { feedback = []; persist(); fbRender(el) } return }
      if (act === 'mic') { fbMic(b); return }
    }
  }
  function fbMic(btn) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { toast('voice input needs Chrome/Safari'); return }
    if (fbRec) { try { fbRec.stop() } catch {}; return }
    const ta = document.getElementById('fbtext'); const base = ta && ta.value ? ta.value.trim() + ' ' : ''
    let finalText = ''
    fbRec = new SR(); fbRec.lang = 'en-US'; fbRec.interimResults = true; fbRec.continuous = true
    fbRec.onresult = (e) => { let interim = ''; for (let i = e.resultIndex; i < e.results.length; i++) { const r = e.results[i]; if (r.isFinal) finalText += r[0].transcript + ' '; else interim += r[0].transcript } const t = document.getElementById('fbtext'); if (t) t.value = base + finalText + interim }
    fbRec.onend = () => { fbRec = null; const b = document.getElementById('fbmic'); if (b) { b.textContent = 'mic'; b.classList.remove('on') } }
    fbRec.onerror = () => { fbRec = null; const b = document.getElementById('fbmic'); if (b) { b.textContent = 'mic'; b.classList.remove('on') }; toast('mic error - check permissions') }
    try { fbRec.start(); btn.textContent = 'stop'; btn.classList.add('on'); toast('listening - speak now') } catch { fbRec = null }
  }
  const fabEl = document.getElementById('fab'); if (fabEl) fabEl.addEventListener('click', openFeedback)

  // boot: check whether a password is required before loading anything
  ;(async () => {
    try {
      const r = await fetch('/api/auth')
      const d = await r.json()
      applyConfig(d.config)
      maybeWelcome() // owner+viewer known now; no-op if SDK context not ready (fc-ready will retry)
      if (d.enabled && !d.authed) showGate()
      else startApp()
    } catch { startApp() } // auth endpoint unreachable (e.g. gate off) - proceed
  })()
</script>
<!-- Farcaster Mini App SDK: when opened inside a Farcaster client, hide the splash
     once loaded. Harmless (no-op) in a normal browser. Loaded from CDN. -->
<script type="module">
  try {
    const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk')
    window.__fcsdk = sdk
    try { const ctx = await sdk.context; window.__fcuser = ctx && ctx.user ? ctx.user : null } catch {}
    // give the app a tick to paint, then tell the host we are ready
    setTimeout(() => { try { sdk.actions.ready() } catch {} }, 300)
    window.dispatchEvent(new CustomEvent('fc-ready'))
  } catch { /* not in a mini-app host, or CDN blocked - web app works as normal */ }
</script>
</body>
</html>
