        <div class="urow" style="cursor:default"><input class="sfin" id="wiz_lp_purpose" value="${esc(launchForm.purpose)}" placeholder="one line on what it funds (optional)" style="flex:1;margin:0"></div>
        <div class="subbar" style="margin-top:8px"><span class="chip" data-act="wizlaunchprep">prefill Post tab</span></div>`
    }

    // Progress bar
    const progressBars = wizard.steps.map((s, i) => {
      const completed = i < wizard.currentStep - 1
      const current = i === wizard.currentStep - 1
      return `<div style="flex:1;height:3px;background:${completed ? '#3fbf7f' : (current ? '#f5a623' : '#24242f')};border-radius:1px"></div>`
    }).join('<div style="width:4px"></div>')

    content = `<div style="display:flex;gap:4px;margin-top:8px;margin-bottom:8px">${progressBars}</div>` + content

    // Navigation
    let navChips = ''
    if (wizard.currentStep > 1) {
      navChips += `<span class="chip" data-act="wizprev">back</span>`
    }
    if (wizard.currentStep < 5) {
      navChips += `<span class="chip" data-act="wiznext">next</span>`
    } else {
      navChips += `<span class="chip" data-act="wizdone">done</span>`
    }
    content += `<div class="subbar" style="margin-top:10px">${navChips}</div>`

    return content
  }

  // ===== Create a tokenless Empire (Empire Builder) =====
  // The one thing this app is NOT allowed to do is sign anything or hold a
  // key - the owner wallet signs the required message right here, in the
  // browser, in whatever wallet is available. The server (api/stats.js) only
  // relays the already-signed payload with its own service API key. Research
  // doc 1092 (2026-07-14 call w/ Adrian, Empire Builder cofounder) is the
  // source for the exact request shape + the profile-permanence warning below.
  const empireDeploy = { mode: 'custom', name: '', bio: '', logoUri: '', address: null, connecting: false, busy: false, result: null, err: null }
  function empireSaveDraftInputs() {
    const n = document.getElementById('emp_name'), b = document.getElementById('emp_bio'), l = document.getElementById('emp_logo')
    if (n) empireDeploy.name = n.value
    if (b) empireDeploy.bio = b.value
    if (l) empireDeploy.logoUri = l.value
  }

  // Farcaster mini-app wallet first (seamless inside Warpcast/Base app),
  // else whatever the browser injects (MetaMask, Coinbase Wallet, etc). No
  // WalletConnect yet - covers desktop + any wallet's built-in dApp browser.
  // The mini-app SDK's real API is the async sdk.wallet.getEthereumProvider()
  // (a method, not a plain .ethProvider property - an earlier version of
  // this code guessed wrong, which silently fell through to a raw
  // window.ethereum and threw an opaque error). Outside a Farcaster client
  // host the method itself may not behave, so it's wrapped defensively.
  async function getEthProvider() {
    if (window.__fcsdk && window.__fcsdk.wallet && typeof window.__fcsdk.wallet.getEthereumProvider === 'function') {
      try {
        const p = await window.__fcsdk.wallet.getEthereumProvider()
        if (p) return p
      } catch {
        // not inside a Farcaster client host, or no wallet configured there - fall through
      }
    }
    if (window.ethereum) return window.ethereum
    return null
  }

  // Which overlay's renderer to call back after a wallet connect - the
  // create-empire and add-booster forms share the connect button + the
  // connected address (empireDeploy.address is the single wallet slot).
  let walletRerender = () => renderCreateEmpire()
  async function connectEmpireWallet() {
    const provider = await getEthProvider()
    if (!provider) { toast('no wallet found - open this in a wallet app browser, or install MetaMask/Coinbase Wallet'); return }
    empireSaveDraftInputs()
    boosterSaveDraftInputs()
    stakingSaveDraftInputs()
    empireDeploy.connecting = true; walletRerender()
    try {
      const accounts = await provider.request({ method: 'eth_requestAccounts' })
      empireDeploy.address = accounts && accounts[0] ? accounts[0] : null
      if (!empireDeploy.address) toast('no account returned by wallet')
    } catch (e) {
      toast('wallet connect failed: ' + (e && e.message ? e.message : 'unknown error'))
    } finally {
      empireDeploy.connecting = false; walletRerender()
    }
  }

  function empireMessage(name) {
    return `I am deploying a custom tokenless Empire named ${name}`
  }

  async function signAndDeployEmpire() {
    empireSaveDraftInputs()
    const name = (empireDeploy.name || '').trim()
    const bio = (empireDeploy.bio || '').trim()
    const logoUri = (empireDeploy.logoUri || '').trim()
    if (!name) { toast('empire name is required'); return }
    if (!empireDeploy.address) { toast('connect a wallet first'); return }
    const message = empireMessage(name)

    if (!window.confirm(`Your wallet will sign this exact message:\n\n"${message}"\n\nThen deploy the empire on Empire Builder. Continue?`)) return

    const provider = await getEthProvider()
    if (!provider) { toast('no wallet found'); return }

    empireDeploy.busy = true; empireDeploy.err = null; renderCreateEmpire()
    try {
      const signature = await provider.request({ method: 'personal_sign', params: [message, empireDeploy.address] })
      const body = { mode: 'custom', owner: empireDeploy.address, name, signature, message }
      if (bio) body.bio = bio
      if (logoUri) body.logoUri = logoUri

      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'deploy failed')
      empireDeploy.result = d.empire
      // Mark wizard step 3 as complete if we're in the wizard
      if (wizard.currentStep === 3) {
        wizard.empireCreated = true
        saveWizardState()
      }
      toast('empire deployed')
    } catch (e) {
      empireDeploy.err = e && e.message ? e.message : 'deploy failed'
    } finally {
      empireDeploy.busy = false; renderCreateEmpire()
    }
  }

  function renderCreateEmpire() {
    if (empireDeploy.result) {
      const emp = empireDeploy.result.empire || {}
      document.getElementById('obody').innerHTML = `<div class="digest"><div class="t"><b>Empire deployed</b></div>
        <div class="ub" style="margin-top:6px">name: ${esc(emp.name || '')}</div>
        <div class="ub">base token / id: ${esc(empireDeploy.result.baseToken || emp.baseToken || '')}</div>
        <div class="ub">empire address: ${esc(empireDeploy.result.empireAddress || emp.empireAddress || '')}</div>
        <div class="ub" style="margin-top:8px">Set this as <code>empireOwnerWallet</code> in config.js to see it on the Grow tab rank card.</div></div>`
      return
    }
    const short = empireDeploy.address ? `${empireDeploy.address.slice(0, 6)}...${empireDeploy.address.slice(-4)}` : null
    const walletLine = empireDeploy.address
      ? `<div class="ub">connected: ${esc(short)}</div>`
      : `<span class="chip" data-act="connectwallet">${empireDeploy.connecting ? 'connecting...' : 'connect wallet'}</span>`
    document.getElementById('obody').innerHTML = `<div class="ps" style="margin-bottom:8px">Deploys a real tokenless empire on Empire Builder (empirebuilder.world). No token, no funds move - just a name + treasury address. You sign in your own wallet; nothing here holds a key.</div>
      <div class="urow" style="cursor:default;margin-top:8px"><input class="sfin" id="emp_name" value="${esc(empireDeploy.name)}" placeholder="empire name" style="flex:1;margin:0"></div>
      <div class="urow" style="cursor:default"><textarea class="sfin" id="emp_bio" placeholder="bio (optional)" rows="2" style="flex:1;margin:0;resize:vertical">${esc(empireDeploy.bio)}</textarea></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="emp_logo" value="${esc(empireDeploy.logoUri)}" placeholder="logo URL (optional)" style="flex:1;margin:0"></div>
      <div class="subbar" style="margin-top:8px">${walletLine}</div>
      ${empireDeploy.err ? `<div class="err" style="margin-top:6px">${esc(empireDeploy.err)}</div>` : ''}
      <div class="subbar" style="margin-top:10px"><span class="chip" data-act="deployempire">${empireDeploy.busy ? 'deploying...' : 'sign & deploy'}</span></div>`
  }

  function openCreateEmpire() {
    empireDeploy.mode = 'custom'; empireDeploy.result = null; empireDeploy.err = null
    walletRerender = () => renderCreateEmpire()
    openOverlay('Create empire', '')
    renderCreateEmpire()
  }

  // ===== Add a booster (Empire Builder write slice 2, doc 1094a) =====
  // ERC20 / NFT / QUOTIENT score multipliers. Same trust model as
  // create-empire: the owner wallet signs the docs' exact message
  // ("Add booster for empire id <id>"), the server only relays.
  // remove-booster is deliberately NOT built - its message contract is
  // undocumented, pending Adrian's confirmation.
  const boosterForm = { type: 'ERC20', contract: '', amount: '', decimals: '18', tokenId: '', name: '', symbol: '', logo: '', busy: false, err: null, done: false }
  const ZERO_ADDRESS = '0x0000000000000000000000000000000000000000'
  function boosterSaveDraftInputs() {
    for (const [id, key] of [['bf_contract', 'contract'], ['bf_amount', 'amount'], ['bf_decimals', 'decimals'], ['bf_tokenid', 'tokenId'], ['bf_name', 'name'], ['bf_symbol', 'symbol'], ['bf_logo', 'logo']]) {
      const el = document.getElementById(id)
      if (el) boosterForm[key] = el.value
    }
    const m = document.getElementById('bf_mult')
    if (m) boosterForm.multiplier = m.value
  }
  // "1.5" tokens at 18 decimals -> "1500000000000000000", pure string/BigInt
  // math so no float precision loss on big amounts.
  function toRawUnits(amountStr, decimals) {
    const s = String(amountStr).trim()
    if (!/^\d+(\.\d+)?$/.test(s)) return null
    const d = Number(decimals)
    if (!Number.isInteger(d) || d < 0 || d > 36) return null
    const [whole, frac = ''] = s.split('.')
    if (frac.length > d) return null
    try { return (BigInt(whole) * (10n ** BigInt(d)) + BigInt(frac.padEnd(d, '0') || '0')).toString() } catch { return null }
  }
  async function signAndAddBooster() {
    boosterSaveDraftInputs()
    const empireId = st.grow.data?.empire?.id
    if (!empireId) { toast('no empire loaded'); return }
    if (!empireDeploy.address) { toast('connect a wallet first'); return }
    const isQuotient = boosterForm.type === 'QUOTIENT'
    const contract = isQuotient ? ZERO_ADDRESS : (boosterForm.contract || '').trim()
    if (!/^0x[a-fA-F0-9]{40}$/.test(contract)) { toast('contract address required'); return }
    const multiplier = Number(boosterForm.multiplier)
    if (!Number.isFinite(multiplier) || multiplier < 1.1 || multiplier > 5) { toast('multiplier must be between 1.1 and 5.0'); return }
    const minAmount = toRawUnits(boosterForm.amount, isQuotient ? 0 : boosterForm.decimals)
    if (!minAmount) { toast('min amount must be a number (check decimals)'); return }
    const name = (boosterForm.name || '').trim(), symbol = (boosterForm.symbol || '').trim()
    if (!name || !symbol) { toast('token name + symbol required (for display on Empire Builder)'); return }
    const message = `Add booster for empire id ${empireId}`

    if (!window.confirm(`Your wallet will sign:\n\n"${message}"\n\nThen add a ${boosterForm.type} booster (${multiplier}x, min ${boosterForm.amount}${isQuotient ? '' : ' ' + symbol}). Continue?`)) return
    const provider = await getEthProvider()
    if (!provider) { toast('no wallet found'); return }

    boosterForm.busy = true; boosterForm.err = null; renderAddBooster()
    try {
      const signature = await provider.request({ method: 'personal_sign', params: [message, empireDeploy.address] })
      const body = {
        action: 'add_booster', empireId,
        booster: { type: boosterForm.type, contractAddress: contract, multiplier, requirement: { minAmount }, chainId: 8453, tokenId: (boosterForm.type === 'NFT' && boosterForm.tokenId.trim()) ? boosterForm.tokenId.trim() : null },
        tokenInfo: { name, symbol, ...(boosterForm.logo.trim() ? { logoURI: boosterForm.logo.trim() } : {}) },
        signer: empireDeploy.address, signature, message,
      }
      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'add booster failed')
      boosterForm.done = true
      toast('booster added')
    } catch (e) {
      boosterForm.err = e && e.message ? e.message : 'add booster failed'
    } finally {
      boosterForm.busy = false; renderAddBooster()
    }
  }
  function renderAddBooster() {
    const ob = document.getElementById('obody')
    if (!ob) return
    if (boosterForm.done) {
      ob.innerHTML = '<div class="digest"><div class="t"><b>Booster added</b></div><div class="ub" style="margin-top:6px">It will show on the Empire tab within a minute (reads are cached 60s).</div></div>'
      return
    }
    const isQ = boosterForm.type === 'QUOTIENT'
    const short = empireDeploy.address ? `${empireDeploy.address.slice(0, 6)}...${empireDeploy.address.slice(-4)}` : null
    const walletLine = empireDeploy.address ? `<div class="ub">connected: ${esc(short)}</div>` : `<span class="chip" data-act="connectwallet">${empireDeploy.connecting ? 'connecting...' : 'connect wallet'}</span>`
    const typeChips = ['ERC20', 'NFT', 'QUOTIENT'].map((t) => `<span class="chip ${boosterForm.type === t ? 'on' : ''}" data-act="btype" data-type="${t}">${t === 'QUOTIENT' ? 'reputation (QUOTIENT)' : t}</span>`).join('')
    ob.innerHTML = `<div class="ps" style="margin-bottom:8px">Adds a score multiplier to your empire's leaderboards: hold the token/NFT (or clear the reputation score) and your points get boosted. You sign in your own wallet.</div>
      <div class="subbar" style="padding-top:0">${typeChips}</div>
      ${isQ ? '' : `<div class="urow" style="cursor:default;margin-top:8px"><input class="sfin" id="bf_contract" value="${esc(boosterForm.contract)}" placeholder="${boosterForm.type === 'NFT' ? 'NFT contract address' : 'token contract address'}" style="flex:1;margin:0"></div>`}
      <div class="urow" style="cursor:default"><input class="sfin" id="bf_mult" value="${esc(boosterForm.multiplier || '')}" placeholder="multiplier (1.1 - 5.0)" style="flex:1;margin:0"></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="bf_amount" value="${esc(boosterForm.amount)}" placeholder="${isQ ? 'min reputation score' : 'min amount to qualify (in tokens)'}" style="flex:1;margin:0">${isQ ? '' : `<input class="sfin" id="bf_decimals" value="${esc(boosterForm.decimals)}" placeholder="decimals" title="token decimals - 18 for most ERC20s, 0 for NFT count" style="width:80px;margin:0">`}</div>
      ${boosterForm.type === 'NFT' ? `<div class="urow" style="cursor:default"><input class="sfin" id="bf_tokenid" value="${esc(boosterForm.tokenId)}" placeholder="token id (ERC-1155 only, else leave blank)" style="flex:1;margin:0"></div>` : ''}
      <div class="urow" style="cursor:default"><input class="sfin" id="bf_name" value="${esc(boosterForm.name)}" placeholder="token/NFT display name" style="flex:1;margin:0"><input class="sfin" id="bf_symbol" value="${esc(boosterForm.symbol)}" placeholder="symbol" style="width:100px;margin:0"></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="bf_logo" value="${esc(boosterForm.logo)}" placeholder="logo URL (optional)" style="flex:1;margin:0"></div>
      <div class="subbar" style="margin-top:8px">${walletLine}</div>
      ${boosterForm.err ? `<div class="err" style="margin-top:6px">${esc(boosterForm.err)}</div>` : ''}
      <div class="subbar" style="margin-top:10px"><span class="chip" data-act="bsubmit">${boosterForm.busy ? 'adding...' : 'sign & add booster'}</span></div>`
  }
  function openAddBooster() {
    boosterForm.busy = false; boosterForm.err = null; boosterForm.done = false
    walletRerender = () => renderAddBooster()
    openOverlay('Add booster', '')
    renderAddBooster()
  }

  // ===== Staking (Empire Builder write slice 3, doc 1094a) =====
  // Two flows sharing one overlay: add a staking booster (multiplier for
  // LOCKING tokens a minimum duration - vs a regular booster's hold-only
  // check) and activate staking (turns staking on + auto-creates a stakers
  // leaderboard). Same wallet-sign relay trust model as the other Empire
  // writes. Activate's message embeds a ms timestamp (5-min validity) -
  // Empire Builder's own replay protection, unique to this endpoint.
  const stakingForm = { minStake: '', decimals: '18', lockupDays: '', multiplier: '', busy: false, err: null, done: false }
  function stakingSaveDraftInputs() {
    for (const [id, key] of [['sf_amount', 'minStake'], ['sf_decimals', 'decimals'], ['sf_lockup', 'lockupDays'], ['sf_mult', 'multiplier']]) {
      const el = document.getElementById(id)
      if (el) stakingForm[key] = el.value
    }
  }
  async function signAndAddStakingBooster() {
    stakingSaveDraftInputs()
    const empireId = st.grow.data?.empire?.id
    if (!empireId) { toast('no empire loaded'); return }
    if (!empireDeploy.address) { toast('connect a wallet first'); return }
    const minStake = toRawUnits(stakingForm.minStake, stakingForm.decimals)
    if (!minStake) { toast('min stake must be a number (check decimals)'); return }
    const days = Number(stakingForm.lockupDays)
    if (!Number.isFinite(days) || days < 0 || days > 3650) { toast('lockup must be 0-3650 days'); return }
    const minLockupSeconds = Math.round(days * 86400)
    const multiplier = Number(stakingForm.multiplier)
    if (!Number.isFinite(multiplier) || multiplier < 1.1 || multiplier > 5 || Math.round(multiplier * 10) !== multiplier * 10) { toast('multiplier must be 1.1-5.0, one decimal max'); return }
    const message = `Add staking booster for empire id ${empireId}`
    if (!window.confirm(`Your wallet will sign:\n\n"${message}"\n\nThen add a staking booster (${multiplier}x for locking ${stakingForm.minStake} tokens ${days} day${days === 1 ? '' : 's'}+). Continue?`)) return
    const provider = await getEthProvider()
    if (!provider) { toast('no wallet found'); return }
    stakingForm.busy = true; stakingForm.err = null; renderStaking()
    try {
      const signature = await provider.request({ method: 'personal_sign', params: [message, empireDeploy.address] })
      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'add_staking_booster', empireId, minStake, minLockupSeconds, multiplier, signer: empireDeploy.address, signature, message }) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'add staking booster failed')
      stakingForm.done = true
      toast('staking booster added')
    } catch (e) {
      stakingForm.err = e && e.message ? e.message : 'failed'
    } finally {
      stakingForm.busy = false; renderStaking()
    }
  }
  async function signAndActivateStaking() {
    const empireId = st.grow.data?.empire?.id
    if (!empireId) { toast('no empire loaded'); return }
    if (!empireDeploy.address) { toast('connect a wallet first'); return }
    const timestamp = Date.now()
    const message = `Activate staking for empire ${String(empireId).toLowerCase()} at ${timestamp}`
    if (!window.confirm(`Your wallet will sign:\n\n"${message}"\n\nThen activate staking for this empire (auto-creates a stakers leaderboard). The signature is only valid for 5 minutes. Continue?`)) return
    const provider = await getEthProvider()
    if (!provider) { toast('no wallet found'); return }
    stakingForm.busy = true; stakingForm.err = null; renderStaking()
    try {
      const signature = await provider.request({ method: 'personal_sign', params: [message, empireDeploy.address] })
      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'activate_staking', empireId, timestamp, signer: empireDeploy.address, signature, message }) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'activate staking failed')
      stakingForm.done = true
      toast(d.staking?.alreadyActive ? 'staking was already active' : 'staking activated')
    } catch (e) {
      stakingForm.err = e && e.message ? e.message : 'failed'
    } finally {
      stakingForm.busy = false; renderStaking()
    }
  }
  function renderStaking() {
    const ob = document.getElementById('obody')
    if (!ob) return
    if (stakingForm.done) {
      ob.innerHTML = '<div class="digest"><div class="t"><b>Done</b></div><div class="ub" style="margin-top:6px">Staking changes show on the Empire tab within a minute (reads are cached 60s).</div></div>'
      return
    }
    const activated = !!st.grow.data?.empire?.staking?.activated
    const short = empireDeploy.address ? `${empireDeploy.address.slice(0, 6)}...${empireDeploy.address.slice(-4)}` : null
    const walletLine = empireDeploy.address ? `<div class="ub">connected: ${esc(short)}</div>` : `<span class="chip" data-act="connectwallet">${empireDeploy.connecting ? 'connecting...' : 'connect wallet'}</span>`
    ob.innerHTML = `<div class="ps" style="margin-bottom:8px">Staking rewards people who LOCK tokens, not just hold them. Two moves here: activate staking for the empire (once), then add staking boosters (multiplier for a minimum lock).</div>
      <div class="digest" style="margin-bottom:8px"><div class="ub">staking status: <b style="color:${activated ? '#3fbf7f' : '#8a8a99'}">${activated ? 'active' : 'not activated'}</b>${activated ? '' : ' - note: Empire Builder documents this for token empires; on a tokenless empire the API may reject it'}</div>
      ${activated ? '' : `<div style="margin-top:6px"><span class="chip" data-act="stakeactivate">${stakingForm.busy ? 'working...' : 'sign & activate staking'}</span></div>`}</div>
      <div class="subbar" style="padding-top:0"><b style="color:#8a8a99;font-size:13px">add a staking booster</b></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="sf_amount" value="${esc(stakingForm.minStake)}" placeholder="min stake (in tokens)" style="flex:1;margin:0"><input class="sfin" id="sf_decimals" value="${esc(stakingForm.decimals)}" placeholder="decimals" style="width:80px;margin:0"></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="sf_lockup" value="${esc(stakingForm.lockupDays)}" placeholder="min lockup (days, 0 = none)" style="flex:1;margin:0"></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="sf_mult" value="${esc(stakingForm.multiplier)}" placeholder="multiplier (1.1 - 5.0, one decimal)" style="flex:1;margin:0"></div>
      <div class="subbar" style="margin-top:8px">${walletLine}</div>
      ${stakingForm.err ? `<div class="err" style="margin-top:6px">${esc(stakingForm.err)}</div>` : ''}
      <div class="subbar" style="margin-top:10px"><span class="chip" data-act="stakesubmit">${stakingForm.busy ? 'working...' : 'sign & add staking booster'}</span></div>`
  }
  function openStaking() {
    stakingForm.busy = false; stakingForm.err = null; stakingForm.done = false
    walletRerender = () => renderStaking()
    openOverlay('Staking', '')
    renderStaking()
  }

  // ===== Clanker launch prep (doc 988 / 1094b) - BUILD-ONLY tooling.
  // Composes the exact @clanker launch cast and pre-fills the Post tab,
  // which has its own full preview + confirm. This overlay can never send
  // anything - launching a token is Zaal's trigger, always. Facts baked into
  // the checklist come from verified research: Clanker v4 mechanics (doc
  // 646/1094b), fee-recipient rules from Adrian (doc 1092), v5 status (doc
  // 1094b: in audit, not live - launch on v4, don't wait).
  const launchForm = { name: '', ticker: '', purpose: '', imageUrl: '' }
  function launchSaveDraftInputs() {
    for (const [id, key] of [['lp_name', 'name'], ['lp_ticker', 'ticker'], ['lp_purpose', 'purpose'], ['lp_image', 'imageUrl']]) {
      const el = document.getElementById(id)
      if (el) launchForm[key] = el.value
    }
  }
  function launchCastText() {
    const name = (launchForm.name || '').trim()
    const ticker = (launchForm.ticker || '').trim().replace(/^\$/, '').toUpperCase()

        body: JSON.stringify({ type, targetHash: btn.dataset.hash, targetFid: btn.dataset.fid || null }) })
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'react failed')
      btn.classList.add('on'); const s = btn.querySelector('span'); if (s) s.textContent = (parseInt(s.textContent) || 0) + 1
    } catch (e) { meta.textContent = 'react error: ' + e.message }

  // follow / unfollow toggle - fired on click (reversible). Optimistic UI, then
  // confirm with the server; revert the chip if the write failed.
  async function toggleFollow(btn) {
    const fid = btn.dataset.fid
    const wasFollowing = btn.dataset.following === '1'
    const want = !wasFollowing
    btn.disabled = true; btn.textContent = want ? 'following...' : 'unfollowing...'
    try {
      const r = await fetch('/api/react', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: want ? 'follow' : 'unfollow', targetFid: fid }) })
      const d = await r.json(); if (!r.ok || !d.ok) throw new Error(d.error || 'follow failed')
      btn.dataset.following = want ? '1' : '0'
      btn.classList.toggle('on', want); btn.textContent = want ? 'following' : 'follow'
      toast(want ? 'followed' : 'unfollowed')
    } catch (e) {
      btn.classList.toggle('on', wasFollowing); btn.textContent = wasFollowing ? 'following' : 'follow'
      toast('follow error: ' + e.message)
    } finally { btn.disabled = false }
  }
  // mute / block a user (protocol lists, sync to your Farcaster app). block is
  // two-step since it's more consequential; both are reversible in the FC app.
  async function muteOrBlock(btn) {
    const kind = btn.dataset.act
    if (kind === 'block' && btn.textContent === 'block') { btn.textContent = 'tap to confirm block'; setTimeout(() => { if (btn.textContent === 'tap to confirm block') btn.textContent = 'block' }, 3000); return }
    btn.textContent = kind === 'block' ? 'blocking...' : 'muting...'
    try {
      const r = await fetch('/api/react', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: kind, targetFid: btn.dataset.fid }) })
      const d = await r.json(); if (!r.ok || !d.ok) throw new Error(d.error || 'failed')
      btn.textContent = kind === 'block' ? 'blocked' : 'muted'; btn.classList.add('on'); toast(kind === 'block' ? 'blocked' : 'muted')
    } catch (e) { btn.textContent = kind; toast(kind + ' error: ' + e.message) }
  }

  }

    if (act === 'snapbuild') { const ta = document.getElementById('composeText'); if (ta) compose.text = ta.value; openSnapBuilder(); return }
    if (act === 'snapclear') { compose.embedUrl = ''; compose.linkPreview = null; render(); return }
    if (act === 'uploadpick') { const ta = document.getElementById('composeText'); if (ta) compose.text = ta.value; const em = document.getElementById('composeEmbed'); if (em) compose.embedUrl = em.value; const f = document.getElementById('composeFile'); if (f) f.click(); return }
    if (act === 'linkpreview') {
      const em = document.getElementById('composeEmbed'); const url = (em ? em.value : compose.embedUrl).trim()
      if (!/^https?:\/\//.test(url)) { toast('enter a valid http(s) url first'); return }
      compose.embedUrl = url
      try {
        const r = await fetch(`/api/view?kind=link_preview&url=${encodeURIComponent(url)}`)
        const d = await r.json()
        compose.linkPreview = (d && (d.title || d.description || d.image)) ? d : null
        if (!compose.linkPreview) toast('no preview available for that link')
      } catch (e) { compose.linkPreview = null; toast('preview failed') }
      render(); return
    }
    if (act === 'togglex') { const ta = document.getElementById('composeText'); if (ta) compose.text = ta.value; const em = document.getElementById('composeEmbed'); if (em) compose.embedUrl = em.value; compose.toX = !compose.toX; if (compose.toX && postingHealth && !postingHealth.xEnabled) toast('X not connected yet - set the X_* keys in Vercel'); render(); return }
    if (act === 'togglebsky') { const ta = document.getElementById('composeText'); if (ta) compose.text = ta.value; const em = document.getElementById('composeEmbed'); if (em) compose.embedUrl = em.value; compose.toBsky = !compose.toBsky; if (compose.toBsky && postingHealth && !postingHealth.bskyEnabled) toast('Bluesky not connected yet - set BSKY_HANDLE + BSKY_APP_PASSWORD in Vercel'); render(); return }
    if (act === 'togglethread') { const ta = document.getElementById('composeText'); if (ta) compose.text = ta.value; compose.thread = !compose.thread; render(); return }
    if (act === 'composearm') { const ta = document.getElementById('composeText'); compose.text = ta ? ta.value.trim() : compose.text; const em = document.getElementById('composeEmbed'); if (em) compose.embedUrl = em.value.trim(); if (!compose.text) return; if (compose.thread) compose.parts = splitThread(compose.text); compose.armed = true; render(); return }
    if (act === 'composecancel') { compose.armed = false; render(); return }
    if (act === 'composeconfirm') {
      if (compose.sending) return; compose.sending = true; render()
      try {
        const isThread = compose.thread && compose.parts.length > 1
        const body = isThread ? { casts: compose.parts, channelId: compose.channel || null } : { text: compose.text, channelId: compose.channel || null }
        if (!isThread && compose.quote) { body.quoteHash = compose.quote.hash; body.quoteFid = compose.quote.fid }
        if (!isThread && compose.embedUrl) body.embedUrl = compose.embedUrl
        if (compose.toX) body.alsoX = true
        if (compose.toBsky) body.alsoBsky = true
        const r = await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        const d = await r.json(); if (!r.ok || !d.ok) throw new Error(d.error || 'post failed')
        compose.sentLink = d.link; compose.sentX = d.x || null; compose.sentBsky = d.bsky || null; compose.sending = false; compose.armed = false; compose.quote = null; compose.thread = false; compose.parts = []; compose.embedUrl = ''; compose.linkPreview = null; compose.toX = false; compose.toBsky = false
      } catch (err) { compose.sending = false; compose.armed = false; meta.textContent = 'post error: ' + err.message }
      render(); return
    }
    if (act === 'composenew') { compose.text = ''; compose.channel = ''; compose.sentLink = null; compose.sentX = null; compose.sentBsky = null; compose.armed = false; compose.quote = null; compose.embedUrl = ''; compose.linkPreview = null; compose.thread = false; compose.parts = []; compose.toX = false; compose.toBsky = false; render(); return }
  })

  // ---- filters overlay: muted keywords ----
  function openFilters() {
    openOverlay('filters', `<div class="obody">
      <div class="digest" style="background:#151529;border-color:#24242f"><div class="lab">muted words</div>
      <div class="ps" style="color:#8a8a99;margin-bottom:6px">casts containing any of these are hidden from feed, channels + search (this browser only)</div>
      <textarea id="mutedInput" style="width:100%;min-height:80px;background:#0e0e15;color:#e9e9ee;border:1px solid #24242f;border-radius:10px;padding:9px;font:inherit">${esc(muted.join(', '))}</textarea>
      <div class="btns" style="margin-top:8px"><button class="ibtn primary" data-act="savemuted">save</button>
      <span class="ps" style="color:#8a8a99">comma-separated</span></div></div></div>`)
  }
  document.getElementById('obody').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-act="savemuted"]'); if (!b) return
    const val = document.getElementById('mutedInput').value
    muted = val.split(',').map((w) => w.trim().toLowerCase()).filter(Boolean)
    persist(); closeOverlay(); render()
  })

  // ---- Sign In With Farcaster gate ----
  const gate = document.getElementById('gate')
  let ROLE = null // null (signed out) | 'zaal' | 'guest'
  let NEYNAR_CLIENT_ID = null
  async function pullState() {
    try {
      const r = await fetch('/api/state'); const d = await r.json()
      syncEnabled = !!d.enabled
      if (d.enabled && d.state) {
        const s = d.state
        if (Array.isArray(s.bookmarks)) { bookmarks = s.bookmarks; lsSet('zc_bookmarks', bookmarks) }
        if (Array.isArray(s.muted)) { muted = s.muted; lsSet('zc_muted', muted) }
        if (Array.isArray(s.scheduled)) { scheduled = s.scheduled; lsSet('zc_scheduled', scheduled) }
        if (Array.isArray(s.lists)) { lists = s.lists; lsSet('zc_lists', lists) }
        if (Array.isArray(s.savedSearches)) { savedSearches = s.savedSearches; lsSet('zc_searches', savedSearches) }
        if (s.statsHistory && typeof s.statsHistory === 'object') { statsHistory = s.statsHistory; lsSet('zc_statshist', statsHistory) }
        if (Array.isArray(s.savedSnaps)) { savedSnaps = s.savedSnaps; lsSet('zc_snaps', savedSnaps) }
        if (Array.isArray(s.feedback)) { feedback = s.feedback; lsSet('zc_feedback', feedback) }
        if (Array.isArray(s.socials)) { socials = s.socials; lsSet('zc_socials', socials) }
        if (s.daily && typeof s.daily === 'object') {
          daily = s.daily
          daily.tasks = daily.tasks || []; daily.apps = daily.apps || []
          daily.communities = daily.communities || []; daily.groups = daily.groups || []
          if (daily.date !== todayStr()) { daily.date = todayStr(); daily.tasks.forEach((x) => (x.done = false)) }
          lsSet('zc_daily', daily)
        }
      }
    } catch { /* store unreachable - stay on localStorage */ }
  }
  let postingHealth = null
  async function checkPosting() {
    try { postingHealth = await fetch('/api/send').then((r) => r.json()); if (tab === 'compose') render() } catch {}
  }
  // guest role only sees Feed/Channels/Search (+ Empire reads folded into
  // them) - Daily/Inbox/Post/Grow stay Zaal-only, both hidden here and
  // re-checked in switchTab() as a second line of defense. The server enforces
  // this independently (blockedByAuth vs blockedByGuestAuth) - this is UX, not
  // the security boundary.
  const ROLE_RESTRICTED_TABS = ['daily', 'inbox', 'compose', 'grow', 'empire', 'manager', 'fleet']
  function applyRole() {
    for (const t of ROLE_RESTRICTED_TABS) {
      const btn = document.querySelector(`#tabs button[data-tab="${t}"]`)
      if (btn) btn.style.display = ROLE === 'zaal' ? '' : 'none'
    }
    const fabEl = document.getElementById('fab')
    if (fabEl) fabEl.style.display = ROLE === 'zaal' ? '' : 'none'
  }
  async function startApp() {
    gate.style.display = 'none'
    applyRole()
    if (ROLE === 'zaal') { await pullState(); loadWizardState(); checkPosting() }
    switchTab(ROLE === 'zaal' ? 'daily' : 'feed')
  }
  window.onSiwnSuccess = async function (data) {
    document.getElementById('gateErr').textContent = ''
    try {
      const r = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fid: data.fid, signer_uuid: data.signer_uuid }) })
      const j = await r.json().catch(() => ({}))
      if (!r.ok) { document.getElementById('gateErr').textContent = j.error || 'sign-in failed'; return }
      ROLE = j.role || 'guest'
      startApp()
    } catch { document.getElementById('gateErr').textContent = 'sign-in failed - try again' }
  }
  function showGate() {
    gate.style.display = 'flex'
    const box = document.getElementById('gateBox')
    if (!NEYNAR_CLIENT_ID) { box.innerHTML = '<div style="color:#ff8a6a;font-size:13px">sign-in not configured yet</div>'; return }
    box.innerHTML = `<div class="neynar_signin" data-client_id="${esc(NEYNAR_CLIENT_ID)}" data-success-callback="onSiwnSuccess" data-theme="dark"></div>`
    if (!document.getElementById('siwnScript')) {
      const s = document.createElement('script')
      s.id = 'siwnScript'; s.src = 'https://neynarxyz.github.io/siwn/raw/1.2.0/index.js'; s.async = true
      document.body.appendChild(s)
    }
  }

  // ---- cmd+k command palette ----
  const palette = document.getElementById('palette')
  const palInput = document.getElementById('palInput')
  const palList = document.getElementById('palList')
  let palItems = [], palSel = 0
  const TABS = [['daily','Daily'],['feed','Feed'],['inbox','Inbox'],['channels','Channels'],['search','Search'],['compose','Compose'],['grow','Grow'],['empire','Empire'],['poidh','POIDH'],['manager','Manager']]
  function palCommands(q) {
    const s = q.trim().toLowerCase()
    const cmds = []
    for (const [t, label] of TABS) if (!s || label.toLowerCase().includes(s)) cmds.push({ label: 'Go to ' + label, run: () => switchTab(t) })
    if (!s || 'draft all'.includes(s)) cmds.push({ label: 'Draft all (inbox)', run: () => { switchTab('inbox'); setTimeout(draftAll, 300) } })
    if (!s || 'what i missed digest'.includes(s)) cmds.push({ label: 'What I missed (digest)', run: () => { switchTab('feed'); setTimeout(loadDigest, 100) } })
    if (s.startsWith('@') && s.length > 1) cmds.unshift({ label: 'Open profile ' + q.trim(), run: () => openProfile(q.trim().slice(1)) })
    else if (s.length > 1) cmds.push({ label: 'Search for "' + q.trim() + '"', run: () => { st.search.q = q.trim(); switchTab('search'); runSearch() } })
    if (ROLE === 'zaal' && s.length > 1) cmds.push({ label: 'Ask ZAO: "' + q.trim() + '" (knowledge graph)', run: () => openAskZao(q.trim()) })
    return cmds
  }

  // Ask ZAO: search 6+ months of decisions/meetings in the Bonfire knowledge
  // graph - the same memory ZOE's own recall reads.
  async function openAskZao(query) {
    openOverlay('Ask ZAO', '<div class="loading">searching the knowledge graph...</div>')
    try {
      const r = await fetch(`/api/search?zao=1&q=${encodeURIComponent(query)}`)
      const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'search failed')
      const ob = document.getElementById('obody')
      if (!ob) return
      if (!d.episodes || !d.episodes.length) { ob.innerHTML = '<div class="empty">nothing found for that.</div>'; return }
      ob.innerHTML = `<div class="ps" style="margin-bottom:8px">${d.results} matches for "${esc(query)}" - top ${d.episodes.length}:</div>`
        + d.episodes.map((e) => `<div class="digest" style="margin-bottom:8px"><div class="ub">${esc(e.name || '')}${e.at ? ' - ' + esc(String(e.at).slice(0, 10)) : ''}</div>
          <div class="t" style="font-size:14px;margin-top:4px">${esc(e.content)}</div></div>`).join('')
    } catch (e) {
      const ob = document.getElementById('obody')
      if (ob) ob.innerHTML = `<div class="err">${esc(e.message)}</div>`
    }
  }
  function renderPal() {
    palItems = palCommands(palInput.value); palSel = 0
    palList.innerHTML = palItems.map((c, i) => `<div class="palrow" data-i="${i}" style="padding:11px 16px;cursor:pointer;${i === 0 ? 'background:#1e1e38' : ''}">${esc(c.label)}</div>`).join('') || '<div style="padding:14px 16px;color:#8a8a99">no match</div>'
  }
  function openPalette() { palette.style.display = 'block'; palInput.value = ''; renderPal(); palInput.focus() }
  function closePalette() { palette.style.display = 'none' }
  function runPal(i) { const c = palItems[i]; if (c) { closePalette(); c.run() } }
  palInput.addEventListener('input', renderPal)
  palInput.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { palSel = Math.min(palSel + 1, palItems.length - 1); highlightPal(); e.preventDefault() }
    else if (e.key === 'ArrowUp') { palSel = Math.max(palSel - 1, 0); highlightPal(); e.preventDefault() }
    else if (e.key === 'Enter') { runPal(palSel); e.preventDefault() }
    else if (e.key === 'Escape') closePalette()
  })
  function highlightPal() { palList.querySelectorAll('.palrow').forEach((r, i) => r.style.background = i === palSel ? '#1e1e38' : '') }
  palList.addEventListener('click', (e) => { const r = e.target.closest('.palrow'); if (r) runPal(Number(r.dataset.i)) })
  palette.addEventListener('click', (e) => { if (e.target === palette) closePalette() })
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); palette.style.display === 'block' ? closePalette() : openPalette() }
  })

  // brand the UI from config.js (name, channels, Daily seed) so a fork adapts
  function applyConfig(cfg) {
    if (!cfg) return
    if (cfg.username) ME = cfg.username
    if (Array.isArray(cfg.quickReplies) && cfg.quickReplies.length) QUICK = cfg.quickReplies
    if (Array.isArray(cfg.brands)) BRANDS = cfg.brands
    if (Array.isArray(cfg.socials) && !socials) { socials = cfg.socials; lsSet('zc_socials', socials) }
    if (cfg.fid) OWNER_FID = String(cfg.fid)
    if (cfg.productName) PRODUCT_NAME = cfg.productName
    if (cfg.appName) {
      APPNAME = cfg.appName
      document.title = cfg.appName
      const m = cfg.appName.match(/^(.*?)(caster)$/i)
      document.getElementById('wordmark').innerHTML = m ? `${esc(m[1])}<span>${esc(m[2])}</span>` : esc(cfg.appName)
    }
    if (Array.isArray(cfg.homeChannels) && cfg.homeChannels.length) {
      HOME_CHANNELS = cfg.homeChannels
      if (!st.channels.id || st.channels.id === 'zao') st.channels.id = HOME_CHANNELS[0]
    }
    // seed Daily from config only when the user has nothing yet (fresh fork)
    if (cfg.daily && !localStorage.getItem('zc_daily')) { daily = { date: todayStr(), ...cfg.daily }; lsSet('zc_daily', daily) }
  }

  // Mini App welcome: when a NON-owner opens zaalcaster inside Farcaster, greet
  // them and nudge their first post to ask @zaal about it (composed as THEM via
  // the SDK - native composer, they hit send). A word-of-mouth growth loop.
  let welcomeShown = false
  function maybeWelcome() {
    if (welcomeShown) return
    if (!OWNER_FID) return                            // config not loaded yet - retry later
    const u = window.__fcuser
    if (!u || !u.fid) return                         // not in a mini-app host
    if (OWNER_FID && String(u.fid) === OWNER_FID) return // the owner - no nudge
    if (localStorage.getItem('zc_welcomed')) return  // already greeted this device
    welcomeShown = true
    const owner = ME || 'zaal'
    const el = document.createElement('div'); el.id = 'welcome'
    el.innerHTML = `<div class="wcard">
      <div class="wtitle">gm${u.username ? ' @' + esc(u.username) : ''}</div>
      <div class="wsub">you found <b>${esc(APPNAME || 'zaalcaster')}</b> - @${esc(owner)}'s personal farcaster client.</div>
      <div class="wsub" style="margin-top:6px">say hi - make your first post asking what it is. it posts as you.</div>
      <button class="ibtn primary" id="wpost" style="margin-top:14px;width:100%">gm @${esc(owner)} what is ${esc(APPNAME || 'zaalcaster')}?</button>
      <div style="margin-top:10px"><a class="chip" href="https://github.com/bettercallzaal/zaalcaster" target="_blank" rel="noopener" style="text-decoration:none">make your own</a> <span class="chip" id="wskip">skip</span></div>
    </div>`
    document.body.appendChild(el)
    document.getElementById('wpost').addEventListener('click', async () => {
      try { await window.__fcsdk.actions.composeCast({ text: `gm @${owner} what is ${APPNAME || 'zaalcaster'}?` }) } catch {}
      localStorage.setItem('zc_welcomed', '1'); el.remove()
    })
    document.getElementById('wskip').addEventListener('click', () => { localStorage.setItem('zc_welcomed', '1'); el.remove() })
  }
  window.addEventListener('fc-ready', maybeWelcome)

  // In-app feedback: jot a note from any tab; it syncs and I read it from the
  // terminal (node bin/feedback.js). Captures the current tab + time.
  let fbRec = null
  function openFeedback() {
    const el = document.createElement('div'); el.id = 'fbmodal'
    document.body.appendChild(el)
    fbRender(el)
    el.addEventListener('click', (e) => { if (e.target === el) { if (fbRec) { try { fbRec.stop() } catch {} } el.remove() } })
  }
  function fbRender(el) {
    const list = feedback.length
      ? feedback.slice(0, 20).map((f, i) => `<div class="fbitem"><div style="flex:1;min-width:0"><div class="ub">[${esc(f.tab || '?')}] ${f.at ? new Date(f.at).toLocaleString() : ''}</div><div>${esc(f.text)}</div></div><span data-fbrm="${i}" style="cursor:pointer;color:#ff8a6a;padding:0 4px">x</span></div>`).join('')
      : '<div class="ub">no notes yet - type or speak one above</div>'
    el.innerHTML = `<div class="fbcard">
      <div style="font-weight:700;font-size:16px">feedback / notes</div>
      <div class="ub">on the "${esc(tab)}" tab. type it, or tap mic and speak. i read these on the dev side.</div>
      <textarea id="fbtext" placeholder="bug, idea, anything..."></textarea>
      <div class="btns" style="margin-top:10px"><button class="ibtn primary" data-fbact="send">log it</button><button class="ibtn" data-fbact="mic" id="fbmic">${fbRec ? 'stop' : 'mic'}</button><button class="ibtn" data-fbact="close">close</button></div>
      <div class="subbar" style="margin-top:14px;padding-bottom:4px"><b style="color:#8a8a99;font-size:13px">logged (${feedback.length})</b>${feedback.length ? '<span class="chip" data-fbact="clearall">clear all</span>' : ''}</div>
      <div class="fblist">${list}</div>
    </div>`
    const ta = document.getElementById('fbtext'); if (ta && !fbRec) ta.focus()
    el.querySelector('.fbcard').onclick = (e) => {
      const rm = e.target.closest('[data-fbrm]'); if (rm) { feedback.splice(+rm.dataset.fbrm, 1); persist(); fbRender(el); return }
      const b = e.target.closest('[data-fbact]'); if (!b) return
      const act = b.dataset.fbact
      if (act === 'close') { if (fbRec) { try { fbRec.stop() } catch {} } el.remove(); return }
      if (act === 'send') { const t = (document.getElementById('fbtext').value || '').trim(); if (!t) return; feedback.unshift({ text: t, tab, at: new Date().toISOString() }); feedback = feedback.slice(0, 200); persist(); toast('logged'); fbRender(el); return }
      if (act === 'clearall') { if (window.confirm('clear all your logged feedback?')) { feedback = []; persist(); fbRender(el) } return }
      if (act === 'mic') { fbMic(b); return }
    }
  }
  function fbMic(btn) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { toast('voice input needs Chrome/Safari'); return }
    if (fbRec) { try { fbRec.stop() } catch {}; return }
    const ta = document.getElementById('fbtext'); const base = ta && ta.value ? ta.value.trim() + ' ' : ''
    let finalText = ''
    fbRec = new SR(); fbRec.lang = 'en-US'; fbRec.interimResults = true; fbRec.continuous = true
    fbRec.onresult = (e) => { let interim = ''; for (let i = e.resultIndex; i < e.results.length; i++) { const r = e.results[i]; if (r.isFinal) finalText += r[0].transcript + ' '; else interim += r[0].transcript } const t = document.getElementById('fbtext'); if (t) t.value = base + finalText + interim }
    fbRec.onend = () => { fbRec = null; const b = document.getElementById('fbmic'); if (b) { b.textContent = 'mic'; b.classList.remove('on') } }
    fbRec.onerror = () => { fbRec = null; const b = document.getElementById('fbmic'); if (b) { b.textContent = 'mic'; b.classList.remove('on') }; toast('mic error - check permissions') }
    try { fbRec.start(); btn.textContent = 'stop'; btn.classList.add('on'); toast('listening - speak now') } catch { fbRec = null }
  }
  const fabEl = document.getElementById('fab'); if (fabEl) fabEl.addEventListener('click', openFeedback)

  // shared voice-to-text: dictate into a textarea (composer, etc). Returns text,
  // user reviews + posts - never auto-sends. Chrome/Safari (Web Speech API).
  let voiceRec = null
  function dictate(taId, btn) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { toast('voice input needs Chrome or Safari'); return }
    if (voiceRec) { try { voiceRec.stop() } catch {}; return }
    const ta = document.getElementById(taId); if (!ta) return
    const base = ta.value ? ta.value.trim() + ' ' : ''
    let finalText = ''
    voiceRec = new SR(); voiceRec.lang = 'en-US'; voiceRec.interimResults = true; voiceRec.continuous = true
    voiceRec.onresult = (e) => {
      let interim = ''
      for (let i = e.resultIndex; i < e.results.length; i++) { const r = e.results[i]; if (r.isFinal) finalText += r[0].transcript + ' '; else interim += r[0].transcript }
      const t = document.getElementById(taId); if (!t) return
      t.value = base + finalText + interim
      if (taId === 'composeText') { compose.text = t.value; const cc = document.getElementById('composeCc'); if (cc) cc.textContent = t.value.length }
    }
    const reset = () => { voiceRec = null; const b = document.getElementById(btn.id || 'composeMic'); if (b) { b.textContent = 'mic'; b.classList.remove('on') } }
    voiceRec.onend = reset
    voiceRec.onerror = () => { reset(); toast('mic error - check permissions') }
    try { voiceRec.start(); btn.textContent = 'stop'; btn.classList.add('on'); toast('listening - speak your cast') } catch { voiceRec = null }
  }

  // boot: check whether sign-in is required before loading anything
  ;(async () => {
    try {
      const r = await fetch('/api/auth')
      const d = await r.json()
      ROLE = d.role
      NEYNAR_CLIENT_ID = d.neynarClientId || null
      applyConfig(d.config)
      maybeWelcome() // owner+viewer known now; no-op if SDK context not ready (fc-ready will retry)
      if (d.enabled && !d.authed) showGate()
      else startApp()
    } catch { ROLE = 'zaal'; startApp() } // auth endpoint unreachable - fail open, same as gate-off before
  })()
</script>
<!-- Farcaster Mini App SDK: when opened inside a Farcaster client, hide the splash
     once loaded. Harmless (no-op) in a normal browser. Loaded from CDN. -->
<script type="module">
  try {
    const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk')
    window.__fcsdk = sdk
    try { const ctx = await sdk.context; window.__fcuser = ctx && ctx.user ? ctx.user : null } catch {}
    // give the app a tick to paint, then tell the host we are ready
    setTimeout(() => { try { sdk.actions.ready() } catch {} }, 300)
    window.dispatchEvent(new CustomEvent('fc-ready'))
  } catch { /* not in a mini-app host, or CDN blocked - web app works as normal */ }
</script>
</body>
