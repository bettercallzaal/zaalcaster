<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>zaalcaster</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0c0c0f;
    color: #e8e8ea;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: #131318;
    border-bottom: 1px solid #24242c;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .meta { font-size: 13px; color: #8a8a94; }
  .controls { display: flex; gap: 8px; align-items: center; }
  button, .toggle {
    font: inherit; font-size: 13px;
    background: #1d1d25; color: #e8e8ea;
    border: 1px solid #2e2e38; border-radius: 8px;
    padding: 6px 12px; cursor: pointer;
  }
  button:hover, .toggle:hover { background: #26263040; border-color: #3a3a46; }
  .toggle.on { background: #6d4aff33; border-color: #6d4aff; color: #cbb8ff; }
  main { max-width: 680px; margin: 0 auto; padding: 12px; }
  .item {
    background: #131318;
    border: 1px solid #22222a;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .item .who { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .item .who a { color: #a99bff; text-decoration: none; font-weight: 600; }
  .item .who a:hover { text-decoration: underline; }
  .tag {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    color: #8a8a94; border: 1px solid #2e2e38; border-radius: 5px;
    padding: 1px 6px;
  }
  .thread { border-left: 2px solid #2e2e38; padding-left: 10px; margin: 6px 0; }
  .thread div { color: #9a9aa4; font-size: 13px; margin: 2px 0; }
  .thread .u { color: #b8b8c2; }
  .them { margin: 6px 0 0; white-space: pre-wrap; word-break: break-word; }
  .draft {
    margin-top: 10px; padding: 10px 12px;
    background: #17141f; border: 1px solid #34294d; border-radius: 9px;
  }
  .draft .label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #a99bff; margin-bottom: 4px; }
  .draft .text { white-space: pre-wrap; word-break: break-word; color: #ddd6ff; }
  .draft.skip { border-color: #2e2e38; background: #16161c; }
  .draft.skip .label, .draft.skip .text { color: #7a7a84; }
  .item .actions { margin-top: 8px; }
  .item .actions button { font-size: 12px; padding: 4px 10px; }
  .reply { margin-top: 10px; }
  .reply textarea {
    width: 100%; min-height: 54px; resize: vertical; font: inherit; font-size: 14px;
    background: #0f0f16; color: #e8e8ea; border: 1px solid #2e2e38; border-radius: 9px;
    padding: 8px 10px; box-sizing: border-box;
  }
  .reply textarea:focus { outline: none; border-color: #855DCD; }
  .reply textarea[readonly] { background: #12101a; border-color: #34294d; color: #ddd6ff; }
  .reply .btns { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .reply button { font: inherit; font-size: 13px; border-radius: 8px; padding: 6px 12px; cursor: pointer;
    background: #1d1d25; color: #e8e8ea; border: 1px solid #33334d; }
  .reply button.primary { background: #6d4aff; border-color: #6d4aff; color: #fff; font-weight: 600; }
  .reply button:hover { border-color: #855DCD; }
  .reply .cc { font-size: 12px; color: #7a7a8a; }
  .reply .confirm-note { font-size: 12px; color: #ffcf9a; }
  .sent { margin-top: 10px; font-size: 13px; color: #7ee0a0; }
  .sent a { color: #7ee0a0; }
  .empty, .err { text-align: center; color: #8a8a94; padding: 48px 16px; }
  .err { color: #ff8a8a; }
  a.open { font-size: 13px; color: #8a8a94; text-decoration: none; }
  a.open:hover { color: #cbb8ff; }
  footer { text-align: center; color: #55555f; font-size: 12px; padding: 24px 0 40px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>zaalcaster</h1>
    <div class="meta" id="meta">loading...</div>
  </div>
  <div class="controls">
    <span class="toggle" id="allToggle" title="include likes / recasts / follows">all</span>
    <button id="draftAll" title="draft replies in your voice">draft all</button>
    <button id="refresh">refresh</button>
    <a href="/dj.html" title="mix computer audio into a space" style="text-decoration:none"><button type="button">space dj</button></a>
  </div>
</header>
<main id="list"></main>
<footer>nothing is sent until you click "send reply" then "yes, send" - the confirm is your yes</footer>

<script>
  const list = document.getElementById('list')
  const meta = document.getElementById('meta')
  const allToggle = document.getElementById('allToggle')
  const draftAllBtn = document.getElementById('draftAll')
  const ANSWERABLE = new Set(['reply', 'mention', 'quote'])
  let showAll = false
  let items = []

  function esc(s) {
    return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
  }

  function renderThread(item) {
    const chain = (item.thread && item.thread.length) ? item.thread : (item.parent ? [item.parent] : [])
    if (!chain.length) return ''
    const rows = chain.slice(-3).map(
      (c) => `<div><span class="u">@${esc(c.user)}</span>: ${esc((c.text || '').slice(0, 200))}</div>`
    ).join('')
    return `<div class="thread">${rows}</div>`
  }

  function renderDraft(item) {
    if (item.draft === undefined || item.draft === null) return ''
    if (item.draft === 'SKIP') {
      return `<div class="draft skip"><div class="label">draft</div><div class="text">no reply needed</div></div>`
    }
    return `<div class="draft"><div class="label">draft in your voice</div><div class="text">${esc(item.draft)}</div></div>`
  }

  function renderReply(item) {
    if (!ANSWERABLE.has(item.type)) return ''
    if (item.sent) {
      return `<div class="sent">sent - <a href="${esc(item.sentLink)}" target="_blank" rel="noopener">${esc(item.sentLink)}</a></div>`
    }
    const val = item.replyText != null ? item.replyText : (item.draft && item.draft !== 'SKIP' ? item.draft : '')
    const h = esc(item.hash)
    if (item.armed) {
      return `<div class="reply">
        <textarea readonly data-hash="${h}">${esc(val)}</textarea>
        <div class="btns">
          <span class="confirm-note">send exactly this as @zaal?</span>
          <button class="primary" data-act="confirm" data-hash="${h}">${item.sending ? 'sending...' : 'yes, send'}</button>
          <button data-act="cancel" data-hash="${h}">cancel</button>
        </div>
      </div>`
    }
    return `<div class="reply">
      <textarea data-hash="${h}" placeholder="write a reply, or draft one above...">${esc(val)}</textarea>
      <div class="btns">
        <button data-act="arm" data-hash="${h}">send reply</button>
        <span class="cc" data-cc="${h}">${val.length}</span>
      </div>
    </div>`
  }

  function renderItem(item) {
    return `<div class="item" data-hash="${esc(item.hash)}">
      <div class="who">
        <span class="tag">${esc(item.type)}</span>
        <a href="${esc(item.link)}" target="_blank" rel="noopener">@${esc(item.user)}</a>
        <a class="open" href="${esc(item.link)}" target="_blank" rel="noopener">open</a>
      </div>
      ${renderThread(item)}
      <div class="them">${esc(item.text) || '<i>(no text)</i>'}</div>
      ${renderDraft(item)}
      ${renderReply(item)}
    </div>`
  }

  function findItem(hash) { return items.find((i) => i.hash === hash) }

  // Typing must not re-render (would drop focus) - update state silently.
  list.addEventListener('input', (e) => {
    const ta = e.target.closest('textarea[data-hash]')
    if (!ta || ta.hasAttribute('readonly')) return
    const item = findItem(ta.dataset.hash)
    if (item) { item.replyText = ta.value; const cc = list.querySelector(`[data-cc="${item.hash}"]`); if (cc) cc.textContent = ta.value.length }
  })

  list.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-act]')
    if (!btn) return
    const item = findItem(btn.dataset.hash)
    if (!item) return
    const act = btn.dataset.act
    if (act === 'arm') {
      const ta = list.querySelector(`textarea[data-hash="${item.hash}"]`)
      item.replyText = ta ? ta.value : (item.replyText || '')
      if (!item.replyText.trim()) return
      item.armed = true; render()
    } else if (act === 'cancel') {
      item.armed = false; render()
    } else if (act === 'confirm') {
      if (item.sending) return
      item.sending = true; render()
      try {
        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parentHash: item.hash, parentFid: item.fid, text: item.replyText }),
        })
        const data = await res.json()
        if (!res.ok || !data.ok) throw new Error(data.error || 'send failed')
        item.sent = true; item.sentLink = data.link; item.armed = false; item.sending = false
        render()
      } catch (err) {
        item.sending = false; item.armed = false; render()
        meta.textContent = 'send error: ' + err.message
      }
    }
  })

  function render() {
    list.innerHTML = items.map(renderItem).join('')
  }

  async function load() {
    meta.textContent = 'loading...'
    list.innerHTML = ''
    items = []
    try {
      const res = await fetch(`/api/inbox?limit=25${showAll ? '&all=1' : ''}`)
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'failed to load')
      items = data.items
      if (!items.length) {
        list.innerHTML = '<div class="empty">inbox zero - everything answered.</div>'
        meta.textContent = '0 items'
        return
      }
      meta.textContent = `${data.count} ${showAll ? 'notifications' : 'unanswered'}`
      render()
    } catch (err) {
      list.innerHTML = `<div class="err">${esc(err.message)}</div>`
      meta.textContent = 'error'
    }
  }

  async function draftAll() {
    const answerable = items.filter((it) => ANSWERABLE.has(it.type))
    if (!answerable.length) return
    draftAllBtn.disabled = true
    const label = draftAllBtn.textContent
    draftAllBtn.textContent = 'drafting...'
    try {
      const res = await fetch('/api/draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: answerable }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'draft failed')
      if (!data.available) {
        meta.textContent = 'drafts unavailable (set OPENROUTER_API_KEY)'
      } else {
        for (const it of items) {
          if (data.drafts[it.hash]) it.draft = data.drafts[it.hash]
        }
        render()
      }
    } catch (err) {
      meta.textContent = 'draft error: ' + err.message
    } finally {
      draftAllBtn.disabled = false
      draftAllBtn.textContent = label
    }
  }

  allToggle.addEventListener('click', () => {
    showAll = !showAll
    allToggle.classList.toggle('on', showAll)
    load()
  })
  draftAllBtn.addEventListener('click', draftAll)
  document.getElementById('refresh').addEventListener('click', load)
  load()
</script>
</body>
</html>
