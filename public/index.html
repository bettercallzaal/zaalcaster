<style>
  :root {
    color-scheme: dark;
    --bg: #0c0c12; --surface: #14141d; --surface2: #1a1a26; --border: #24242f;
    --text: #e9e9ee; --dim: #8a8a99; --accent: #855DCD; --accent2: #6d4aff;
    --live: #D85A30; --good: #7ee0a0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  main { flex: 1 0 auto; }
  header { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 16px; background: rgba(12,12,18,.86); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  header .meta { font-size: 12px; color: var(--dim); }
  header .right { display: flex; gap: 8px; align-items: center; }
  button { font: inherit; cursor: pointer; }
  .ibtn { font-size: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; }
  .ibtn:hover { border-color: var(--accent); }
  .ibtn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 600; }
  .tabs { position: sticky; top: 49px; z-index: 15; display: flex; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tabs button { flex: 1; background: none; border: none; color: var(--dim); padding: 11px 4px; font-size: 14px; font-weight: 600;
    border-bottom: 2px solid transparent; }
  .tabs button.on { color: var(--text); border-bottom-color: var(--accent); }
  .tabs button .k { font-size: 10px; color: var(--dim); font-weight: 400; }
  main { max-width: 640px; margin: 0 auto; padding: 10px 12px 90px; }
  .subbar { display: flex; gap: 8px; padding: 6px 2px 10px; flex-wrap: wrap; }
  .chip { font-size: 13px; background: var(--surface2); color: var(--dim); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 13px; cursor: pointer; transition: border-color .12s, background .12s, color .12s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ibtn { transition: border-color .12s, background .12s; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; transition: border-color .12s; }
  .launchgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .launch { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; cursor: pointer; transition: border-color .12s, background .12s; }
  .launch:hover { border-color: var(--accent); }
  .launch .ll { font-weight: 600; font-size: 15px; }
  .launch .ls { color: #8a8a99; font-size: 12px; margin-top: 2px; }
  @media (max-width: 380px) { .launchgrid { grid-template-columns: repeat(2, 1fr); } }
  .statbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0 8px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; }
  .stat .sv { font-weight: 700; font-size: 20px; color: var(--accent); }

  .boost { font-size: 11px; font-weight: 700; color: #fff; background: linear-gradient(90deg, #855DCD, #6d4aff); padding: 1px 5px; border-radius: 6px; vertical-align: middle; }
  .weekgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 6px 0 8px; }
  .spark { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; height: 48px; margin: 8px 2px 6px; }
  .sparkcol { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .sparkbar { width: 100%; max-width: 26px; background: #2b2b3a; border-radius: 4px 4px 2px 2px; }

  .sparkd { font-size: 10px; color: #6f6f7a; }
  .pwr { font-size: 10px; font-weight: 700; color: #6d4aff; border: 1px solid #6d4aff; border-radius: 5px; padding: 0 4px; vertical-align: middle; }
  .qs { font-size: 10px; font-weight: 600; color: #3fbf7f; vertical-align: middle; }
  .lbrow.ownrow { background: linear-gradient(90deg, rgba(133,93,205,.16), transparent); border-radius: 8px; }
  .xpbar { height: 8px; background: #1c1c28; border-radius: 6px; overflow: hidden; }
  .xpfill { height: 100%; background: linear-gradient(90deg, #855DCD, #6d4aff); transition: width .3s; }
  .xphint { color: #8a8a99; font-size: 12px; margin: 4px 0 2px; text-align: right; }
  .badges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .badge { border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; background: var(--surface); opacity: .5; }
  .badge.on { opacity: 1; border-color: var(--accent); background: linear-gradient(180deg, rgba(133,93,205,.14), transparent); }
  .badge .bn { font-weight: 600; font-size: 14px; }

  .badge.on .bd { color: var(--accent); }
  .toast { position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(12px); background: var(--accent); color: #fff; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9999; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #welcome { position: fixed; inset: 0; z-index: 10000; background: rgba(8,8,14,.72); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; }
  #welcome .wcard { background: linear-gradient(180deg, #17122b, #0e0e15); border: 1px solid var(--accent); border-radius: 18px; padding: 22px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  #welcome .wtitle { font-size: 22px; font-weight: 800; }
  #welcome .wsub { color: #b9b9c6; font-size: 14px; margin-top: 6px; }

  @media (max-width: 560px) { .snapgrid { grid-template-columns: 1fr; } }
  .sfin { width: 100%; margin-top: 5px; background: #0e0e15; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 14px; }
  textarea.sfin { min-height: 60px; resize: vertical; }
  .snapprev { position: sticky; top: 0; align-self: start; }
  .spv { border: 1px solid var(--accent); border-radius: 16px; padding: 16px; background: linear-gradient(180deg, #14101f, #0e0e15); }
  .spvtitle { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .spvh { font-size: 19px; font-weight: 800; }
  .spvs { color: #b9b9c6; font-size: 14px; margin-top: 3px; }
  .spvt { font-size: 14px; margin-top: 8px; color: #d6d6de; }
  .spvq { font-weight: 600; margin-top: 12px; }
  .spvopt { border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; margin-top: 6px; font-size: 14px; }
  .spvbtn { color: #fff; font-weight: 600; text-align: center; border-radius: 10px; padding: 10px; margin-top: 12px; }
  .spvfoot { text-align: center; color: #6f6f7a; font-size: 11px; margin-top: 12px; }
  .snapembed { border: 1px solid var(--accent); border-radius: 14px; padding: 12px 14px; background: linear-gradient(180deg, rgba(133,93,205,.12), transparent); cursor: pointer; }
  .snapembed:hover { border-color: #a99cff; }
  .scaptag { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--accent); }
  .snapembed .sctitle { font-size: 16px; font-weight: 700; margin-top: 3px; }
  .snapembed .scsub { color: #b9b9c6; font-size: 13px; margin-top: 2px; }
  .snapembed .scq { font-weight: 600; font-size: 14px; margin-top: 8px; }
  .snapembed .scopt { border: 1px solid var(--border); border-radius: 9px; padding: 7px 10px; margin-top: 5px; font-size: 13px; }
  .snapembed .scopen { color: var(--accent); font-weight: 600; font-size: 13px; margin-top: 10px; }
  .lbrow { display: flex; align-items: center; gap: 8px; padding: 7px 4px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .lbrow:hover { background: rgba(133,93,205,.06); }
  .lbrank { width: 22px; text-align: center; font-weight: 700; color: #6f6f7a; font-size: 13px; }
  .lbrank.top { color: var(--accent); }
  .lbpfp { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; background: #24242f; flex: none; }
  .lbname { font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .lbbar { width: 84px; height: 6px; background: #1c1c28; border-radius: 4px; overflow: hidden; flex: none; }
  .lbfill { display: block; height: 100%; background: linear-gradient(90deg, #855DCD, #6d4aff); }
  .lbn { width: 26px; text-align: right; font-weight: 600; font-size: 13px; color: var(--accent); }
  .card:hover { border-color: #2f2f3d; }
  .card .top { display: flex; gap: 10px; align-items: flex-start; }
  .pfp { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); object-fit: cover; flex: none; }
  .card .who { flex: 1; min-width: 0; }

  .card .who .sub { font-size: 12px; color: var(--dim); }
  .card .who .sub .ch { color: var(--accent); }
  .card .body { margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; }
  .card .embed { margin-top: 7px; font-size: 13px; }
  .cimg { max-width: 100%; max-height: 420px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; display: block; }
  .musicembed { border: 1px solid #1db954; border-radius: 12px; padding: 11px 14px; background: linear-gradient(90deg, rgba(29,185,84,.14), transparent); cursor: pointer; font-weight: 600; font-size: 14px; }
  .musicembed:hover { border-color: #1ed760; }
  .mtag { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: #1db954; margin-right: 6px; }
  .framegrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (max-width: 420px) { .framegrid { grid-template-columns: 1fr; } }
  .framecard { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; background: var(--surface); transition: border-color .12s; }
  .framecard:hover { border-color: var(--accent); }

  .framecard .framenoimg { width: 100%; aspect-ratio: 1.5; background: linear-gradient(135deg, #24242f, #14101f); }
  .framecard .framemeta { padding: 9px 11px; }
  .framecard .framename { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .embed a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .card .stats { display: flex; gap: 16px; margin-top: 10px; font-size: 13px; color: var(--dim); }

  .card .stats button.act.recast.on { color: var(--good); }

    border-radius: 5px; padding: 1px 6px; }

    padding: 8px; transform: translateY(-40px); transition: transform .15s; z-index: 25; pointer-events: none; }

  /* reactions / social-list overlays */

  .chan-result { display: flex; gap: 10px; align-items: center; padding: 7px 4px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .chan-result:hover { background: var(--surface2); border-radius: 8px; }
  .chan-result img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; background: #24242f; flex: none; }
  .chan-result .cn { font-weight: 600; font-size: 14px; } .chan-result .cs { font-size: 12px; color: var(--dim); }
  .link-preview { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 8px; display: flex; gap: 0; }
  .link-preview img { width: 80px; height: 80px; object-fit: cover; flex: none; display: block; }
  .link-preview .lp-text { padding: 8px 10px; min-width: 0; }
  .link-preview .lp-title { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .link-preview .lp-desc { font-size: 12px; color: var(--dim); margin-top: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .stats button.rx-tappable { cursor: pointer; }
  .stats button.rx-tappable:hover span { text-decoration: underline; }
</style>
</head>

    <input id="palInput" placeholder="jump to... (tab name, @user, or search)" autocomplete="off"
      style="width:100%;font:inherit;font-size:16px;background:none;color:#e9e9ee;border:none;border-bottom:1px solid #24242f;padding:14px 16px;box-sizing:border-box;outline:none">

    <h1 style="font-size:20px;margin:0 0 4px">zaal<span style="color:#855DCD">caster</span></h1>
    <div style="color:#8a8a99;font-size:13px;margin-bottom:16px">sign in with Farcaster - Zaal gets full access, everyone else gets a read-only view</div>
    <div id="gateBox" style="display:flex;justify-content:center"></div>
    <div id="gateErr" style="color:#ff8a6a;font-size:13px;margin-top:8px;min-height:16px"></div>
  </div>

<footer>your farcaster - reads are free, nothing is sent without your confirm - <a href="/guide.html" style="color:#8a8a99">guide</a></footer>
<button id="fab" title="leave feedback">feedback</button>

<script>
  // ========================= FRONTEND ARCHITECTURE (why) =========================
  // ONE FILE, VANILLA JS, ZERO DEPENDENCIES - deliberate, not lazy:
  //   - No framework means no build step: git push IS the deploy, and a fork
  //     can read/edit every line without tooling. For a single-user client
  //     whose whole UI is lists + overlays, a framework buys nothing.
  //   - The only external script is the Farcaster mini-app SDK (bottom of the
  //     file), loaded from a CDN in a try/catch so the app works identically
  //     when it fails or when running outside a Farcaster host.
  //
  // THE RENDER MODEL - render-from-state, innerHTML, no vDOM:
  //   All UI state lives in `st` (per-tab) + a few globals. render() rebuilds
  //   the active tab's HTML from state on every change. Rebuilding a few
  //   hundred rows of HTML is microseconds - correct-by-construction beats
  //   clever DOM diffing at this scale. Inputs the user may be mid-typing in
  //   are the one exception: their values are saved to state BEFORE any
  //   re-render that would destroy them (see *SaveDraftInputs helpers).
  //
  // THE EVENT MODEL - two delegated click listeners (main + overlay body),
  //   dispatching on data-act attributes. Rebuilt HTML never needs listeners
  //   re-attached, and every clickable behavior is greppable by its data-act
  //   name. Never attach per-element handlers to rendered content.
  //
  // XSS RULE: every interpolated value that originated outside this file
  //   (API responses, user input) goes through esc(). External APIs (Neynar,
  //   Empire Builder, POIDH, Zora) are untrusted input like any other.
  //
  // ROLE UX vs SECURITY: ROLE ('zaal'|'guest') hides owner-only tabs and is
  //   enforced again in switchTab - but that is UX, not the boundary. Every
  //   API route re-checks the session server-side; a guest editing the DOM
  //   gets 401/403s, not access.
  //
  // ASYNC RULE (from the 2026-07-15 audit): any await inside a load function
  //   must either re-check that its context is still current (loadPoidh drops
  //   stale responses) or null-guard its DOM targets (lookupDistribution) -
  //   the user can switch tabs while a fetch is in flight.
  // ==============================================================================
  const main = document.getElementById('main')
  const meta = document.getElementById('meta')
  const ANSWERABLE = new Set(['reply', 'mention', 'quote'])
  let HOME_CHANNELS = ['zao', 'wavewarz', 'zabal'] // overridden from config on boot
  let ME = 'zaal' // your username, set from config on boot
  let QUICK = ['GM', 'Lfg', 'love this', 'so cool', 'congrats', 'based', 'ZM'] // quick replies, from config
  let BRANDS = [] // your brands, set from config on boot
  let OWNER_FID = null // the app owner's fid (from config) - guests get the welcome
  let APPNAME = 'zaalcaster' // set from config on boot
  let PRODUCT_NAME = 'SPARKZ' // wizard product name, set from config on boot
  // a row of one-tap quick-reply chips that fill the reply box for a given cast
  const quickRow = (hash) => `<div class="subbar" style="padding:2px 0 6px;gap:6px">${QUICK.map((q) => `<span class="chip" data-act="quick" data-hash="${esc(hash)}" data-q="${esc(q)}">${esc(q)}</span>`).join('')}</div>`

  let tab = 'feed'
  const st = {
    feed: { type: 'following', casts: [], frames: [], loaded: false, digest: null, digesting: false },
    inbox: { items: [], loaded: false, showAll: false, priority: false, view: 'reply', notifs: [], notifChannel: '' },
    channels: { id: 'zao', casts: [], loaded: false, trending: [], chanInfo: null, searching: false, searchResults: [] },
    search: { q: '', channel: '', users: [], casts: [], loaded: true, searching: false },
    grow: { loaded: false, data: null, empires: [] },
    poidh: { loaded: false, bountyId: '1249', chainId: 8453, bounty: null, claims: [], claimsCount: 0, claimsError: null, err: null },
    zoe: { loaded: false, enabled: true, tasks: [], err: null },
    booster: { loaded: false, loading: false, candidates: [], err: null },
    manager: { submitting: false, msg: null, msgErr: false },
    fleet: { loaded: false, loading: false, loops: [], err: null },
  }

  const esc = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
  const when = (ts) => { if (!ts) return ''; const d = new Date(ts); return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) }
  const pfp = (u) => u.pfp ? `<img class="pfp" src="${esc(u.pfp)}" alt="">` : `<div class="pfp"></div>`

  // ---- local (per-browser) state: bookmarks + muted keywords ----
  const lsGet = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d } catch { return d } }
  const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
  let bookmarks = lsGet('zc_bookmarks', [])           // array of compact casts
  let muted = lsGet('zc_muted', [])                   // array of lowercased words
  let scheduled = lsGet('zc_scheduled', [])           // [{id,text,channelId,quoteHash,quoteFid,at}]
  let lists = lsGet('zc_lists', [])                    // [{id,name,fids:[],members:[{fid,username}]}]
  let savedSearches = lsGet('zc_searches', [])         // [{q, channel}]
  let statsHistory = lsGet('zc_statshist', {})         // day -> {followers, score}
  let savedSnaps = lsGet('zc_snaps', [])               // [{name, doc}] custom snap templates
  let feedback = lsGet('zc_feedback', [])
  let socials = lsGet('zc_socials', null)              // [{text, tab, at}] in-app notes for review
  let syncEnabled = false                             // server store on? (set at boot)

  // one persist path: write localStorage (offline cache) + push to the server
  // store (debounced) so daily/bookmarks/muted/scheduled sync across devices.
  let pushT = null
  // THE SYNC MODEL: localStorage is the always-on truth (works with zero
  // infra); the KV store is an optional mirror layered on top. persist()
  // writes localStorage synchronously (never lose an edit), then debounces a
  // whole-blob push to /api/state 800ms later - rapid edits (checklist
  // ticking, list building) collapse into one write. Last-write-wins across
  // devices is fine because the only writers are Zaal's own devices and
  // pullState() re-reads on every boot. The .catch(()=>{}) is deliberate:
  // sync failing must never break the local edit that just happened -
  // localStorage already has it, and the next successful push carries it.
  function persist() {
    lsSet('zc_bookmarks', bookmarks); lsSet('zc_muted', muted); lsSet('zc_scheduled', scheduled); lsSet('zc_lists', lists); lsSet('zc_searches', savedSearches); lsSet('zc_statshist', statsHistory); lsSet('zc_snaps', savedSnaps); lsSet('zc_feedback', feedback); if (socials) lsSet('zc_socials', socials)
    if (typeof daily !== 'undefined') lsSet('zc_daily', daily)
    if (!syncEnabled) return
    clearTimeout(pushT)
    pushT = setTimeout(() => {
      fetch('/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: { daily: (typeof daily !== 'undefined' ? daily : null), bookmarks, muted, scheduled, lists, savedSearches, statsHistory, savedSnaps, feedback, socials } }) }).catch(() => {})
    }, 800)
  }
  const isBookmarked = (h) => bookmarks.some((b) => b.hash === h)
  function toggleBookmark(cast) {
    if (isBookmarked(cast.hash)) bookmarks = bookmarks.filter((b) => b.hash !== cast.hash)
    else bookmarks = [cast, ...bookmarks].slice(0, 500)
    persist()
  }
  const isMuted = (text) => { const t = (text || '').toLowerCase(); return muted.some((w) => w && t.includes(w)) }
  const dropMuted = (casts) => casts.filter((c) => !isMuted(c.text))
  function findCast(hash) {
    return st.feed.casts.find((c) => c.hash === hash) || st.channels.casts.find((c) => c.hash === hash)
      || st.search.casts.find((c) => c.hash === hash) || bookmarks.find((c) => c.hash === hash) || null
  }

  // ---- shared cast card (feed + channels) ----
  function castCard(c) {
    const embeds = (c.embeds || []).map((e) => {
      const url = typeof e === 'string' ? e : (e && e.url)
      if (!url) return ''
      const snap = url.includes('zlank.online/s/') ? decodeSnapUrl(url) : null
      if (snap) return snapEmbedCard(snap, url)
      const plat = musicPlatform(url)
      if (plat) return `<div class="embed"><div class="musicembed" data-openurl="${esc(url)}"><span class="mtag">MUSIC</span> listen on ${esc(plat)}</div></div>`
      const img = typeof e === 'object' && e.img
      return img
        ? `<div class="embed"><img class="cimg" src="${esc(url)}" alt="" loading="lazy" data-openurl="${esc(url)}"></div>`
        : `<div class="embed"><a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a></div>`
    }).join('')
    return `<div class="card" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">
      <div class="top">
        <span data-act="profile" data-user="${esc(c.author)}" style="cursor:pointer">${pfp(c)}</span>
        <div class="who">
          <div class="name"><span class="uname" data-act="profile" data-user="${esc(c.author)}">${esc(c.display)}</span>
            <span class="sub">@${esc(c.author)}${c.power ? ' <span class="pwr" title="power badge">pwr</span>' : ''}${c.score != null && c.score >= 0.9 ? ` <span class="qs" title="high neynar quality score">${c.score}</span>` : ''} - ${when(c.timestamp)}${c.channel ? ` - <span class="ch">/${esc(c.channel)}</span>` : ''}</span></div>
          <div class="body tappable" data-act="thread" data-hash="${esc(c.hash)}">${esc(c.text)}</div>
          ${embeds}
          <div class="stats">
            <button class="act like${c.likes > 0 ? ' rx-tappable' : ''}" data-act="like" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">&hearts; <span data-act2="reactions" data-hash="${esc(c.hash)}" data-rtype="like">${c.likes}</span></button>
            <button class="act recast${c.recasts > 0 ? ' rx-tappable' : ''}" data-act="recast" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">&circlearrowleft; <span data-act2="reactions" data-hash="${esc(c.hash)}" data-rtype="recast">${c.recasts}</span></button>
            <button data-act="thread" data-hash="${esc(c.hash)}">&#128172; ${c.replies}</button>
            <button data-act="replytoggle" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">reply</button>
            <button data-act="quote" data-hash="${esc(c.hash)}" data-fid="${c.fid || ''}">quote</button>
            <button class="act bm ${isBookmarked(c.hash) ? 'on' : ''}" data-act="bookmark" data-hash="${esc(c.hash)}">${isBookmarked(c.hash) ? 'saved' : 'save'}</button>
            ${c.author === ME ? `<button data-act="delcast" data-hash="${esc(c.hash)}" style="color:#ff8a6a">delete</button>` : ''}
            <a class="open" href="${esc(c.link)}" target="_blank" rel="noopener">open</a>
          </div>
          <div class="replyslot" data-slot="${esc(c.hash)}"></div>
        </div>
      </div>
    </div>`
  }

  // inline reply composer used by feed/channel cards
  function replyBox(hash, fid, draft) {
    return `<div class="reply">
      ${quickRow(hash)}
      <textarea data-rhash="${esc(hash)}" data-rfid="${fid || ''}" placeholder="reply as @${esc(ME)}...">${esc(draft || '')}</textarea>
      <div class="btns"><button class="ibtn" data-act="replyarm" data-hash="${esc(hash)}">send reply</button>
        <button class="ibtn" data-act="replycancel" data-hash="${esc(hash)}">cancel</button></div>
    </div>`
  }
  function replyConfirm(hash, fid, text, sending) {
    return `<div class="reply">
      <textarea readonly>${esc(text)}</textarea>
      <div class="btns"><span class="note">send exactly this as @zaal?</span>
        <button class="ibtn primary" data-act="replyconfirm" data-hash="${esc(hash)}" data-fid="${fid || ''}">${sending ? 'sending...' : 'yes, send'}</button>
        <button class="ibtn" data-act="replycancel" data-hash="${esc(hash)}">cancel</button></div>
    </div>`
  }

  // ================= FEED =================
  const moreBtn = (cursor, act) => cursor ? `<div class="subbar" style="justify-content:center"><button class="ibtn" data-act="${act}">load more</button></div>` : ''
  async function loadFeed(append) {
    if (!append) { st.feed.loaded = false; st.feed.cursor = null; render() }
    try {
      let url = `/api/feed?type=${st.feed.type}&limit=30${append && st.feed.cursor ? '&cursor=' + encodeURIComponent(st.feed.cursor) : ''}`
      // ZAO filter: a combined feed of the home ZAO channels vs "everyone" (following/for-you)
      if (st.feed.type === 'zao') url = `/api/feed?type=channel&id=${encodeURIComponent(HOME_CHANNELS.join(','))}&limit=30${append && st.feed.cursor ? '&cursor=' + encodeURIComponent(st.feed.cursor) : ''}`
      // Music: pull music-heavy channels, then keep only casts with a music link
      if (st.feed.type === 'music') url = `/api/feed?type=channel&id=music,wavewarz,sound&limit=40${append && st.feed.cursor ? '&cursor=' + encodeURIComponent(st.feed.cursor) : ''}`
      if (st.feed.type === 'list') {
        const lst = lists.find((l) => l.id === st.feed.listId)
        const fids = (lst?.fids || []).join(',')
        if (!fids) { st.feed.casts = []; st.feed.loaded = true; render(); return }
        url += '&fids=' + encodeURIComponent(fids)
      }
      const r = await fetch(url)
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'feed failed')
      let casts = d.casts || []
      if (st.feed.type === 'music') casts = casts.filter(castHasMusic)
      st.feed.casts = append ? st.feed.casts.concat(casts) : casts
      st.feed.cursor = d.cursor; st.feed.loaded = true
    } catch (e) { st.feed.err = e.message; st.feed.loaded = true }
    render()
  }
  async function loadDigest() {
    st.feed.digesting = true; render()
    try {
      const r = await fetch('/api/digest'); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'digest failed')
      st.feed.digest = d.available ? d.digest : 'digest needs OPENROUTER_API_KEY'
    } catch (e) { st.feed.digest = 'digest error: ' + e.message }
    st.feed.digesting = false; render()
  }
  function renderFeed() {
    const sub = `<div class="subbar">
      <span class="chip ${st.feed.type === 'zao' ? 'on' : ''}" data-feed="zao" style="border-color:var(--accent)">ZAO</span>
      <span class="chip ${st.feed.type === 'following' ? 'on' : ''}" data-feed="following">everyone</span>
      <span class="chip ${st.feed.type === 'foryou' ? 'on' : ''}" data-feed="foryou">for you</span>
      <span class="chip ${st.feed.type === 'trending' ? 'on' : ''}" data-feed="trending">trending</span>
      <span class="chip ${st.feed.type === 'music' ? 'on' : ''}" data-feed="music">music</span>
      <span class="chip ${st.feed.type === 'frames' ? 'on' : ''}" data-feed="frames">frames</span>
      <span class="chip ${st.feed.type === 'saved' ? 'on' : ''}" data-feed="saved">saved ${bookmarks.length}</span>
      ${lists.map((l) => `<span class="chip ${st.feed.type === 'list' && st.feed.listId === l.id ? 'on' : ''}" data-list="${esc(l.id)}">${esc(l.name)} ${(l.fids || []).length}</span>`).join('')}
      <span class="chip" data-act="newlist">+ list</span>
      <button class="ibtn" data-act="digest">${st.feed.digesting ? 'summarizing...' : 'what I missed'}</button>
      <button class="ibtn" data-act="filters">filters</button></div>`
    if (st.feed.type === 'saved') {
      if (!bookmarks.length) return sub + '<div class="empty">no saved casts. tap "save" on any cast.</div>'
      return sub + dropMuted(bookmarks).map(castCard).join('')
    }
    if (st.feed.type === 'list') {
      const lst = lists.find((l) => l.id === st.feed.listId)
      if (lst && !(lst.fids || []).length) return sub + `<div class="empty">"${esc(lst.name)}" is empty. Tap a profile and "add to list", or <span class="chip" data-act="seedfriends" data-list="${esc(lst.id)}">seed close friends</span></div>`
    }
    if (st.feed.type === 'frames') {
      if (!st.feed.loaded) return sub + '<div class="loading">loading frames...</div>'
      const frames = st.feed.frames || []
      if (!frames.length) return sub + '<div class="empty">no frames right now.</div>'
      return sub + '<div class="framegrid">' + frames.map((f) => `<div class="framecard" data-openurl="${esc(f.url)}">
        ${f.image ? `<img src="${esc(f.image)}" alt="" loading="lazy">` : '<div class="framenoimg"></div>'}
        <div class="framemeta"><div class="framename">${esc(f.name)}</div>${f.author ? `<div class="ub">by @${esc(f.author)}</div>` : ''}</div></div>`).join('') + '</div>'
    }
    const dig = st.feed.digest ? `<div class="digest"><div class="lab">what you missed</div><div class="t">${esc(st.feed.digest)}</div></div>` : ''
    if (!st.feed.loaded) return sub + dig + '<div class="loading">loading feed...</div>'
    if (st.feed.err) return sub + `<div class="err">${esc(st.feed.err)}</div>`
    const casts = dropMuted(st.feed.casts)
    if (!casts.length) return sub + dig + '<div class="empty">no casts.</div>'
    return sub + dig + casts.map(castCard).join('') + moreBtn(st.feed.cursor, 'morefeed')
  }
  async function loadFrames() {
    st.feed.loaded = false; st.feed.err = null; render()
    try {
      const d = await fetch('/api/feed?frames=1').then((r) => r.json())
      st.feed.frames = d.frames || []; st.feed.loaded = true
    } catch (e) { st.feed.err = e.message; st.feed.loaded = true }
    render()
  }

  // ================= SEARCH =================
  async function runSearch() {
    const q = st.search.q.trim(); if (!q) return
    st.search.searching = true; render()
    try {
      const cq = st.search.channel ? '&channel=' + encodeURIComponent(st.search.channel) : ''
      const r = await fetch(`/api/search?q=${encodeURIComponent(q)}${cq}`); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'search failed')
      st.search.users = d.users; st.search.casts = d.casts; st.search.err = null
    } catch (e) { st.search.err = e.message }
    st.search.searching = false; render()
  }
  function renderSearch() {
    const chips = ['', ...HOME_CHANNELS].map((c) => `<span class="chip ${st.search.channel === c ? 'on' : ''}" data-searchchan="${esc(c)}">${c ? '/' + esc(c) : 'all'}</span>`).join(' ')
    const isSaved = savedSearches.some((s) => s.q === st.search.q.trim() && (s.channel || '') === st.search.channel)
    const saveBtn = st.search.q.trim() ? `<span class="chip" data-act="savesearch">${isSaved ? 'saved' : '+ save search'}</span>` : ''

      <div class="subbar" style="padding-top:0"><span class="ub" style="align-self:center">in:</span> ${chips} ${saveBtn}</div>${saved}`
    let body = ''
    if (st.search.searching) body = '<div class="loading">searching...</div>'
    else if (st.search.err) body = `<div class="err">${esc(st.search.err)}</div>`
    else {
      if (st.search.users.length) body += st.search.users.map((u) => `<div class="urow" data-act="profile" data-user="${esc(u.username)}">

      if (!st.search.users.length && !st.search.casts.length && st.search.q) body = '<div class="empty">no results.</div>'
    }
    return bar + body
  }

      } else {
        const r = await fetch(`/api/inbox?limit=25${st.inbox.showAll ? '&all=1' : ''}${st.inbox.priority ? '&priority=1' : ''}`)
        const d = await r.json(); if (!r.ok) throw new Error(d.error || 'inbox failed')
        st.inbox.items = d.items; st.inbox.loaded = true

  const NOTIF_VERB = { likes: 'liked', recasts: 'recast', reply: 'replied', mention: 'mentioned you', quote: 'quoted', follows: 'followed you' }
  function notifRow(n) {
    const verb = NOTIF_VERB[n.type] || n.type
    const who = n.others > 0 ? `@${esc(n.actor)} +${n.others}` : `@${esc(n.actor || '?')}`
    const body = n.text ? `<div class="body" ${n.hash ? `data-act="thread" data-hash="${esc(n.hash)}" style="cursor:pointer"` : ''}>${esc(n.text)}</div>` : ''
    return `<div class="card" style="padding:11px 14px">
      <div class="top"><span data-act="profile" data-user="${esc(n.actor || '')}" style="cursor:pointer">${n.actorPfp ? `<img class="lbpfp" src="${esc(n.actorPfp)}" alt="">` : '<span class="lbpfp"></span>'}</span>
        <div class="who"><div class="name"><span data-act="profile" data-user="${esc(n.actor || '')}" style="cursor:pointer">${who}</span> <span class="ub">${esc(verb)}${n.channel ? ' - /' + esc(n.channel) : ''} - ${when(n.timestamp)}</span></div>
        ${body}${n.link ? `<a class="open" href="${esc(n.link)}" target="_blank" rel="noopener">open</a>` : ''}</div></div></div>`

  async function draftAll() {
    const items = st.inbox.items.filter((it) => ANSWERABLE.has(it.type))
    if (!items.length) return
    meta.textContent = 'drafting...'
    try {
      const r = await fetch('/api/digest', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) })
      const d = await r.json(); if (!r.ok) throw new Error(d.error || 'draft failed')
      if (!d.available) { meta.textContent = 'drafts need OPENROUTER_API_KEY'; return }
      for (const it of st.inbox.items) if (d.drafts[it.hash]) it.draft = d.drafts[it.hash]
      meta.textContent = `${st.inbox.items.length} unanswered`; render()
    } catch (e) { meta.textContent = 'draft error: ' + e.message }
  }
  function inboxItem(item) {
    const chain = (item.thread && item.thread.length) ? item.thread : (item.parent ? [item.parent] : [])
    const thread = chain.length ? `<div class="thread">${chain.slice(-2).map((c) => `<div><span class="u">@${esc(c.user)}</span>: ${esc((c.text || '').slice(0, 160))}</div>`).join('')}</div>` : ''
    let draft = ''
    if (item.draft === 'SKIP') draft = `<div class="draft skip"><div class="lab">draft</div><div class="t">no reply needed</div></div>`
    else if (item.draft) draft = `<div class="draft"><div class="lab">draft in your voice</div><div class="t">${esc(item.draft)}</div></div>`

    // Tip badge
    let tipBadge = ''
    if (item.tips && item.tips.count > 0) {
      tipBadge = `<span class="badge tips" title="${item.tips.count} tip(s), ${item.tips.totalTipped} wei total">${item.tips.count} tip${item.tips.count !== 1 ? 's' : ''}</span>`

    let reply = ''
    if (item.sent) reply = `<div class="sent">sent - <a href="${esc(item.sentLink)}" target="_blank" rel="noopener">${esc(item.sentLink)}</a></div>`
    else if (ANSWERABLE.has(item.type)) {
      const val = item.replyText != null ? item.replyText : (item.draft && item.draft !== 'SKIP' ? item.draft : '')
      reply = item.armed
        ? `<div class="reply"><textarea readonly>${esc(val)}</textarea><div class="btns"><span class="note">send exactly this as @${esc(ME)}?</span>
             <button class="ibtn primary" data-act="iconfirm" data-hash="${esc(item.hash)}">${item.sending ? 'sending...' : 'yes, send'}</button>

      <div class="top"><div class="who">

  function renderInbox() {

      try { const t = await fetch('/api/feed?trending=1').then((x) => x.json()); if (t.trending) { st.channels.trending = t.trending; render() } } catch {}

  const compose = { text: '', channel: '', armed: false, sending: false, sentLink: null, sentX: null, sentBsky: null, quote: null, thread: false, parts: [], embedUrl: '', uploading: false, toX: false, toBsky: false, linkPreview: null }
  async function uploadImage(file) {

      const r = await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ upload: dataUrl }) })

  const splitThread = (t) => String(t || '').split(/\n-{3,}\n/).map((s) => s.trim()).filter(Boolean)

  const SNAP_THEME_HEX = { purple: '#855DCD', amber: '#e0a020', green: '#3fbf7f', blue: '#4a9fff' }
  const SNAP_TEMPLATES = (window.__SNAP_TEMPLATES && window.__SNAP_TEMPLATES.length) ? window.__SNAP_TEMPLATES : [

      { type: 'header', title: 'back independent artists', subtitle: 'profit, data + IP to the artist' },

      { type: 'link', label: 'thezao.xyz', url: 'https://thezao.xyz' },

    { name: 'GM Poll', doc: { version: 1, title: 'gm', theme: 'amber', pages: [{ id: 'home', blocks: [
      { type: 'header', title: 'gm', subtitle: 'how we feeling today?' },
      { type: 'poll', question: 'vibe check', options: ['bullish', 'building', 'need coffee'] },
      { type: 'share', label: 'share', text: 'gm - vibe check', icon: 'share' }] }] } },
  ]
  const snapList = () => SNAP_TEMPLATES.concat(savedSnaps.map((s) => ({ name: s.name, doc: s.doc, saved: true })))
  function encodeSnap(doc) {
    const bytes = new TextEncoder().encode(JSON.stringify(doc))
    let bin = ''; for (const b of bytes) bin += String.fromCharCode(b)
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
  }
  const snapUrl = (doc) => `https://zlank.online/s/${encodeSnap(doc)}`
  // music-link detection for the Music feed + play-card rendering
  const MUSIC_HOSTS = [['open.spotify.com', 'Spotify'], ['spotify.link', 'Spotify'], ['music.apple.com', 'Apple Music'], ['soundcloud.com', 'SoundCloud'], ['audius.co', 'Audius'], ['music.youtube.com', 'YouTube Music'], ['tidal.com', 'Tidal'], ['bandcamp.com', 'Bandcamp'], ['sound.xyz', 'Sound']]
  function musicPlatform(url) { const u = String(url || '').toLowerCase(); const h = MUSIC_HOSTS.find(([host]) => u.includes(host)); return h ? h[1] : null }
  const castHasMusic = (c) => (c.embeds || []).some((e) => musicPlatform(typeof e === 'string' ? e : (e && e.url)))
  // decode a zlank snap URL back to its doc, so we can render it inline in-feed
  function decodeSnapUrl(url) {
    const m = /zlank\.online\/s\/([A-Za-z0-9_-]+)/.exec(url || ''); if (!m) return null
    try {
      let b64 = m[1].replace(/-/g, '+').replace(/_/g, '/'); b64 += b64.length % 4 ? '='.repeat(4 - b64.length % 4) : ''
      const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0))
      const d = JSON.parse(new TextDecoder().decode(bytes))
      return (d && (d.version === 1 || d.version === 2)) ? d : null
    } catch { return null }
  }
  function snapEmbedCard(snap, url) {

    return `<div class="embed"><div class="snapembed" data-openurl="${esc(url)}">
      <div class="scaptag">SNAP</div>
      <div class="sctitle">${esc((head && head.title) || snap.title || 'snap')}</div>
      ${head && head.subtitle ? `<div class="scsub">${esc(head.subtitle)}</div>` : ''}

  }
  let snapSel = 0

  function snapBuilderHtml() {
    const list = snapList()
    if (snapSel >= list.length) snapSel = 0
    const cards = list.map((t, i) => `<span class="chip ${i === snapSel ? 'on' : ''}" data-snaptpl="${i}">${esc(t.name)}${t.saved ? ` <span data-act="snaptplrm" data-i="${i}" style="cursor:pointer;color:#ff8a6a">x</span>` : ''}</span>`).join(' ')
    return `<div class="ps" style="margin-bottom:8px">pick a template, edit the fields, watch the preview, then attach it to your cast. it posts as an interactive snap.</div>
      <div class="subbar" style="padding-top:0">${cards}</div>
      <div id="snapEdit">${snapEditorHtml(list[snapSel].doc)}</div>`
  }
  function snapEditorHtml(doc) {
    const blocks = doc.pages[0].blocks
    const fields = blocks.map((b, i) => {
      const lab = (t) => `<div class="ub" style="margin-top:8px">${t}</div>`
      if (b.type === 'header') return lab('header') + `<input class="sfin" id="sb_${i}_title" value="${esc(b.title || '')}" placeholder="title"><input class="sfin" id="sb_${i}_subtitle" value="${esc(b.subtitle || '')}" placeholder="subtitle">`

  function buildSnapDoc() {
    const doc = JSON.parse(JSON.stringify(snapList()[snapSel].doc))
    doc.pages[0].blocks.forEach((b, i) => {
      const g = (f) => { const el = document.getElementById(`sb_${i}_${f}`); return el ? el.value : undefined }
      if (b.type === 'header') { const t = g('title'); if (t != null) b.title = t; const s = g('subtitle'); if (s != null) b.subtitle = s }
      if (b.type === 'text') { const c = g('content'); if (c != null) b.content = c }
      if (b.type === 'poll') { const q = g('question'); if (q != null) b.question = q; const o = g('options'); if (o != null) b.options = o.split('\n').map((x) => x.trim()).filter(Boolean) }
      if (b.type === 'share') { const t = g('text'); if (t != null) b.text = t }
      if (b.type === 'link') { const l = g('label'); if (l != null) b.label = l; const u = g('url'); if (u != null) b.url = u }
      if (b.type === 'image') { const u = g('url'); if (u != null) b.url = u }
    })
    return doc

      if (b.type === 'header') return `<div class="spvh">${esc(b.title || '')}</div>${b.subtitle ? `<div class="spvs">${esc(b.subtitle)}</div>` : ''}`
      if (b.type === 'text') return `<div class="spvt">${esc(b.content || '')}</div>`
      if (b.type === 'poll') return `<div class="spvq">${esc(b.question || '')}</div>` + (b.options || []).map((o) => `<div class="spvopt">${esc(o)}</div>`).join('')

      if (b.type === 'link') return `<div class="spvbtn" style="background:${th}">${esc(b.label || 'open')}</div>`
      if (b.type === 'image') return b.url && b.url !== 'https://' ? `<img class="cimg" src="${esc(b.url)}" alt="">` : ''

    return `<div class="spv" style="border-color:${th}"><div class="spvtitle" style="color:${th}">${esc(doc.title || 'snap')}</div>${blocks}<div class="spvfoot">made with zlank</div></div>`

  // ================= GROW =================
  async function loadGrow() {
    st.grow.loaded = false; render()
    try {
      const [r, er] = await Promise.all([fetch('/api/stats'), fetch('/api/feed?empire=1').catch(() => null)])
      const d = await r.json()
      if (!r.ok) throw new Error(r.status === 401 ? 'session expired - refresh and sign in again' : (d.error || 'stats failed'))
      st.grow.data = d; st.grow.loaded = true
      if (d.followers != null) { statsHistory[todayStr()] = { followers: d.followers, score: d.score ?? null }; const keep = (() => { const x = new Date(); x.setUTCDate(x.getUTCDate() - 30); return x.toISOString().slice(0, 10) })(); for (const k of Object.keys(statsHistory)) if (k < keep) delete statsHistory[k]; persist() }
      try { const ed = er && (await er.json()); st.grow.empires = (ed && ed.empires) || [] } catch { st.grow.empires = [] }
    } catch (e) { st.grow.err = e.message; st.grow.loaded = true }
    render()
  }
  function renderGrow() {
    if (!st.grow.loaded) return '<div class="loading">loading your stats...</div>'
    if (st.grow.err) return `<div class="err">${esc(st.grow.err)}</div>`
    const d = st.grow.data
    // follower history sparkline (builds up from the first day you open Grow)
    const hkeys = Object.keys(statsHistory).sort()
    let histLine = ''
    if (hkeys.length >= 2) {
      const vals = hkeys.map((k) => statsHistory[k].followers).filter((v) => v != null)
      const min = Math.min(...vals), max = Math.max(...vals), range = Math.max(1, max - min)
      const bars = hkeys.slice(-14).map((k) => { const v = statsHistory[k].followers; const h = v == null ? 4 : Math.round(((v - min) / range) * 22) + 4; return `<div class="sparkbar" style="height:${h}px" title="${k}: ${v} followers"></div>` }).join('')
      const first = statsHistory[hkeys[0]].followers, delta = (d.followers ?? first) - first
      histLine = `<div style="display:flex;align-items:flex-end;gap:3px;margin-top:8px;height:28px">${bars}</div><div class="ub">followers over ${hkeys.length}d${delta ? ` - ${delta > 0 ? '+' : ''}${delta}` : ''}</div>`
    }
    // storage: your protocol storage units. casts/reactions at 100% means the
    // oldest are getting pruned - a nudge to rent another unit if you care.
    let storageLine = ''
    const sg = d.storage
    if (sg && sg.units != null) {
      const bar = (label, o) => {
        if (!o || !o.capacity) return ''
        const pct = Math.min(100, Math.round((o.used / o.capacity) * 100))
        const col = pct >= 100 ? '#e0555f' : pct >= 85 ? '#e0a955' : '#3fbf7f'
        return `<div class="ub" style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="width:64px">${label}</span><span style="flex:1;height:6px;background:#24242f;border-radius:3px;overflow:hidden"><span style="display:block;height:6px;width:${pct}%;background:${col}"></span></span><span style="width:38px;text-align:right">${pct}%</span></div>`
      }
      storageLine = `<div style="margin-top:8px"><div class="ub">storage - ${sg.units} unit${sg.units === 1 ? '' : 's'}${(sg.casts && sg.casts.used >= sg.casts.capacity) ? ' - casts full, oldest getting pruned' : ''}</div>${bar('casts', sg.casts)}${bar('reactions', sg.reactions)}${bar('links', sg.links)}</div>`
    }
    // Zora Creator Coin card - inert until config.zoraCoinAddress is set.
    // An API failure renders AS a failure, never silently as "no card".
    let zoraLine = ''
    if (d.zora && d.zora.error) {
      zoraLine = `<div class="ub" style="margin-top:8px;color:#e0a955">Zora coin: ${esc(d.zora.error)}</div>`
    } else if (d.zora) {
      const z = d.zora
      const num = (v) => (v != null && Number.isFinite(v)) ? v : null
      const delta = num(z.marketCapDelta24h) != null ? `${z.marketCapDelta24h > 0 ? '+' : ''}${z.marketCapDelta24h.toFixed(2)}%` : ''
      zoraLine = `<div class="t" style="color:#a99cff;font-size:14px;margin-top:8px"><a class="open" href="${esc(z.url)}" target="_blank" rel="noopener">$${esc(z.symbol)}</a> Zora coin - ${num(z.marketCap) != null ? '$' + z.marketCap.toLocaleString() : '?'} mcap${delta ? ` (${delta})` : ''}</div>`
    }
    const hdr = `<div class="digest" style="background:#151529;border-color:#24242f">
      <div class="t" style="color:#e9e9ee;font-size:16px"><b>${d.followers ?? '?'}</b> followers - <b>${d.following ?? '?'}</b> following${d.score != null ? ` - neynar score <b>${d.score}</b>` : ''}</div>${histLine}${storageLine}${zoraLine}</div>`
    const casts = (d.topCasts || []).map((c) => `<div class="card"><div class="who">
      <div class="body tappable" data-act="thread" data-hash="${esc(c.hash)}">${esc(c.text) || '<i>(media/no text)</i>'}</div>
      <div class="stats"><span>&#9829; ${c.likes}</span><span>&#8635; ${c.recasts}</span><span>&#128172; ${c.replies}</span>
        <span style="color:#855DCD">score ${c.score}</span>
        <a class="open" href="${esc(c.link)}" target="_blank" rel="noopener">open</a></div></div></div>`).join('')
    const maxN = Math.max(1, ...(d.topEngagers || []).map((e) => e.n))
    const eng = (d.topEngagers || []).map((e) => `<div class="lbrow" data-act="profile" data-user="${esc(e.username)}">
      <span class="lbrank ${e.rank <= 3 ? 'top' : ''}">${e.rank}</span>
      ${e.pfp ? `<img class="lbpfp" src="${esc(e.pfp)}" alt="">` : '<span class="lbpfp"></span>'}
      <span class="lbname">@${esc(e.username)}</span>
      <span class="lbbar"><span class="lbfill" style="width:${Math.round((e.n / maxN) * 100)}%"></span></span>
      <span class="lbn">${e.n}</span></div>`).join('')
    const suggest = (d.suggest || []).map((u) => `<div class="urow" data-act="profile" data-user="${esc(u.username)}">
      ${pfp(u)}<div><div class="un">${esc(u.display)} <span class="ub">@${esc(u.username)} - ${u.followers} followers</span></div>
      <div class="ub">${esc(u.bio)}</div></div></div>`).join('')
    return hdr
      + '<div class="subbar" style="padding-top:4px"><b style="color:#8a8a99;font-size:13px">your top fans - who engages you most (reply back, it compounds)</b></div>'
      + (eng || '<div class="subbar"><span class="ub">no recent engagers</span></div>')
      + '<div class="subbar"><b style="color:#8a8a99;font-size:13px">people to engage next</b></div>'
      + (suggest || '<div class="subbar"><span class="ub">no suggestions right now</span></div>')
      + '<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">your top casts (by engagement)</b></div>'
      + (casts || '<div class="empty">no casts yet.</div>')
  }

    const rw = d.empire?.rewards
    const rewardsLine = rw && (rw.distributedCount || rw.burnedCount || rw.airdropCount)
      ? `<div class="ub" style="margin-top:4px">${rw.distributedCount} distribution${rw.distributedCount === 1 ? '' : 's'}${rw.mostRecentDistribution?.amount ? ` (latest ${rw.mostRecentDistribution.amount})` : ''} - ${rw.burnedCount} burn${rw.burnedCount === 1 ? '' : 's'} - ${rw.airdropCount} airdrop${rw.airdropCount === 1 ? '' : 's'}</div>`
      : ''
    const empCard = d.empire && !d.empire.error
      ? `<div class="digest" style="background:#151529;border-color:#24242f"><div class="t" style="color:#a99cff;font-size:15px">${esc(d.empire.name || d.empire.id)} empire</div>
         <div class="ub" style="margin-top:4px">${d.empire.leaderboardCount} leaderboard${d.empire.leaderboardCount === 1 ? '' : 's'}${d.empire.boosters?.length ? ` - ${d.empire.boosters.length} booster${d.empire.boosters.length === 1 ? '' : 's'}` : ''}${mineLine}</div>${rewardsLine}
         <div style="margin-top:6px">${empLbBtn}</div></div>`
      : d.empire?.error
        ? `<div class="digest" style="background:#151529;border-color:#24242f"><div class="err">Empire Builder: ${esc(d.empire.error)}</div><div class="ub" style="margin-top:4px">this is an API problem, not a config problem - your empire is still there, try again in a bit</div></div>`
        : `<div class="digest" style="background:#151529;border-color:#24242f"><div class="ub">no empire configured yet - set config.empireOwnerWallet, or create one below</div></div>`
    const createBtn = '<div class="subbar" style="margin-top:8px"><span class="chip" data-act="createempire">+ create a tokenless empire</span></div>'
    const mine = ['zabal', 'zao', 'wavewarz']
    const empires = (st.grow.empires || []).map((e, i) => {
      const own = mine.includes((e.symbol || '').toLowerCase()) || mine.includes((e.name || '').toLowerCase())
      const link = e.warpcast || e.website
      return `<div class="lbrow ${own ? 'ownrow' : ''}"${link ? ` data-openurl="${esc(link)}"` : ''}>
        <span class="lbrank ${i < 3 ? 'top' : ''}">${i + 1}</span>
        ${e.logo ? `<img class="lbpfp" src="${esc(e.logo)}" alt="">` : '<span class="lbpfp"></span>'}
        <span class="lbname">${esc(e.name)}${e.native ? ' <span class="qs">native</span>' : ''}</span>
        <span class="ub" style="font-size:12px">${e.treasury ? Math.round(e.treasury) + ' treasury' : ''}</span>
        <span class="lbn">${e.rank != null ? e.rank : '-'}</span></div>`
    }).join('')
    const empireSec = empires ? '<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">top empires (read-only)</b></div>' + empires : ''
    const txLookup = `<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">look up a distribution (paste a tx hash)</b></div>
      <div class="urow" style="cursor:default"><input class="sfin" id="emp_txhash" placeholder="0x..." style="flex:1;margin:0"><span class="chip" data-act="lookupdist">look up</span></div>
      <div id="empDistResult"></div>`
    result += empCard + createBtn + boosterQueueSection() + empireSec + txLookup
      + '<div class="subbar" style="margin-top:10px"><b style="color:#8a8a99;font-size:13px">what this tab can do (research doc 1094a)</b></div>'
      + renderEmpireCapabilities()
    return result
  }

  // ===== The booster engage-back queue (doc 1088 Phase 2b, confirm-first).
  // Detection is the machine's job; every engagement is Zaal's tap. Each
  // candidate renders their cast as a full castCard, so the like button
  // (one-tap, reversible tier) and reply-with-confirm come from the existing
  // affordances - no new send paths, no new confirm rules to get wrong.
  async function loadBoosterQueue() {
    st.booster.loading = true; st.booster.err = null
    if (tab === 'empire') render()
    try {
      const r = await fetch('/api/feed?booster=1')
      const d = await r.json()
      if (!r.ok) throw new Error(r.status === 401 ? 'session expired - refresh and sign in again' : (d.error || 'queue failed'))
      st.booster.candidates = d.candidates || []
      st.booster.loaded = true
    } catch (e) {
      st.booster.err = e.message
    } finally {
      st.booster.loading = false
      if (tab === 'empire') render()
    }
  }
  function boosterQueueSection() {
    const head = `<div class="subbar" style="margin-top:10px"><b style="color:#8a8a99;font-size:13px">booster - people giving this energy right now</b> <span class="chip" data-act="loadbooster">${st.booster.loading ? 'scanning...' : (st.booster.loaded ? 'rescan' : 'scan')}</span></div>`
    if (!st.booster.loaded && !st.booster.loading && !st.booster.err) return head + '<div class="subbar"><span class="ub">tap scan - finds who liked your recent casts or casted about ZABAL Gamez, so you can engage back. every like/reply is still your tap.</span></div>'
    if (st.booster.err) return head + `<div class="err" style="margin:6px 0">${esc(st.booster.err)}</div>`
    if (st.booster.loading) return head + '<div class="loading">scanning likes + mentions...</div>'
    if (!st.booster.candidates.length) return head + '<div class="subbar"><span class="ub">nobody new right now - cast something and rescan later.</span></div>'
    return head + st.booster.candidates.map((c) => `
      <div class="urow" style="cursor:default;margin-top:2px" data-act="profile" data-user="${esc(c.username)}">
        ${c.pfp ? `<img class="pfp" src="${esc(c.pfp)}" alt="">` : '<div class="pfp"></div>'}
        <div><div class="un">${esc(c.display || c.username)} <span class="ub">@${esc(c.username)}${c.score != null ? ' - score ' + c.score : ''}</span></div>
        <div class="ub">${esc(c.reasons.join(' + '))}</div></div></div>
      ${c.cast ? castCard(c.cast) : '<div class="subbar"><span class="ub">no recent cast to engage on - visit their profile</span></div>'}`).join('')
  }

  // ===== Manager console (owner-only): status of the bot ecosystem (this
  // deploy, ZOL, ZOE) + a whitelisted command queue. Reuses the /api/stats
  // fetch (st.grow) since Vercel's 12-function cap means this data rides
  // along in stats.js rather than getting its own endpoint - see that
  // file's managerSummary() for why queued commands aren't auto-executed
  // from here (ZOL/ZOE aren't reachable from a Vercel function).
  async function managerEnqueue() {
    const target = document.getElementById('mgr_target').value
    const cmd = document.getElementById('mgr_cmd').value
    const paramVal = (document.getElementById('mgr_param').value || '').trim()
    st.manager.submitting = true; st.manager.msg = null; render()
    try {
      const r = await fetch('/api/stats', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'manager_enqueue', target, cmd, params: paramVal ? { draftId: paramVal } : {} }),
      })
      const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'enqueue failed')
      st.manager.msg = `queued: ${target} / ${cmd}`; st.manager.msgErr = false
      document.getElementById('mgr_param').value = ''
      loadGrow()
    } catch (e) {
      st.manager.msg = e.message; st.manager.msgErr = true
    } finally {
      st.manager.submitting = false; render()
    }
  }
  function renderManager() {
    if (!st.grow.loaded) return '<div class="loading">loading manager status...</div>'
    if (st.grow.err) return `<div class="err">${esc(st.grow.err)}</div>`
    const m = st.grow.data?.manager
    if (!m) return '<div class="empty">no manager data in this deploy yet.</div>'
    const h = m.zaalcaster || {}
    const healthCard = `<div class="digest"><div class="t">zaalcaster (this deploy)</div>
      <div class="ub" style="margin-top:4px">posting: <b style="color:${h.posting?.ready ? '#3fbf7f' : '#ff8a6a'}">${h.posting?.ready ? 'ready' : 'not ready' + (h.posting?.reason ? ' - ' + esc(h.posting.reason) : '')}</b></div>
      <div class="ub">cron: ${h.cronStaleHours != null ? `${h.cronStaleHours}h ago ${h.cronStaleHours < 1 ? '(ok)' : '(STALE)'}` : 'unknown'}</div></div>`
    const targetCards = (m.targets || []).filter((t) => t !== 'zaalcaster').map((t) =>
      `<div class="digest"><div class="t">${esc(t)}</div><div class="ub" style="margin-top:4px">${esc(m.notes?.[t] || '')}</div></div>`).join('')
    const jobsRows = (m.jobs || []).length
      ? m.jobs.map((j) => `<div class="urow" style="cursor:default"><div><div class="un">${esc(j.target)} / ${esc(j.cmd)} <span class="ub">${j.status || 'pending'}</span></div>
          <div class="ub">${when(j.at)}${j.params && Object.keys(j.params).length ? ' - ' + esc(JSON.stringify(j.params)) : ''}</div></div></div>`).join('')
      : '<div class="empty">queue is empty.</div>'
    const actionsRows = (m.recentActions || []).length
      ? m.recentActions.map((a) => `<div class="ub" style="padding:4px 0">[${esc(a.type || '?')}] ${when(a.at)}${a.text ? ' - ' + esc(a.text.slice(0, 60)) : ''}</div>`).join('')
      : '<div class="ub">no actions logged yet.</div>'
    const cmdOptions = (m.commands || []).map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join('')
    const targetOptions = (m.targets || []).map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join('')
    const form = m.enabled ? `<div class="subbar" style="margin-top:10px"><b style="color:#8a8a99;font-size:13px">queue a command</b></div>
      <div class="urow" style="cursor:default;gap:8px;flex-wrap:wrap">
        <select id="mgr_target" style="font:inherit;background:#0e0e15;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 9px">${targetOptions}</select>
        <select id="mgr_cmd" style="font:inherit;background:#0e0e15;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 9px">${cmdOptions}</select>
        <input class="sfin" id="mgr_param" placeholder="param (e.g. draft id) - optional" style="flex:1;min-width:160px;margin:0">
        <span class="chip" data-act="mgrenqueue">${st.manager.submitting ? 'queuing...' : 'queue it'}</span>
      </div>
      ${st.manager.msg ? (st.manager.msgErr ? `<div class="err" style="margin-top:6px;padding:8px;text-align:left">${esc(st.manager.msg)}</div>` : `<div class="ub" style="margin-top:6px;color:#3fbf7f">${esc(st.manager.msg)}</div>`) : ''}
      <div class="ub" style="margin-top:6px">whitelisted commands only - queued here, executed by whatever worker for that target exists (see notes above; ZOL/ZOE draining isn't wired up yet).</div>`
      : '<div class="err">KV store not configured - command queue unavailable.</div>'
    return healthCard + targetCards
      + '<div class="subbar" style="margin-top:10px"><b style="color:#8a8a99;font-size:13px">queue <span class="chip" data-act="mgrreload">refresh</span></b></div>' + jobsRows
      + form
      + '<div class="subbar" style="margin-top:10px"><b style="color:#8a8a99;font-size:13px">recent actions</b></div>' + actionsRows
  }

  // ===== Fleet live view - reads fleet_status from the Supabase cowork
  // tracker (same table loops-keepalive.sh upserts every ~10s). Owner-only.
  // Fast path: /api/stats?kind=fleet, no Neynar/Empire calls.
  function fleetAge(ts) {
    if (!ts) return 'unknown'
    const ms = Date.now() - new Date(ts).getTime()
    if (ms < 0) return 'just now'
    const s = Math.round(ms / 1000)
    if (s < 90) return s + 's ago'
    const m = Math.round(ms / 60000)
    if (m < 90) return m + 'm ago'
    return Math.round(ms / 3600000) + 'h ago'
  }
  async function loadFleet() {
    st.fleet.loading = true; st.fleet.err = null
    if (tab === 'fleet') render()
    try {
      const r = await fetch('/api/stats?kind=fleet')
      const d = await r.json()
      if (!r.ok) throw new Error(r.status === 401 ? 'session expired - refresh and sign in again' : (d.error || 'fleet fetch failed'))
      st.fleet.loops = d.loops || []
      st.fleet.loaded = true
    } catch (e) {
      st.fleet.err = e.message
    } finally {
      st.fleet.loading = false
      if (tab === 'fleet') render()
    }
  }
  function renderFleet() {
    const STATE_COLOR = { working: '#3fbf7f', idle: '#8a8a99', dead: '#ff8a6a' }
    const header = `<div class="ps" style="margin-bottom:8px">Live status of the ZAO tmux loop fleet. Data from Supabase <code>fleet_status</code>, refreshed every ~10s by loops-keepalive.sh.</div>
      <div class="subbar" style="padding-top:0"><span class="chip" data-act="fleetreload">${st.fleet.loading ? 'loading...' : 'refresh'}</span></div>`
    if (st.fleet.loading && !st.fleet.loaded) return header + '<div class="loading">loading fleet...</div>'
    if (st.fleet.err) return header + `<div class="err" style="margin:6px 0">${esc(st.fleet.err)}</div>`
    if (!st.fleet.loops.length) return header + '<div class="empty">no fleet_status rows yet - loops-keepalive.sh not running or tracker not configured.</div>'
    const working = st.fleet.loops.filter((l) => l.state === 'working').length
    const summary = `<div class="digest" style="background:#151529;border-color:#24242f"><div class="t" style="color:#a99cff">${working}/${st.fleet.loops.length} working</div></div>`
    const cards = st.fleet.loops.map((l) => {
      const col = STATE_COLOR[l.state] || '#8a8a99'
      const age = fleetAge(l.updated_at)
      const last = (l.last_line || '').trim().replace(/\s+/g, ' ').slice(0, 120) || '(no recent output)'
      return `<div class="digest" style="background:#151529;border-color:#24242f;margin-top:6px">
        <div class="t">${esc(l.session)} <span style="color:${col};font-size:13px">[${esc(l.state || '?')}]</span> <span class="ub" style="font-size:12px">${esc(age)}</span></div>
        <div class="ub" style="margin-top:4px;word-break:break-all">${esc(last)}</div></div>`
    }).join('')
    return header + summary + cards
  }

  // ===== POIDH ("pics or it didn't happen") bounty reader - reads
  // poidh.xyz's own tRPC endpoint (proven stable, keyless, per
  // bettercallzaal/zpoidh's working refresh script), never guesses at
  // undocumented internals. Read-only - claiming/creating a bounty is an
  // on-chain tx via the PoidhV2 contract, a future slice, not this one.
  // The ZABAL round bounties all live on Base, so the chips pin chain 8453
  // no matter which chain the selector is on.
  const POIDH_KNOWN_BOUNTIES = [
    { id: '1151', label: 'R1' }, { id: '1166', label: 'R2' },
    { id: '1180', label: 'R3' }, { id: '1249', label: 'R4 (open pot)' },
  ]
  // Chains POIDH is deployed on. Labels double as poidh.xyz URL segments
  // server-side; the server owns that mapping, this list only drives the
  // selector chips. Bounty ids are PER-CHAIN (base 1249 != degen 1249).
  const POIDH_CHAINS = [
    { id: 8453, label: 'base' }, { id: 666666666, label: 'degen' },
    { id: 42161, label: 'arbitrum' }, { id: 1, label: 'mainnet' },
  ]
  async function loadPoidh(bountyId, chainId) {
    bountyId = String(bountyId)
    chainId = Number(chainId || st.poidh.chainId)
    st.poidh.bountyId = bountyId
    st.poidh.chainId = chainId
    st.poidh.loaded = false; st.poidh.err = null
    if (tab === 'poidh') render()
    // the stale-response guard must key on chain TOO - same bounty id on a
    // different chain is a different bounty
    const current = () => st.poidh.bountyId === bountyId && st.poidh.chainId === chainId
    try {
      const r = await fetch(`/api/view?kind=poidh_bounty&id=${encodeURIComponent(bountyId)}&chain=${chainId}`)
      const d = await r.json()
      // a newer click superseded this request - drop the stale response
      if (!current()) return
      if (!r.ok) throw new Error(r.status === 401 ? 'session expired - refresh and sign in again' : (d.error || 'bounty lookup failed'))
      st.poidh.bounty = d.bounty; st.poidh.claims = d.claims || []
      st.poidh.claimsCount = d.claimsCount ?? (d.claims || []).length
      st.poidh.claimsError = d.claimsError || null
    } catch (e) {
      if (!current()) return
      st.poidh.err = e.message; st.poidh.bounty = null; st.poidh.claims = []; st.poidh.claimsCount = 0
    } finally {
      if (current()) {
        st.poidh.loaded = true
        if (tab === 'poidh') render()
      }
    }
  }
  // Pot sizes span 9 orders of magnitude (gwei test bounties to whole-token
  // DEGEN pots), so fixed-4 alone rendered dust as "0.0000 ETH" - lie-shaped.
  function fmtPoidhAmount(amount, currency) {
    if (!amount) return 'no pot'
    if (amount < 0.0001) return `under 0.0001 ${currency}`
    const digits = amount >= 1000 ? 0 : 4
    return `${amount.toLocaleString('en-US', { maximumFractionDigits: digits })} ${currency}`
  }
  function renderPoidh() {
    const chips = POIDH_KNOWN_BOUNTIES.map((b) => `<span class="chip ${st.poidh.bountyId === b.id && st.poidh.chainId === 8453 ? 'on' : ''}" data-act="poidhbounty" data-id="${b.id}">${esc(b.label)}</span>`).join('')
    const chainChips = POIDH_CHAINS.map((c) => `<span class="chip ${st.poidh.chainId === c.id ? 'on' : ''}" data-act="poidhchain" data-id="${c.id}">${esc(c.label)}</span>`).join('')
    const header = `<div class="ps" style="margin-bottom:8px">Reads live bounty + claim data from poidh.xyz. Read-only - claiming a bounty is an on-chain wallet action, done on poidh.xyz directly for now.</div>
      <div class="subbar" style="padding-top:0">${chips}</div>
      <div class="subbar" style="padding-top:4px"><span class="ub" style="font-size:12px;margin-right:2px">chain</span>${chainChips}</div>
      <div class="urow" style="cursor:default;margin-top:6px"><input class="sfin" id="poidh_id" value="${esc(st.poidh.bountyId)}" placeholder="or any bounty id" style="flex:1;margin:0"><span class="chip" data-act="poidhlookup">look up</span></div>`
    if (!st.poidh.loaded) return header + '<div class="loading">loading bounty...</div>'
    if (st.poidh.err) return header + `<div class="err" style="margin-top:8px">${esc(st.poidh.err)}</div>`
    const b = st.poidh.bounty
    if (!b) return header + '<div class="empty">no bounty found.</div>'
    const statusLine = b.isCanceled ? 'canceled' : b.isVoting ? 'voting' : b.inProgress ? 'open' : 'closed'
    // when the claims fetch failed, saying "0 claims" here would contradict
    // the failure banner below - omit the count instead
    const countText = st.poidh.claimsError ? '' : ` - ${st.poidh.claimsCount} claim${st.poidh.claimsCount === 1 ? '' : 's'}`
    const bountyCard = `<div class="digest" style="background:#151529;border-color:#24242f;margin-top:8px">
      <div class="t" style="color:#a99cff;font-size:15px">${esc(b.title)}</div>
      <div class="ub" style="margin-top:4px">${esc(fmtPoidhAmount(b.amount, b.currency || 'ETH'))} - ${esc(statusLine)}${countText}</div>
      <div class="ub" style="margin-top:4px;white-space:pre-wrap">${esc((b.description || '').slice(0, 400))}${(b.description || '').length > 400 ? '...' : ''}</div>
      <div style="margin-top:6px"><a class="open" href="${esc(b.url)}" target="_blank" rel="noopener">open on poidh.xyz</a></div></div>`
    const claims = st.poidh.claims.map((c) => `<div class="lbrow">
      ${c.imageUrl ? `<img class="lbpfp" src="${esc(c.imageUrl)}" alt="">` : '<span class="lbpfp"></span>'}
      <span class="lbname">${esc(c.title || 'untitled claim')}${c.isAccepted ? ' <span class="qs">accepted</span>' : ''}</span>
      <span class="ub" style="font-size:12px">${esc((c.issuer || '').slice(0, 6))}...${esc((c.issuer || '').slice(-4))}</span></div>`).join('')
    const truncNote = st.poidh.claimsCount > st.poidh.claims.length
      ? `<div class="subbar"><span class="ub">showing first ${st.poidh.claims.length} of ${st.poidh.claimsCount}</span></div>` : ''
    const claimsSec = st.poidh.claimsError
      ? `<div class="subbar" style="margin-top:8px"><span class="ub" style="color:#e0a955">claims failed to load: ${esc(st.poidh.claimsError)}</span></div>`
      : claims ? '<div class="subbar" style="margin-top:8px"><b style="color:#8a8a99;font-size:13px">claims</b></div>' + claims + truncNote : '<div class="subbar"><span class="ub">no claims yet</span></div>'
    return header + bountyCard + claimsSec
  }

  async function lookupDistribution() {
    const hashEl = document.getElementById('emp_txhash')
    const out = document.getElementById('empDistResult')
    if (!hashEl || !out) return // tab re-rendered away mid-flight
    const hash = (hashEl.value || '').trim()
    if (!hash) { toast('paste a transaction hash first'); return }
    out.innerHTML = '<div class="loading">looking up...</div>'
    try {
      const r = await fetch(`/api/view?kind=empire_distribution&hash=${encodeURIComponent(hash)}`)
      const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'lookup failed')
      if (!d.recipients.length) { out.innerHTML = '<div class="empty">no recipients found for that hash.</div>'; return }
      out.innerHTML = `<div class="ub" style="margin:6px 0">${d.count} recipient${d.count === 1 ? '' : 's'}</div>` + d.recipients.map((r) => `<div class="lbrow">
        <span class="lbname">${r.username ? '@' + esc(r.username) : esc((r.address || '').slice(0, 6) + '...' + (r.address || '').slice(-4))}</span>
        <span class="lbn">${r.amount != null ? Math.round(r.amount * 100) / 100 : ''}</span></div>`).join('')
    } catch (e) {
      out.innerHTML = `<div class="err">${esc(e.message)}</div>`
    }
  }

  // ================= DAILY (start-here dashboard) =================
  const todayStr = () => new Date().toISOString().slice(0, 10)
  const DAILY_DEFAULT = {
    date: todayStr(),
    tasks: [
      { t: 'post a GM', done: false },
      { t: 'clear inbox - reply or skip', done: false },
      { t: 'catch GM Farcaster', done: false },
      { t: 'engage 3 new people (Grow tab)', done: false },
      { t: 'check /zao + /wavewarz', done: false },
      { t: 'quote or boost 1 good cast', done: false },
    ],
    apps: [
      { label: 'GM Farcaster', url: 'https://gmfarcaster.com' },
      { label: 'Bountycaster', url: 'https://www.bountycaster.xyz' },
      { label: 'Paragraph', url: 'https://paragraph.xyz' },
      { label: 'Degen', url: 'https://www.degen.tips' },
      { label: 'Rounds', url: 'https://rounds.wtf' },
    ],
    communities: ['zao', 'wavewarz', 'zabal', 'gmfarcaster', 'farcaster', 'founders'],
    groups: [
      { label: 'Farcaster DMs / group chats', url: 'https://farcaster.xyz/~/inbox' },
    ],
  }
  let daily = lsGet('zc_daily', null)
  if (!daily) { daily = DAILY_DEFAULT; lsSet('zc_daily', daily) }
  // daily reset - clear task ticks on a new day
  if (daily.date !== todayStr()) { daily.date = todayStr(); daily.tasks.forEach((x) => (x.done = false)); lsSet('zc_daily', daily) }
  const saveDaily = () => persist()

  function toast(msg) {
    const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg
    document.body.appendChild(el)
    requestAnimationFrame(() => el.classList.add('show'))

  async function loadZoe() {
    try {
      const r = await fetch('/api/feed?zoe=1')

      const d = await r.json()
      st.zoe.enabled = d.enabled !== false
      st.zoe.tasks = d.tasks || []
      st.zoe.err = d.error || null

      st.zoe.err = 'tracker unreachable'

    }

  async function zoeMarkDone(taskId, el) {
    if (el) el.textContent = '...'
    try {
      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'zoe_done', taskId }) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'failed')
      st.zoe.tasks = st.zoe.tasks.filter((t) => t.id !== taskId)
      toast('done - ZOE\'s board updated')

    const el = document.getElementById('zoeDecision')

    try {
      const r = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'zoe_decision', text }) })
      const d = await r.json()
      if (!r.ok || !d.ok) throw new Error(d.error || 'failed')
      el.value = ''

  // auto-quests: tick quests Zaal actually completed today (gm posted, cast, replied)
  let autoQuestDay = null
  async function checkAutoQuests() {
    if (autoQuestDay === todayStr()) return
    autoQuestDay = todayStr()
    try {
      const d = await fetch('/api/feed?myactivity=1').then((r) => r.json())
      if (!d.activity) return
      const a = d.activity
      let changed = false
      daily.tasks.forEach((t, i) => {
        if (t.done) return
        const tx = (t.t || '').toLowerCase()
        let hit = false
        if (/\bgm\b/.test(tx) && a.gm) hit = true
        else if (/\bpost\b|\bcast\b/.test(tx) && a.posts >= 1) hit = true
        else if (/repl|inbox|engage/.test(tx)) { const m = tx.match(/(\d+)/); const need = m ? +m[1] : 1; if (a.replies >= need) hit = true }
        if (hit) { t.done = true; changed = true }
      })
      if (changed) { saveDaily(); render(); toast('checked off what you already did today') }
    } catch { /* activity unreachable - manual ticking still works */ }
  }

  async function delCast(hash) {
    if (!window.confirm('delete this cast? this cannot be undone.')) return
    try {
      const r = await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', hash }) })
      const d = await r.json(); if (!r.ok || !d.ok) throw new Error(d.error || 'delete failed')
      st.feed.casts = st.feed.casts.filter((c) => c.hash !== hash)
      st.channels.casts = (st.channels.casts || []).filter((c) => c.hash !== hash)
      st.search.casts = (st.search.casts || []).filter((c) => c.hash !== hash)

    } catch (e) { toast('delete error: ' + e.message) }

  async function openThread(hash) {
    openOverlay('thread', '<div class="loading">loading thread...</div>')
    try {
      const r = await fetch(`/api/view?kind=thread&hash=${encodeURIComponent(hash)}`); const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'thread failed')
      let html = `<div class="subbar" style="padding-top:0"><span class="chip" data-act="summarize" data-hash="${esc(hash)}">summarize thread</span></div><div id="threadSummary"></div>`
      for (const a of d.ancestors) html += castCard(a)
      if (d.cast) html += `<div class="focuscast">${castCard(d.cast)}</div>`
      for (const rep of d.replies) { html += castCard(rep); for (const s of (rep.sub || [])) html += `<div style="margin-left:14px">${castCard(s)}</div>` }
      document.getElementById('obody').innerHTML = html || '<div class="empty">no thread.</div>'
    } catch (e) { document.getElementById('obody').innerHTML = `<div class="err">${esc(e.message)}</div>` }
  }

      content += `<div class="ps" style="margin-top:8px">prep your token launch. this creates the @clanker launch cast and pre-fills the Post tab, where you preview and confirm before sending.</div>
