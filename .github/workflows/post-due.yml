name: fire scheduled casts

# Vercel Hobby crons only run once a day, so we ping the endpoint from GitHub
# Actions every ~5 minutes for real scheduled-post timing. Needs two repo
# secrets: ZAALCASTER_URL (e.g. https://zaalcaster.vercel.app) and CRON_SECRET
# (same value as the CRON_SECRET env var in Vercel). If either is unset the job
# no-ops. Delete this file to rely only on Vercel Cron.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  post-due:
    runs-on: ubuntu-latest
    steps:
      - name: ping post-due
        env:
          URL: ${{ secrets.ZAALCASTER_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "ZAALCASTER_URL or CRON_SECRET not set - skipping"; exit 0
          fi
          code=$(curl -s -o /tmp/out -w "%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$URL/api/cron/post-due")
          echo "status: $code"; cat /tmp/out || true
          [ "$code" = "200" ]
